let monsterID = 0;
function makeMonster(wx, wy, lv, wavePressureScale, opts){
  opts = opts || {};
  const lvScale = getMonsterLevelScale() * (wavePressureScale || 1);
  const baseHP = [47, 94, 189, 708][lv - 1];
  const baseDPS = [1, 1.5, 2, 4][lv - 1];
  const bossRole = !!opts.bossRole;
  const eliteRole = !!opts.eliteRole || (lv >= 4 && !bossRole);
  const hpMult = bossRole ? 2.5 : 1;
  return {
    id: monsterID++,
    pos: v2(wx, wy), lv,
    bossRole,
    eliteRole,
    hp:    baseHP * lvScale * hpMult,
    maxHp: baseHP * lvScale * hpMult,
    dps:   baseDPS * lvScale,
    atkCD: 0,
    stunUntil: 0,
    slowUntil: 0,
    slowAmount: 0,
    spawnTime: G.time
  };
}
// 堡垒矩形碰撞体（与 drawFortress 视觉对齐：52x64，主体偏上）
const FORTRESS_HW     = 26;  // 半宽
const FORTRESS_HH_TOP = 38;  // 上半高（含旗杆塔楼下沿）
const FORTRESS_HH_BOT = 26;  // 下半高（含底座）
function fortressNearestPoint(px, py){
  const f = G.fortress;
  const minX = f.worldX - FORTRESS_HW, maxX = f.worldX + FORTRESS_HW;
  const minY = f.worldY - FORTRESS_HH_TOP, maxY = f.worldY + FORTRESS_HH_BOT;
  const cx = Math.max(minX, Math.min(maxX, px));
  const cy = Math.max(minY, Math.min(maxY, py));
  return { cx, cy, dx: px - cx, dy: py - cy };
}

function updateMonster(m, dt){
  // Stunned: no move, no attack
  if(m.stunUntil > G.time) return;

  // 实时索敌：每帧重新读堡垒当前位置（堡垒在上移）
  // 预判堡垒未来位置
  const fortressSpd = FORTRESS_TRAVEL / GAME_DURATION;
  const MONSTER_RADIUS = 14;
  const ATTACK_DIST = MONSTER_RADIUS + 2;   // 贴近矩形外缘即可攻击
  const MIN_STANDOFF = MONSTER_RADIUS;       // 与矩形外缘至少保持的距离

  const aliveTime = G.time - (m.spawnTime || 0);
  const speedMult = (G.levelConfig && G.levelConfig.affix && G.levelConfig.affix.monsterSpeedMult) || 1;
  const baseSpeedMult = m.bossRole ? 0.6 : (m.eliteRole ? 0.8 : 1);
  let speed = (MONSTER_SPEED * baseSpeedMult + Math.floor(aliveTime / 2)) * speedMult;
  if(m.frenzy) speed *= 1.5;
  if(m.slowUntil > G.time) speed *= (1 - m.slowAmount);

  // 用一阶预判：根据怪物到堡垒的预计到达时间，估算堡垒到时位置
  const dxNow = G.fortress.worldX - m.pos.x;
  const dyNow = G.fortress.worldY - m.pos.y;
  const distNow = Math.hypot(dxNow, dyNow);
  const eta = speed > 0 ? distNow / speed : 0;
  const predictY = G.fortress.worldY - fortressSpd * eta * 0.5;
  const tx = G.fortress.worldX, ty = predictY;
  const dx = tx - m.pos.x, dy = ty - m.pos.y;
  const distTar = Math.hypot(dx, dy) || 1;

  // 当前到堡垒矩形外缘的距离
  const near = fortressNearestPoint(m.pos.x, m.pos.y);
  const surfaceDist = Math.hypot(near.dx, near.dy);

  if(surfaceDist > ATTACK_DIST){
    // 仍在追击：朝预判方向走
    m.pos.x += (dx / distTar) * speed * dt;
    m.pos.y += (dy / distTar) * speed * dt;
    // 走完后做碰撞校正：若进入了矩形（或太靠近），把怪物推回外缘 MIN_STANDOFF 距离处
    const n2 = fortressNearestPoint(m.pos.x, m.pos.y);
    const d2 = Math.hypot(n2.dx, n2.dy);
    if(d2 < MIN_STANDOFF){
      if(d2 > 0.01){
        // 沿外法线方向推出
        m.pos.x = n2.cx + (n2.dx / d2) * MIN_STANDOFF;
        m.pos.y = n2.cy + (n2.dy / d2) * MIN_STANDOFF;
      } else {
        // 已穿入矩形内部：按怪物移动前位置的方向反推
        const backDx = m.pos.x - near.cx;
        const backDy = m.pos.y - near.cy;
        const bd = Math.hypot(backDx, backDy);
        if(bd > 0.01){
          m.pos.x = n2.cx + (backDx / bd) * MIN_STANDOFF;
          m.pos.y = n2.cy + (backDy / bd) * MIN_STANDOFF;
        } else {
          // 极端兜底：推到堡垒正上方
          m.pos.x = G.fortress.worldX;
          m.pos.y = G.fortress.worldY - FORTRESS_HH_TOP - MIN_STANDOFF;
        }
      }
    }
  } else {
    // 接战：贴脸攻击
    m.atkCD -= dt;
    if(m.atkCD <= 0){
      let dmgToFortress = m.dps;
      G.fortress.hp -= dmgToFortress;
      m.atkCD = 1;
      triggerShake(1, 0.06);
      sfx('fortress_hit');
    }
    // 即便不动也要确保不在矩形里（堡垒在上移，可能蹭到怪物）
    if(surfaceDist < MIN_STANDOFF && surfaceDist > 0.01){
      m.pos.x = near.cx + (near.dx / surfaceDist) * MIN_STANDOFF;
      m.pos.y = near.cy + (near.dy / surfaceDist) * MIN_STANDOFF;
    }
  }
}
function drawMonster(ctx, m){
  const cols = ['#d95745', '#d8843a', '#7e5cc8', '#6f4bb8'];
  const isBoss = !!m.bossRole;
  const isElite = !!m.eliteRole && !isBoss;
  const r = isBoss ? 31 : (isElite ? 19 : 14);
  const x = m.pos.x, y = m.pos.y;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(x, y + r * 0.75, r * (isBoss ? 1.22 : 0.9), r * (isBoss ? 0.42 : 0.35), 0, 0, Math.PI * 2);
  ctx.fill();

  if(isBoss){
    const pulse = 0.5 + 0.5 * Math.sin((G.time || 0) * 2.6 + m.id);
    const auraGrad = ctx.createRadialGradient(x, y + r * 0.08, r * 0.4, x, y + r * 0.08, r * 1.7);
    auraGrad.addColorStop(0, 'rgba(110,18,20,0.00)');
    auraGrad.addColorStop(0.58, `rgba(120,18,20,${0.10 + pulse * 0.04})`);
    auraGrad.addColorStop(1, 'rgba(25,8,10,0.00)');
    ctx.fillStyle = auraGrad;
    ctx.beginPath();
    ctx.ellipse(x, y + r * 0.06, r * 1.62, r * 1.34, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = `rgba(155,45,38,${0.34 + pulse * 0.10})`;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.ellipse(x, y + r * 0.16, r * 1.18, r * 0.92, -0.08, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();
  }

  if(m.frenzy){
    const pulse = 0.5 + 0.5 * Math.sin((G.time || 0) * 7 + m.id);
    ctx.strokeStyle = `rgba(220,44,32,${isBoss ? 0.34 + pulse * 0.18 : 0.42 + pulse * 0.2})`;
    ctx.lineWidth = isBoss ? 3 : 2;
    ctx.beginPath();
    ctx.arc(x, y, r + (isBoss ? 9 : 6) + pulse * 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  if(isBoss){
    ctx.shadowColor = 'rgba(130,28,24,0.62)';
    ctx.shadowBlur = 14;
  }
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.45, 3, x, y, r);
  grad.addColorStop(0, isBoss ? '#7d3430' : (isElite ? '#a483ff' : '#ffb06a'));
  grad.addColorStop(0.55, isBoss ? '#5f1f23' : (cols[m.lv - 1] || '#d95745'));
  grad.addColorStop(1, isBoss ? '#18090b' : (isElite ? '#2b1845' : '#4a1010'));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(x, y - r);
  ctx.quadraticCurveTo(x + r * (isBoss ? 1.05 : 0.95), y - r * 0.55, x + r * (isBoss ? 0.86 : 0.78), y + r * 0.32);
  ctx.quadraticCurveTo(x + r * 0.38, y + r * (isBoss ? 1.02 : 0.95), x, y + r * (isBoss ? 0.78 : 0.72));
  ctx.quadraticCurveTo(x - r * 0.38, y + r * (isBoss ? 1.02 : 0.95), x - r * (isBoss ? 0.86 : 0.78), y + r * 0.32);
  ctx.quadraticCurveTo(x - r * (isBoss ? 1.05 : 0.95), y - r * 0.55, x, y - r);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = isBoss ? '#b98a58' : (isElite ? '#d8c7ff' : 'rgba(255,255,255,0.85)');
  ctx.lineWidth = isBoss ? 3 : (isElite ? 1.8 : 1.5);
  ctx.stroke();

  if(isBoss){
    ctx.strokeStyle = 'rgba(45,12,12,0.78)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.86, y - r * 0.04);
    ctx.lineTo(x - r * 1.14, y - r * 0.28);
    ctx.moveTo(x + r * 0.86, y - r * 0.04);
    ctx.lineTo(x + r * 1.14, y - r * 0.28);
    ctx.stroke();

    const crownGrad = ctx.createLinearGradient(x, y - r * 1.18, x, y - r * 0.58);
    crownGrad.addColorStop(0, '#e0b46a');
    crownGrad.addColorStop(1, '#7b4826');
    ctx.fillStyle = crownGrad;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.56, y - r * 0.78);
    ctx.lineTo(x - r * 0.24, y - r * 1.03);
    ctx.lineTo(x, y - r * 0.84);
    ctx.lineTo(x + r * 0.24, y - r * 1.03);
    ctx.lineTo(x + r * 0.56, y - r * 0.78);
    ctx.lineTo(x + r * 0.38, y - r * 0.60);
    ctx.lineTo(x - r * 0.38, y - r * 0.60);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#2c1208';
    ctx.lineWidth = 1.6;
    ctx.stroke();
  } else if(isElite){
    ctx.strokeStyle = 'rgba(216,199,255,0.75)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(x, y, r + 3, Math.PI * 1.08, Math.PI * 1.92);
    ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - r * 0.28, y - r * 0.12, isBoss ? 3.1 : (isElite ? 2.6 : 2.2), 0, Math.PI * 2);
  ctx.arc(x + r * 0.28, y - r * 0.12, isBoss ? 3.1 : (isElite ? 2.6 : 2.2), 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x - r * 0.28, y - r * 0.12, isBoss ? 1.45 : 1, 0, Math.PI * 2);
  ctx.arc(x + r * 0.28, y - r * 0.12, isBoss ? 1.45 : 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = isBoss ? 'bold 10px Arial' : (isElite ? 'bold 9px Arial' : 'bold 9px Arial');
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,0,0,0.72)';
  ctx.lineWidth = 2;
  const label = isBoss ? '首' : (isElite ? '精' : m.lv);
  ctx.strokeText(label, x, y + r * 0.26);
  ctx.fillText(label, x, y + r * 0.26);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();

  drawHPBar(ctx, x, y - r - 8, isBoss ? 58 : (isElite ? 44 : 32), isBoss ? 6 : 5, m.hp, m.maxHp, '#2ecc71', '#e74c3c');

  // 周瑜燃身：头顶火焰 + 描边发热
  if(m.zhouyuBurn && m.zhouyuBurn.until > G.time){
    const fT = G.time * 8;
    const stack = m.zhouyuBurn.stack || 1;
    // 描红光晕
    ctx.save();
    ctx.shadowColor = '#ff5028';
    ctx.shadowBlur = 6 + stack * 2;
    ctx.strokeStyle = `rgba(255,90,40,${0.55 + 0.15*stack})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(m.pos.x, m.pos.y, r + 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    // 头顶火苗（3个跳动小三角）
    for(let i = 0; i < 3; i++){
      const ph = fT + i * 1.5;
      const fy = Math.sin(ph) * 2;
      const fx = (i - 1) * 4;
      ctx.fillStyle = `rgba(255, ${100 + Math.sin(ph)*40 | 0}, 30, 0.85)`;
      ctx.beginPath();
      ctx.moveTo(m.pos.x + fx, m.pos.y - r - 14 + fy);
      ctx.lineTo(m.pos.x + fx - 3, m.pos.y - r - 8 + fy);
      ctx.lineTo(m.pos.x + fx + 3, m.pos.y - r - 8 + fy);
      ctx.closePath();
      ctx.fill();
    }
    // 层数
    if(stack > 1){
      ctx.fillStyle = '#ffaa30';
      ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('×' + stack, m.pos.x, m.pos.y - r - 18);
    }
  }

  // 郭嘉奇谋：头顶倒计时圈
  if(m.guojiaMark && m.guojiaMark.explodeAt > G.time){
    const left = m.guojiaMark.explodeAt - G.time;
    const dur = m.guojiaMark.isTrue ? 1.5 : 2.0;
    const ratio = Math.max(0, Math.min(1, left / dur));
    const angle = ratio * Math.PI * 2;
    const cx = m.pos.x, cy = m.pos.y - r - 14;
    ctx.save();
    ctx.strokeStyle = 'rgba(160,112,255,0.85)';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#a070ff';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(cx, cy, 7, -Math.PI/2, -Math.PI/2 + angle);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('谋', cx, cy);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }

  // Stun visualization: 3 yellow stars rotating above
  if(m.stunUntil > G.time){
    for(let i = 0; i < 3; i++){
      const ang = G.time * 4 + i * (Math.PI * 2 / 3);
      const sx = m.pos.x + Math.cos(ang) * 10;
      const sy = m.pos.y - 22 + Math.sin(ang) * 4;
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Slow visualization: blue circle below
  if(m.slowUntil > G.time){
    ctx.fillStyle = 'rgba(100, 180, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(m.pos.x, m.pos.y + 16, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
//  PROJECTILES  (archer arrows with pierce)
// ============================================================
function updateProjectiles(dt){
  for(let i = G.projectiles.length - 1; i >= 0; i--){
    const p = G.projectiles[i];

    // 夏侯渊：连射有 spawnAt 延时，未到时间不前进/不渲染
    if(p.spawnAt && p.spawnAt > G.time) continue;

    // Move
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.lifetime -= dt;

    if(p.lifetime <= 0){
      G.projectiles.splice(i, 1);
      continue;
    }

    // Off-screen cleanup
    if(p.x < -50 || p.x > CW + 50 || p.y < -200 || p.y > WORLD_H + 200){
      G.projectiles.splice(i, 1);
      continue;
    }

    // === 太史慈弹射箭：命中后弹射到下一目标 ===
    if(p.owner === 'archer' && p.taishici){
      let hitTarget = null;
      // 1. 优先按 targetId 锁定（容错：若主目标尚未达到命中距离但已死亡，立即触发弹射）
      if(p.targetId != null){
        const tgt = G.monsters.find(m => m.id === p.targetId);
        if(tgt && tgt.hp <= 0){
          // 主目标已死，按原计划立即弹射（命中点取该死目标位置）
          hitTarget = { pos: tgt.pos, id: tgt.id, hp: 0.0001 }; // 临时壳，让流程继续
          // 但不重复扣血（伤害置 0）
          p._tsForcedBounce = true;
        }
      }
      // 2. 常规距离命中（排除已弹射过的目标，避免重复命中"自己"）
      if(!hitTarget){
        for(const m of G.monsters){
          if(m.hp <= 0) continue;
          if((p.tsChasedIds || []).indexOf(m.id) >= 0) continue;
          if(vdist({x:p.x, y:p.y}, m.pos) < 22){ hitTarget = m; break; }
        }
      }
      if(hitTarget){
        const isFirstHit = (p.tsChasedIds || []).length === 0;
        // 首次命中 100%；弹射伤害 L1-L4 50% / 真 70%，buff taishiciPower 每层 +15%
        let bounceMul = (p.tsIsTrue ? 0.7 : 0.5) + (G.buffs.taishiciPower || 0);
        const dmg = isFirstHit ? p.dmg : p.dmg * bounceMul;
        if(!p._tsForcedBounce && hitTarget.hp > 0){
          dealDamage(hitTarget, dmg, 'archer', false, ['normal','single','ranged']);
        }
        p._tsForcedBounce = false;
        p.tsChasedIds = p.tsChasedIds || [];
        p.tsChasedIds.push(hitTarget.id);
        // 弹射次数仅在"非首次命中"时扣减；首次命中不消耗 tsChaseLeft
        if(!isFirstHit) p.tsChaseLeft = (p.tsChaseLeft || 0) - 1;
        // 寻下一目标（不限距离）
        if(p.tsChaseLeft > 0){
          let next = null, nd = Infinity;
          const fortressPt = G.fortress
            ? { x: G.fortress.worldX, y: G.fortress.worldY }
            : { x: hitTarget.pos.x, y: hitTarget.pos.y };
          for(const m of G.monsters){
            if(m.hp <= 0) continue;
            if(p.tsChasedIds.indexOf(m.id) >= 0) continue;
            const d = vdist(m.pos, fortressPt);
            if(d < nd){ nd = d; next = m; }
          }
          if(next){
            // 箭矢从命中点重定向到 next（避免跨场穿越视觉穿帮）
            p.x = hitTarget.pos.x;
            p.y = hitTarget.pos.y;
            const dx = next.pos.x - p.x, dy = next.pos.y - p.y;
            const len = Math.hypot(dx, dy) || 1;
            const spd = 320;
            p.vx = dx / len * spd;
            p.vy = dy / len * spd;
            p.targetId = next.id;
            p.lifetime = 2.0;
            spawnParticleBurst(hitTarget.pos.x, hitTarget.pos.y, '#f0c040', 8);
            spawnSkillPopup(hitTarget.pos.x, hitTarget.pos.y - 22, '弹射', '#f0c040');
            continue;
          }
        }
        // L5 满 6 链触发"贯穿" — 所有命中目标额外 50% AOE
        if(p.tsIsTrue && p.tsChasedIds.length >= 6){
          for(const id of p.tsChasedIds){
            const m = G.monsters.find(x => x.id === id);
            if(m && m.hp > 0){
              for(const m2 of G.monsters){
                if(m2.hp <= 0 || vdist(m.pos, m2.pos) > 40) continue;
                dealDamage(m2, dmg * 0.5, 'archer', false, ['skill','aoe','ranged']);
              }
            }
          }
          spawnSkillPopup(hitTarget.pos.x, hitTarget.pos.y - 28, '贯穿', '#ffd700');
        }
        G.projectiles.splice(i, 1);
        continue;
      }
    }

    // === 夏侯渊连射：命中后若是最后一发且目标存活，补射 ===
    if(p.owner === 'archer' && p.xiahouyuan){
      let hitTarget = null;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(vdist({x:p.x, y:p.y}, m.pos) < 18){ hitTarget = m; break; }
      }
      if(hitTarget){
        dealDamage(hitTarget, p.dmg, 'archer', false, ['normal','single','ranged']);
        if(p.isLast && hitTarget.hp > 0 && (p.xhyTrueRefill || 0) > 0){
          // 补射：放下一发
          const dx = hitTarget.pos.x - p.x, dy = hitTarget.pos.y - p.y;
          const len = Math.hypot(dx, dy) || 1;
          const spd = 280;
          G.projectiles.push({
            x: p.x, y: p.y,
            vx: dx / len * spd, vy: dy / len * spd,
            targetId: hitTarget.id,
            dmg: p.dmg,
            owner: 'archer',
            spawnAt: G.time + 0.1,
            xiahouyuan: true,
            isLast: true,
            xhyTrueRefill: p.xhyTrueRefill - 1,
            lifetime: 2.0
          });
        }
        G.projectiles.splice(i, 1);
        continue;
      }
    }

    // === 黄忠箭矢：命中目标后概率爆炸 ===
    if(p.owner === 'archer'){
      let hitTarget = null;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(vdist({x:p.x, y:p.y}, m.pos) < 18){
          hitTarget = m;
          break;
        }
      }
      if(hitTarget){
        // 黄忠箭矢的暴击：来自致命瞄准 archerCrit 暴击率，造成 (2 + archerCritDmg) 倍伤害
        const critRate = (G.buffs.archerCrit || 0);
        const isCrit = Math.random() < critRate;
        const critMult = 2 + (G.buffs.archerCritDmg || 0);
        const mainDmg = isCrit ? p.dmg * critMult : p.dmg;
        dealDamage(hitTarget, mainDmg, 'archer', isCrit, ['normal','single','ranged']);
        if(isCrit){ sfx('crit'); spawnParticleBurst(hitTarget.pos.x, hitTarget.pos.y, '#ffd700', 6); }
        else sfx('hit');

        // 概率爆炸：爆炸范围溅射伤害（爆炸自身视为重击，标记为暴击色）
        if(Math.random() < p.explodeChance){
          const explodeDmg = p.dmg * p.explodeDmgMult;
          for(const m of G.monsters){
            if(m === hitTarget || m.hp <= 0) continue;
            if(vdist(m.pos, hitTarget.pos) <= p.explodeRadius){
              dealDamage(m, explodeDmg, 'archer', true, ['skill','aoe','ranged']);
            }
          }
          // 黄忠爆裂跳字
          spawnSkillPopup(hitTarget.pos.x, hitTarget.pos.y - 28, '爆裂', CLASS_COLOR.archer);
          // 爆炸视觉效果
          G.explosionEffects = G.explosionEffects || [];
          G.explosionEffects.push({
            x: hitTarget.pos.x, y: hitTarget.pos.y,
            radius: p.explodeRadius,
            until: G.time + 0.3,
            color: '#ff8c00'
          });
          spawnParticleBurst(hitTarget.pos.x, hitTarget.pos.y, '#ff8c00', 16);
          triggerShake(3, 0.1);
          sfx('explode');
        }
        G.projectiles.splice(i, 1);
        continue;
      }
    }

    // === 法师雷球：命中后AOE ===
    if(p.owner === 'mage'){
      let hitTarget = null;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(vdist({x:p.x, y:p.y}, m.pos) < 18){
          hitTarget = m;
          break;
        }
      }
      if(hitTarget){
        // AOE伤害
        for(const m of G.monsters){
          if(m.hp <= 0) continue;
          if(vdist(m.pos, hitTarget.pos) <= p.aoeRadius){
            dealDamage(m, p.dmg, 'mage', false, ['normal','aoe','ranged']);
            if(p.slow > 0){
              applySlow(m, 2, p.slow);
            }
          }
        }
        // 周瑜燃身：给主目标挂 DOT
        if(p.zhouyuMark){
          // 找到来源英雄
          const src = G.heroes.find(x => x.id === p.zhouyuMark.heroId);
          if(src) applyZhouyuBurn(hitTarget, src, p.zhouyuMark.isTrue);
          spawnSkillPopup(hitTarget.pos.x, hitTarget.pos.y - 24, '燃身', '#ff7028');
        }
        // AOE视觉效果
        G.explosionEffects = G.explosionEffects || [];
        G.explosionEffects.push({
          x: hitTarget.pos.x, y: hitTarget.pos.y,
          radius: p.aoeRadius,
          until: G.time + 0.3,
          color: p.zhouyuMark ? '#ff7028' : '#9b59b6'
        });
        G.projectiles.splice(i, 1);
        continue;
      }
    }

    // === 辅助音波：单体伤害 ===
    if(p.owner === 'support'){
      let hitTarget = null;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(vdist({x:p.x, y:p.y}, m.pos) < 18){
          hitTarget = m;
          break;
        }
      }
      if(hitTarget){
        dealDamage(hitTarget, p.dmg, 'support', false, ['normal','single','ranged']);
        G.projectiles.splice(i, 1);
        continue;
      }
    }

    // === 炮台小箭：单体普攻伤害（命中即消失） ===
    if(p.owner === 'turret'){
      let hitTarget = null;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(vdist({x:p.x, y:p.y}, m.pos) < 16){
          hitTarget = m;
          break;
        }
      }
      if(hitTarget){
        const prevHp = hitTarget.hp;
        dealDamage(hitTarget, p.dmg, 'gather', false, ['normal','single','ranged']);
        // 击杀奖励金币（黄金机关）：5金 × 层数
        const goldBoom = G.buffs.gatherGoldBoom || 0;
        if(hitTarget.hp <= 0 && prevHp > 0 && goldBoom > 0){
          const bonus = 5 * goldBoom;
          G.gold += bonus;
          spawnSkillPopup(hitTarget.pos.x, hitTarget.pos.y - 16, '+' + bonus + '金', '#ffd700');
        }
        sfx('hit');
        G.projectiles.splice(i, 1);
        continue;
      }
    }
  }

  // 更新爆炸特效
  if(G.explosionEffects){
    for(let i = G.explosionEffects.length - 1; i >= 0; i--){
      if(G.explosionEffects[i].until <= G.time){
        G.explosionEffects.splice(i, 1);
      }
    }
  }
}
function drawProjectiles(ctx){
  for(const p of G.projectiles){
    const ang = Math.atan2(p.vy, p.vx);
    const tailX = p.x - Math.cos(ang) * 16;
    const tailY = p.y - Math.sin(ang) * 16;
    if(p.owner === 'mage'){
      ctx.save();
      ctx.strokeStyle = 'rgba(190,120,255,0.55)';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.shadowColor = '#c77dff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#9b59b6';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10 + Math.sin((G.time || 0) * 12) * 2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if(p.owner === 'support'){
      ctx.save();
      ctx.strokeStyle = 'rgba(255,95,162,0.45)';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tailX, tailY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.fillStyle = '#ff5fa2';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,170,215,0.75)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if(p.owner === 'turret'){
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ang);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-8, 0);
      ctx.lineTo(7, 0);
      ctx.stroke();
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.moveTo(9, 0);
      ctx.lineTo(3, -3);
      ctx.lineTo(3, 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(ang);
      ctx.strokeStyle = '#f0c040';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(9, 0);
      ctx.stroke();
      ctx.fillStyle = '#fff0a0';
      ctx.beginPath();
      ctx.moveTo(11, 0);
      ctx.lineTo(4, -4);
      ctx.lineTo(4, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // 爆炸特效绘制
  if(G.explosionEffects){
    for(const ex of G.explosionEffects){
      const progress = Math.max(0, Math.min(1, 1 - (ex.until - G.time) / 0.3));
      const alpha = Math.max(0, 1 - progress);
      const r = Math.max(0, ex.radius * progress);
      ctx.strokeStyle = ex.color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

//  CHAIN EFFECTS
// ============================================================
function drawChainEffects(ctx){
  for(const ce of G.chainEffects){
    ctx.save();
    const col = ce.color || '#7dd3ff';
    ctx.strokeStyle = col;
    ctx.lineWidth = 3.5;
    ctx.shadowColor = col;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(ce.from.x, ce.from.y);
    const dx = ce.to.x - ce.from.x;
    const dy = ce.to.y - ce.from.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    for(let i = 1; i <= 3; i++){
      const t = i / 4;
      const jitter = (Math.random() - 0.5) * 22;
      ctx.lineTo(ce.from.x + dx * t + nx * jitter, ce.from.y + dy * t + ny * jitter);
    }
    ctx.lineTo(ce.to.x, ce.to.y);
    ctx.stroke();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.1;
    ctx.shadowBlur = 0;
    ctx.stroke();
    ctx.restore();
  }
}

// ============================================================
function updateThunderClouds(dt){
  // 雷云仅张角触发；周瑜/郭嘉有自己的被动
  const mages = G.heroes.filter(h => h.cls === 'mage' && h.heroId === 'zhangjiao');
  for(const mage of mages){
    mage.cloudCD = (mage.cloudCD || 0) - dt;
    if(mage.cloudCD <= 0){
      if(G.monsters.length > 0){
        const isTrue = mage.lv >= 5;
        // 真·张角「苍天逝矣」：雷云半径+50%，持续+100%
        const cloudRadius = 80 * (1 + (G.buffs.mageRange || 0)) * (isTrue ? 1.5 : 1);

        // Find position with most monsters in range
        let bestX = G.monsters[0].pos.x, bestY = G.monsters[0].pos.y;
        let bestCount = 0;
        for(const candidate of G.monsters){
          let count = 0;
          for(const m of G.monsters){
            if(vdist(candidate.pos, m.pos) <= cloudRadius) count++;
          }
          if(count > bestCount){
            bestCount = count;
            bestX = candidate.pos.x;
            bestY = candidate.pos.y;
          }
        }

        const cloudDur = (5 + (G.buffs.mageCloud || 0) * 2) * (isTrue ? 2 : 1);
        G.thunderClouds.push({
          x: bestX, y: bestY,
          until: G.time + cloudDur,
          dmgInterval: 0.5,
          lastTick: G.time,
          dmg: heroDPS(mage) * (0.2 + (mage.lv - 1) * 0.1),
          radius: cloudRadius
        });
        // 张角雷云跳字
        spawnSkillPopup(bestX, bestY - cloudRadius - 8, isTrue ? '苍天逝矣' : '雷云', CLASS_COLOR.mage);
        triggerShake(2, 0.15);
        // 闪电闪屏（淡白偏紫，时间短，强度低）
        triggerScreenFlash(0.12, '230, 220, 255', 0.22);
        sfx('thunder');
        const baseCD = [15, 13, 11, 9, 4.5][Math.min(mage.lv - 1, 4)];
        let cd = Math.max(3, baseCD - (G.buffs.mageCloud || 0) * 2);
        if(isTrue) cd *= 0.5;
        mage.cloudCD = cd;
      } else {
        mage.cloudCD = 1;
      }
    }
  }

  for(let i = G.thunderClouds.length - 1; i >= 0; i--){
    const c = G.thunderClouds[i];
    if(G.time >= c.until){
      G.thunderClouds.splice(i, 1);
      continue;
    }
    if(G.time >= c.lastTick + c.dmgInterval){
      c.lastTick = G.time;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(vdist(m.pos, {x:c.x, y:c.y}) <= c.radius){
          dealDamage(m, c.dmg, 'mage', false, ['skill','aoe','ranged']);
          if(G.buffs.mageSlow){
            applySlow(m, 2, Math.min(0.8, G.buffs.mageSlow));
          }
        }
      }
    }
  }
}
function drawThunderClouds(ctx){
  for(const c of G.thunderClouds){
    ctx.fillStyle = 'rgba(120, 92, 190, 0.18)';
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(155, 130, 220, 0.46)';
    ctx.lineWidth = 2;
    ctx.stroke();
    for(let i = 0; i < 2; i++){
      const ang = Math.random() * Math.PI * 2;
      const r = Math.random() * c.radius;
      ctx.fillStyle = 'rgba(240,245,180,0.72)';
      ctx.beginPath();
      ctx.arc(c.x + Math.cos(ang)*r, c.y + Math.sin(ang)*r, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function updateSupportAura(dt){
  // 光环仅蔡文姬触发；貂蝉/荀彧有自己的被动
  const supports = G.heroes.filter(h => h.cls === 'support' && h.heroId === 'caiwenji');
  for(const sup of supports){
    sup.auraCD = (sup.auraCD || 0) - dt;
    if(sup.auraCD > 0) continue;

    // 释放前置条件：普通攻击范围内必须有敌人
    const atkRange = CLASS_RANGE.support || 120;
    let hasEnemyInAtk = false;
    for(const m of G.monsters){
      if(m.hp <= 0) continue;
      if(vdist(m.pos, heroPos(sup)) <= atkRange){ hasEnemyInAtk = true; break; }
    }
    if(!hasEnemyInAtk){
      // 没有可攻击敌人：每0.2秒重新检查，CD不推进释放
      sup.auraCD = 0.2;
      continue;
    }

    const isTrue = sup.lv >= 5;
    const radius = (100 + (sup.lv - 1) * 30) * (1 + (G.buffs.supRange || 0)) * (isTrue ? 2 : 1);
    // 减速扇形范围 = 攻击范围的150%~210%（按等级提升）
    const baseSlow = (CLASS_RANGE.support || 120) * (1.5 + (sup.lv - 1) * 0.2);
    const slowRadius = baseSlow * (1 + (G.buffs.supRange || 0)) * (isTrue ? 2 : 1);
    const slowAmt = (0.5 + (sup.lv - 1) * 0.1) * (isTrue ? 1.2 : 1);

    // 蔡文姬增益：直接给被增益友军一个百分比攻击力加成（受持久祝福 supDuration 强化）
    // 1级+30% / 2级+45% / 3级+65% / 4级+90% / 5级+130%
    const baseRatio = [0.30, 0.45, 0.65, 0.90, 1.30][Math.min(sup.lv - 1, 4)];
    const atkBonus = baseRatio * (1 + (G.buffs.supDuration || 0) * 0.30);
    const buffStackCount = 3 + (G.buffs.supDuration || 0);

    // 找出范围内所有友军（除采集和辅助）
    const candidates = [];
    for(const h of G.heroes){
      if(h.cls === 'support' || h.cls === 'gather') continue;
      const d = vdist(heroPos(h), heroPos(sup));
      if(d <= radius) candidates.push(h);
    }

    let buffTarget = null;
    if(candidates.length > 0){
      if(isTrue){
        // 真·蔡文姬：群体增益（全候选）
        for(const t of candidates){
          t.buffStacks = buffStackCount;
          t.buffAtkBonus = atkBonus;
        }
        buffTarget = candidates[0];
      } else {
        // 增益人数：基础1 + supSlow（天音回响每层+1人）
        const buffCount = 1 + (G.buffs.supSlow || 0);
        const noBuff = candidates.filter(h => h.buffStacks <= 0);
        const sortedCandidates = noBuff.length > 0 ? noBuff : (() => {
          const minLv = Math.min(...candidates.map(h => h.lv));
          return candidates.filter(h => h.lv === minLv);
        })();
        const shuffled = sortedCandidates.slice().sort(() => Math.random() - 0.5);
        const targets = shuffled.slice(0, buffCount);
        for(const t of targets){
          t.buffStacks = buffStackCount;
          t.buffAtkBonus = atkBonus;
        }
        buffTarget = targets[0]; // 主目标用于光束特效
      }
    }

    // 真·蔡文姬「胡笳救主」：施放时回复堡垒5HP
    if(isTrue && G.fortress){
      const heal = 5;
      const before = G.fortress.hp;
      G.fortress.hp = Math.min(G.fortress.maxHp, G.fortress.hp + heal);
      const real = G.fortress.hp - before;
      if(real > 0){
        spawnSkillPopup(G.fortress.worldX, G.fortress.worldY - 18, '+' + real, '#80ffaa');
      }
    }

    // 范围内敌人减速：以蔡文姬朝向(目标方向)为中心扇形120°
    let facingX = 0, facingY = -1;
    if(sup.target && sup.target.hp > 0){
      const dx = sup.target.pos.x - sup.worldX;
      const dy = sup.target.pos.y - sup.worldY;
      const len = Math.hypot(dx, dy) || 1;
      facingX = dx / len; facingY = dy / len;
    }
    const halfArc = Math.cos(Math.PI / 3);

    for(const m of G.monsters){
      const dx = m.pos.x - sup.worldX, dy = m.pos.y - sup.worldY;
      const d = Math.hypot(dx, dy);
      if(d > slowRadius || d < 1) continue;
      const dot = (dx / d) * facingX + (dy / d) * facingY;
      if(dot < halfArc) continue;
      applySlow(m, 5 + (G.buffs.supSlow || 0) * 2, slowAmt);
    }
    G.auraEffects.push({
      x: sup.worldX, y: sup.worldY,
      until: G.time + 0.5,
      // 不画大圆环（避免误导成范围效果）
      // 用一条从蔡文姬到目标友军的光束表达"指向单体"
      beamTo: buffTarget ? { x: buffTarget.worldX, y: buffTarget.worldY } : null,
      fanDirX: facingX,
      fanDirY: facingY,
      fanRadius: slowRadius
    });
    // 蔡文姬扰乱跳字
    spawnSkillPopup(sup.worldX, sup.worldY - 24, '扰乱', CLASS_COLOR.support);

    // 该辅助的下次CD
    sup.auraCD = 10 / (1 + (G.buffs.supSlow || 0) * 0.15);
  }
}
function updateAuraEffects(dt){
  for(let i = G.auraEffects.length - 1; i >= 0; i--){
    if(G.auraEffects[i].until <= G.time){
      G.auraEffects.splice(i, 1);

function drawAuraEffects(ctx){
  for(const a of G.auraEffects){
    const progress = Math.max(0, Math.min(1, 1 - (a.until - G.time) / 0.5));
    const alpha = Math.max(0, 1 - progress);
    // 增益光束：从蔡文姬到目标友军
    if(a.beamTo){
      ctx.strokeStyle = `rgba(255, 95, 162, ${alpha})`;
      ctx.lineWidth = 3;
      ctx.shadowColor = '#ff5fa2';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(a.beamTo.x, a.beamTo.y);
      ctx.stroke();
      ctx.shadowBlur = 0;
      // 目标位置一个小光点
      ctx.fillStyle = `rgba(255, 95, 162, ${alpha})`;
      ctx.beginPath();
      ctx.arc(a.beamTo.x, a.beamTo.y, 6 * (1 - progress * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    // 减速扇形（120°朝向扇形）
    if(a.fanDirX !== undefined){
      const fanR = Math.max(0, a.fanRadius * progress);
      const baseAngle = Math.atan2(a.fanDirY, a.fanDirX);
      const startA = baseAngle - Math.PI / 3;
      const endA   = baseAngle + Math.PI / 3;
      ctx.fillStyle = `rgba(100, 180, 255, ${alpha * 0.18})`;
      ctx.strokeStyle = `rgba(100, 180, 255, ${alpha * 0.58})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.arc(a.x, a.y, fanR, startA, endA);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  }
}

// ============================================================
//  RESOURCE
// ============================================================
const RESOURCE_TIER = {
  basic: { yieldMult: 1,   fill:'#2ecc71', stroke:'#27ae60', bar:'#2ecc71' },
  mid:   { yieldMult: 2,   fill:'#46d6b0', stroke:'#1f9f84', bar:'#46d6b0' },
  high:  { yieldMult: 4,   fill:'#ffd700', stroke:'#ffaa00', bar:'#ffd700' }
};
const RESOURCE_VISIBLE_LEAD = CH * 0.4;

function hasMidResourceTier(){
  return !!(isInfiniteRun() || (G && G.waves && G.waves.length >= 10));
}

function hasHighResourceTier(){
  return !!(isInfiniteRun() || (G && G.waves && G.waves.length >= 15));
}

function isTieredResourceLevel(){
  return hasMidResourceTier();
}

function getResourceVisibleProgressByY(wy){
  const firstVisibleAt = FORTRESS_START_Y - RESOURCE_VISIBLE_LEAD;
  return Math.max(0, Math.min(1, (firstVisibleAt - wy) / FORTRESS_TRAVEL));
}

function pickResourceTierByY(wy, roll){
  if(!isTieredResourceLevel()) return 'basic';
  if(isInfiniteRun()) return pickInfiniteResourceTier(roll);
  const p = getResourceVisibleProgressByY(wy);
  let midProb = 0;
  let highProb = 0;

  if(p >= 1 / 3 && p < 2 / 3){
    midProb = ((p - 1 / 3) / (1 / 3)) * 0.3;
  } else if(p >= 2 / 3){
    midProb = 0.3;
    highProb = hasHighResourceTier() ? ((p - 2 / 3) / (1 / 3)) * 0.2 : 0;
  }

  roll = roll == null ? Math.random() : roll;
  if(roll < highProb) return 'high';
  if(roll < highProb + midProb) return 'mid';
  return 'basic';
}

function pickInfiniteResourceTier(roll){
  const probs = getInfiniteResourceTierWeights();
  const midProb = probs.mid;
  const highProb = probs.high;
  roll = roll == null ? Math.random() : roll;
  if(roll < highProb) return 'high';
  if(roll < highProb + midProb) return 'mid';
  return 'basic';
}

function getInfiniteResourceTierWeights(){
  const wave = Math.max(1, (G && G.waveIdx) || 1);
  return {
    mid: Math.min(0.3, wave / 10 * 0.3),
    high: Math.min(0.15, wave / 20 * 0.15)
  };
}

function setResourceTier(r, tier){
  tier = RESOURCE_TIER[tier] ? tier : 'basic';
  const cfg = RESOURCE_TIER[tier];
  r.tier = tier;
  r.yieldMult = cfg.yieldMult;
  r.special = tier === 'high';
}

function makeResource(wx, wy, tier){
  tier = RESOURCE_TIER[tier] ? tier : 'basic';
  const cfg = RESOURCE_TIER[tier];
  return {
    pos: v2(wx, wy),
    hp: 30, maxHp: 30,
    done: false,
    special: tier === 'high',
    speedMult: 1,
    tier,
    yieldMult: cfg.yieldMult
  };
}

function ensureResourceTierMinimums(){
  if(!isTieredResourceLevel()) return;
  const minMid = hasHighResourceTier() ? 7 : 5;
  const minHigh = hasHighResourceTier() ? 3 : 0;

  const countTier = tier => G.resources.filter(r => r.tier === tier).length;
  const candidates = G.resources
    .map(r => ({ r, p: getResourceVisibleProgressByY(r.pos.y) }))
    .filter(x => x.p > 0);

  if(minHigh > 0){
    let highCount = countTier('high');
    const highCandidates = candidates
      .filter(x => x.p >= 2 / 3 && x.r.tier !== 'high')
      .sort((a, b) => b.p - a.p);
    for(const x of highCandidates){
      if(highCount >= minHigh) break;
      setResourceTier(x.r, 'high');
      highCount++;
    }
  }

  let midCount = countTier('mid');
  const midCandidates = candidates
    .filter(x => x.p >= 1 / 3 && x.r.tier === 'basic')
    .sort((a, b) => b.p - a.p);
  for(const x of midCandidates){
    if(midCount >= minMid) break;
    setResourceTier(x.r, 'mid');
    midCount++;
  }
}

function tryRespawnResource(r){
  // 黄月英采集完成后仅尝试部署炮台（已移除金矿重生）
  tryDeployTurret(r.pos.x, r.pos.y);
}

// 炮台：采集完成时按概率部署
function tryDeployTurret(wx, wy){
  let gatherLv = 0;
  // 只有黄月英会部署炮台；鲁肃 / 邓艾 有自己的被动
  for(const h of G.heroes){
    if(h.cls === 'gather' && h.heroId === 'huangyueying' && h.lv > gatherLv) gatherLv = h.lv;
  }
  if(gatherLv === 0) return;
  // 召唤概率：基础40% + 每级10% + buff +15%/层 → L1 50% / L4 80%；L5（真·黄月英 木牛流马）100%
  const turretBuff = G.buffs.gatherTurret || 0;
  let chance = 0.40 + (gatherLv - 1) * 0.10 + turretBuff * 0.15;
  if(gatherLv >= 5) chance = 1.0;
  if(Math.random() > chance) return;
  // 存活时间：基础15秒 + 每级+2秒 + buff +5秒/层；L5存活 ×2
  let lifetime = 15 + (gatherLv - 1) * 2 + turretBuff * 5;
  if(gatherLv >= 5) lifetime *= 2;
  G.turrets = G.turrets || [];
  G.turrets.push({
    id: Math.random(),
    pos: v2(wx, wy),
    spawnTime: G.time,
    expireAt: G.time + lifetime,
    atkCD: 0,
    gatherLv,
    isMega: gatherLv >= 5,
    exploded: false
  });
  spawnSkillPopup(wx, wy - 14, gatherLv >= 5 ? '巨型炮台' : '炮台', '#ffd700');
  sfx('summon');
}

// 炮台主循环
function updateTurrets(dt){
  if(!G.turrets || G.turrets.length === 0) return;
  const TURRET_RANGE = 110;
  const BASE_CD = 1.2; // 1.2s/箭基础攻速
  const turretBuff = G.buffs.gatherTurret || 0;
  const cdMult = 1 + turretBuff * 0.25; // 每层 +25% 攻速
  for(let i = G.turrets.length - 1; i >= 0; i--){
    const t = G.turrets[i];
    // 寿命到期 → 爆炸
    if(G.time >= t.expireAt){
      if(!t.exploded){
        explodeTurret(t);
        t.exploded = true;
      }
      G.turrets.splice(i, 1);
      continue;
    }
    // 攻击
    t.atkCD -= dt;
    if(t.atkCD > 0) continue;
    // 找范围内最近敌人
    const range = t.isMega ? TURRET_RANGE * 1.3 : TURRET_RANGE;
    let best = null, bd = Infinity;
    for(const m of G.monsters){
      if(m.hp <= 0) continue;
      const d = vdist(t.pos, m.pos);
      if(d < bd && d <= range){ bd = d; best = m; }
    }
    if(!best) continue;
    // L5巨型炮台攻速×2
    const tCD = (BASE_CD / cdMult) / (t.isMega ? 2 : 1);
    t.atkCD = tCD;
    fireTurretArrow(t, best);
  }
}

function fireTurretArrow(t, target){
  G.projectiles = G.projectiles || [];
  // 黄月英基础DPS × 0.3 作为单次普攻伤害（攻速慢）；L5巨型炮台×2
  const baseDps = CLASS_DPS.gather[t.gatherLv - 1] || 0;
  const dmg = baseDps * 0.3 * (t.isMega ? 2 : 1);
  const dx = target.pos.x - t.pos.x;
  const dy = target.pos.y - (t.pos.y - 4);
  const d = Math.hypot(dx, dy) || 1;
  const speed = 320;
  G.projectiles.push({
    owner: 'turret',
    x: t.pos.x, y: t.pos.y - 4,
    vx: (dx / d) * speed, vy: (dy / d) * speed,
    lifetime: 1.2,
    dmg,
    turretRef: t
  });
}

function explodeTurret(t){
  const RADIUS = t.isMega ? 75 * 1.5 : 75;
  const baseDps = CLASS_DPS.gather[t.gatherLv - 1] || 0;
  const dmg = baseDps * 3 * (t.isMega ? 2 : 1);
  const goldBoom = G.buffs.gatherGoldBoom || 0;
  let hitCount = 0;
  let killBonus = 0;
  for(const m of G.monsters){
    if(m.hp <= 0) continue;
    if(vdist(t.pos, m.pos) <= RADIUS){
      const prevHp = m.hp;
      dealDamage(m, dmg, 'gather', false, ['skill','aoe','ranged']);
      hitCount++;
      // 击杀奖励金币（黄金机关）：5金/敌/层
      if(m.hp <= 0 && prevHp > 0 && goldBoom > 0){
        killBonus += 5 * goldBoom;
      }
    }
  }
  let totalGold = 0;
  if(goldBoom > 0){
    // 爆炸固定奖励 20金/层 + 命中 3金/敌/层 + 击杀加成
    if(hitCount > 0){
      totalGold = 20 * goldBoom + hitCount * 3 * goldBoom + killBonus;
    } else {
      totalGold = killBonus;
    }
    if(totalGold > 0){
      G.gold += totalGold;
      spawnSkillPopup(t.pos.x, t.pos.y - 20, '+' + totalGold + '金', '#ffd700');
    }
  }
  // 视觉效果
  G.explosionEffects = G.explosionEffects || [];
  G.explosionEffects.push({
    x: t.pos.x, y: t.pos.y,
    radius: RADIUS,
    until: G.time + 0.3,
    color: '#ffaa20'
  });
  spawnParticleBurst(t.pos.x, t.pos.y, '#ffd700', 20);
  triggerShake(3, 0.15);
  sfx('explode');
}

function drawTurrets(ctx){
  if(!G.turrets || G.turrets.length === 0) return;
  for(const t of G.turrets){
    const remain = Math.max(0, t.expireAt - G.time);
    const total = t.expireAt - t.spawnTime;
    const ratio = total > 0 ? remain / total : 0;
    const pulse = 0.7 + 0.3 * Math.sin(G.time * 5);
    const sz = t.isMega ? 1.5 : 1;
    // 底座
    ctx.fillStyle = t.isMega ? '#7a5028' : '#5a4020';
    ctx.beginPath();
    ctx.arc(t.pos.x, t.pos.y + 4, 9 * sz, 0, Math.PI * 2);
    ctx.fill();
    // 炮塔本体
    ctx.fillStyle = ratio > 0.3 ? (t.isMega ? '#ffd060' : '#d4a040') : '#c04020';
    ctx.fillRect(t.pos.x - 6 * sz, t.pos.y - 8 * sz, 12 * sz, 12 * sz);
    ctx.strokeStyle = t.isMega ? '#fff080' : '#ffd700';
    ctx.lineWidth = t.isMega ? 2 : 1.5;
    ctx.strokeRect(t.pos.x - 6 * sz, t.pos.y - 8 * sz, 12 * sz, 12 * sz);
    if(t.isMega){
      ctx.strokeStyle = 'rgba(255,240,128,' + (0.4 + pulse * 0.4) + ')';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(t.pos.x - 9, t.pos.y - 11, 18, 18);
    }
    // 炮管：指向最近敌人
    let aimX = 1, aimY = 0;
    const aimRange = t.isMega ? 143 : 110;
    for(const m of G.monsters){
      if(m.hp <= 0) continue;
      const dx = m.pos.x - t.pos.x, dy = m.pos.y - t.pos.y;
      const d = Math.hypot(dx, dy);
      if(d <= aimRange && d > 0){ aimX = dx/d; aimY = dy/d; break; }
    }
    ctx.strokeStyle = t.isMega ? '#bbb' : '#888';
    ctx.lineWidth = t.isMega ? 3.5 : 2.5;
    ctx.beginPath();
    ctx.moveTo(t.pos.x, t.pos.y - 2);
    ctx.lineTo(t.pos.x + aimX * 10 * sz, t.pos.y - 2 + aimY * 10 * sz);
    ctx.stroke();
    // 倒计时环
    ctx.strokeStyle = ratio > 0.3 ? 'rgba(255,215,0,' + (0.5 + pulse * 0.3) + ')' : '#ff4040';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(t.pos.x, t.pos.y, 13 * sz, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ratio);
    ctx.stroke();
  }
}

function drawResource(ctx, r){
  if(r.done) return;
  const tierCfg = RESOURCE_TIER[r.tier] || RESOURCE_TIER.basic;
  const x = r.pos.x, y = r.pos.y;
  const drawShard = (dx, dy, w, h, fill, stroke) => {
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(x + dx, y + dy - h);
    ctx.lineTo(x + dx + w * 0.55, y + dy - h * 0.15);
    ctx.lineTo(x + dx + w * 0.25, y + dy + h * 0.35);
    ctx.lineTo(x + dx - w * 0.35, y + dy + h * 0.25);
    ctx.lineTo(x + dx - w * 0.5, y + dy - h * 0.2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.beginPath();
    ctx.moveTo(x + dx, y + dy - h * 0.75);
    ctx.lineTo(x + dx + w * 0.2, y + dy - h * 0.08);
    ctx.lineTo(x + dx, y + dy + h * 0.18);
    ctx.closePath();
    ctx.fill();
  };

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.24)';
  ctx.beginPath();
  ctx.ellipse(x, y + 8, r.tier === 'high' ? 15 : (r.tier === 'mid' ? 13 : 11), 5, 0, 0, Math.PI * 2);
  ctx.fill();

  if(r.tier === 'high'){
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 12;
    drawShard(-5, 4, 9, 18, '#ffd700', '#9a5a00');
    drawShard(4, 5, 8, 14, '#fff080', '#b87800');
    drawShard(0, 7, 7, 12, '#ffb42a', '#8a4a00');
    ctx.shadowBlur = 0;
    const ang = G.time * 3;
    for(let i = 0; i < 4; i++){
      const a = ang + i * Math.PI / 2;
      const sx = x + Math.cos(a) * 13;
      const sy = y + Math.sin(a) * 10;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if(r.tier === 'mid'){
    drawShard(-5, 5, 8, 15, '#46d6b0', '#147a67');
    drawShard(4, 6, 7, 12, '#8effdf', '#1f9f84');
    ctx.fillStyle = '#d8fff4';
    ctx.fillRect(x - 5, y - 2, 10, 4);
  } else {
    drawShard(-3, 5, 7, 12, '#2ecc71', '#176c38');
    drawShard(4, 6, 5, 9, '#74e08f', '#23964f');
  }
  ctx.restore();
  drawHPBar(ctx, x, y - 15, 22, 3, r.hp, r.maxHp, tierCfg.bar, '#888');
}

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let raf = null, lastT = null;
let paused = false;

function isInfiniteRun(){
  return !!(G && G.levelConfig && G.levelConfig.infinite);
}

function getMonsterLevelScale(){
  const gameLv = (G && G.level) || 1;
  if(isInfiniteRun()){
    return G.currentWaveScale || 1;
  }
  if(gameLv <= 5){
    return [0.8, 0.9, 1.0, 1.0, 1.0][gameLv - 1];
  }
  // LV6-9 缓坡：1.10 / 1.15 / 1.20 / 1.25
  if(gameLv >= 6 && gameLv <= 9){
    return [1.10, 1.15, 1.20, 1.25][gameLv - 6];
  }
  // LV10+ 仍按 1.15^(lv-5)（无尽走 G.currentWaveScale 上面已分支）
  return Math.pow(1.15, Math.max(0, gameLv - 5));
}

const WAVE_PRESSURE_LOOP = [0.9, 0.95, 1.0, 1.05, 1.1];
const WAVE_DIRECTION_LABEL = {
  top: '上方伏兵',
  bottom: '后方追兵',
  left: '左翼',
  right: '右翼',
  vertical: '上下夹击',
  horizontal: '左右夹击',
  surround: '上方合围'
};

function hasMajorEnemyConfig(wave){
  return !!(wave && wave.m && wave.m.some(c => c.lv === 4));
}

function isBossWaveConfig(wave, waveNo){
  if(!hasMajorEnemyConfig(wave)) return false;
  if(isInfiniteRun() && waveNo != null) return waveNo % 10 === 0;
  const totalWaves = (G && G.waves && G.waves.length) || 0;
  return totalWaves >= 15 && waveNo === totalWaves;
}

function isEliteRewardWave(wave, waveNo){
  if(!hasMajorEnemyConfig(wave)) return false;
  // 无尽：5x 波不掉、10x 波掉（每 10 波掉一次）
  if(isInfiniteRun()) return waveNo % 10 === 0;
  // 普通关：最后一波不掉宝（无论 elite/boss）
  const totalWaves = (G && G.waves && G.waves.length) || 0;
  if(waveNo === totalWaves) return false;
  return waveNo === 5 || waveNo === 10;
}

function getEntryPressureMult(mode){
  return 1.0;
}

function getWavePressureScale(waveNo, wave, mode){
  const phase = ((Math.max(1, waveNo) - 1) % 5);
  let scale = WAVE_PRESSURE_LOOP[phase] || 1;
  scale *= getFiniteWaveStageScale(waveNo);
  return scale * getEntryPressureMult(mode);
}

function getFiniteWaveStageScale(waveNo){
  if(isInfiniteRun()) return 1;
  const round = Math.floor((Math.max(1, waveNo) - 1) / 5);
  return 1 + round * 0.06;
}

function getWaveEntryMode(waveNo, wave){
  if(isBossWaveConfig(wave, waveNo)) return 'surround';
  const phase = ((Math.max(1, waveNo) - 1) % 5) + 1;
  const roll = seededWaveRand(waveNo, phase * 97);
  if(phase === 1) return pickWeightedMode(roll, [
    ['bottom', 0.80], ['left', 0.10], ['right', 0.10]
  ]);
  if(phase === 2) return pickWeightedMode(roll, [
    ['bottom', 0.60], ['left', 0.20], ['right', 0.20]
  ]);
  if(phase === 3) return pickWeightedMode(roll, [
    ['bottom', 0.50], ['left', 0.15], ['right', 0.15], ['top', 0.20]
  ]);
  if(phase === 4) return pickWeightedMode(roll, [
    ['top', 0.70], ['horizontal', 0.30]
  ]);
  return 'surround';
}

function seededWaveRand(waveNo, salt){
  const seed = (G && G.waveEntrySeed) || 1;
  let x = (seed + waveNo * 374761393 + salt * 668265263) >>> 0;
  x = Math.imul(x ^ (x >>> 15), 2246822519) >>> 0;
  x = Math.imul(x ^ (x >>> 13), 3266489917) >>> 0;
  return ((x ^ (x >>> 16)) >>> 0) / 4294967296;
}

function pickWeightedMode(roll, entries){
  let acc = 0;
  for(const [mode, weight] of entries){
    acc += weight;
    if(roll <= acc) return mode;
  }
  return entries[entries.length - 1][0];
}

function getWaveEntryLabel(mode){
  return WAVE_DIRECTION_LABEL[mode] || '四面';
}

function getNextWaveInfo(){
  if(!G || !G.running) return null;
  if(isInfiniteRun()){
    const waveNo = (G.waveIdx || 0) + 1;
    const wave = makeInfiniteWave(waveNo);
    const mode = getWaveEntryMode(waveNo, wave);
    return { waveNo, wave, mode, boss: isBossWaveConfig(wave, waveNo), frenzy: shouldTriggerEnemyFrenzy(waveNo, wave), pressure: getWavePressureScale(waveNo, wave, mode), t: G.nextInfiniteWaveAt || 12 };
  }
  const waves = G.waves || [];
  const wave = waves[G.waveIdx];
  if(!wave) return null;
  const waveNo = (G.waveIdx || 0) + 1;
  const mode = getWaveEntryMode(waveNo, wave);
  return { waveNo, wave, mode, boss: isBossWaveConfig(wave, waveNo), frenzy: shouldTriggerEnemyFrenzy(waveNo, wave), pressure: getWavePressureScale(waveNo, wave, mode), t: wave.t };
}

function getSpawnPointForWave(mode, seq, total, rng){
  rng = rng || Math.random;
  const fx = G.fortress.worldX, fy = G.fortress.worldY;

  if(mode === 'surround'){
    const dirs = ['top', 'right', 'left', 'top', 'right', 'left'];
    return getSpawnPointForWave(dirs[seq % dirs.length], Math.floor(seq / dirs.length), Math.ceil(total / 3), rng);
  }
  if(mode === 'vertical'){
    return getSpawnPointForWave(seq % 2 === 0 ? 'top' : 'bottom', Math.floor(seq / 2), Math.ceil(total / 2), rng);
  }
  if(mode === 'horizontal'){
    return getSpawnPointForWave(seq % 2 === 0 ? 'left' : 'right', Math.floor(seq / 2), Math.ceil(total / 2), rng);
  }

  const centerAngles = {
    top: -Math.PI / 2,
    bottom: Math.PI / 2,
    left: Math.PI,
    right: 0
  };
  const center = centerAngles[mode] != null ? centerAngles[mode] : Math.PI / 2;
  const spread = Math.max(1, total - 1);
  const lane = total <= 1 ? 0 : (seq / spread - 0.5);
  const isVerticalEntry = mode === 'top' || mode === 'bottom';
  const arcWidth = isVerticalEntry
    ? Math.PI * 0.83
    : Math.PI * (total <= 2 ? 0.32 : 0.52);
  const randomLane = isVerticalEntry
    ? lane
    : Math.max(-0.5, Math.min(0.5, lane * 0.5 + (rng() - 0.5) * 0.55));
  const angleJitter = (rng() - 0.5) * (isVerticalEntry ? 0.16 : 0.34);
  const radiusJitter = (rng() - 0.5) * (isVerticalEntry ? 32 : 54);
  const r = SPAWN_R + radiusJitter;
  const angle = center + randomLane * arcWidth + angleJitter;
  const x = fx + Math.cos(angle) * r;
  const y = fy + Math.sin(angle) * r;
  return { x: Math.max(20, Math.min(CW - 20, x)), y };
}

function getBossSpawnPointForWave(mode, seq, total, rng){
  if(mode === 'surround'){
    const dirs = ['top', 'top', 'right', 'left'];
    return getSpawnPointForWave(dirs[seq % dirs.length], Math.floor(seq / dirs.length), Math.max(1, Math.ceil(total / 3)), rng);
  }
  return getSpawnPointForWave(mode, seq, total, rng);
}

function getMajorEnemySpawnPoint(mode, seq, total, bossRole, eliteSeq, eliteTotal, rng){
  rng = rng || Math.random;
  if(mode !== 'surround') return getBossSpawnPointForWave(mode, seq, total, rng);
  const fx = G.fortress.worldX, fy = G.fortress.worldY;
  const spread = Math.max(1, (eliteTotal || total) - 1);
  const lane = bossRole ? 0 : (((eliteTotal || total) <= 1) ? 0 : (eliteSeq / spread - 0.5));
  const arcWidth = Math.PI / 6;
  const angleJitter = bossRole ? 0 : (rng() - 0.5) * 0.08;
  const radiusJitter = bossRole ? -8 : (rng() - 0.5) * 28;
  const angle = -Math.PI / 2 + lane * arcWidth + angleJitter;
  const r = SPAWN_R + radiusJitter;
  return {
    x: Math.max(20, Math.min(CW - 20, fx + Math.cos(angle) * r)),
    y: fy + Math.sin(angle) * r
  };
}

function getWaveWarningPoint(mode){
  const fx = G.fortress.worldX, fy = G.fortress.worldY;
  if(mode === 'surround') mode = 'top';
  if(mode === 'vertical') mode = 'top';
  if(mode === 'horizontal') mode = 'right';
  const centerAngles = {
    top: -Math.PI / 2,
    bottom: Math.PI / 2,
    left: Math.PI,
    right: 0
  };
  const angle = centerAngles[mode] != null ? centerAngles[mode] : Math.PI / 2;
  const x = fx + Math.cos(angle) * SPAWN_R;
  const y = fy + Math.sin(angle) * SPAWN_R;
  return { x: Math.max(20, Math.min(CW - 20, x)), y };
}

function makeWaveWarningRng(waveNo, salt){
  let x = (((G && G.waveEntrySeed) || 1) + waveNo * 374761393 + salt * 668265263) >>> 0;
  return function(){
    x = Math.imul(x ^ (x >>> 15), 2246822519) >>> 0;
    x = Math.imul(x ^ (x >>> 13), 3266489917) >>> 0;
    x = (x ^ (x >>> 16)) >>> 0;
    return x / 4294967296;
  };
}

function buildNormalSpawnUnits(normalUnits, rng){
  rng = rng || Math.random;
  const units = [];
  normalUnits.forEach(cfg => {
    for(let i = 0; i < cfg.n; i++){
      units.push({ lv: cfg.lv });
    }
  });
  for(let i = units.length - 1; i > 0; i--){
    const j = Math.floor(rng() * (i + 1));
    const t = units[i];
    units[i] = units[j];
    units[j] = t;
  }
  return units;
}

function getWaveWarningSpawnPoints(info){
  if(!info || !info.wave) return [];
  const wave = info.wave;
  const waveNo = info.waveNo;
  const mode = info.mode;
  const bossWave = isBossWaveConfig(wave, waveNo);
  const normalUnits = [];
  wave.m.forEach(cfg => {
    if(cfg.lv < 4) normalUnits.push(Object.assign({}, cfg));
  });
  const sourceMajorTotal = wave.m.reduce((sum, cfg) => sum + (cfg.lv >= 4 ? cfg.n : 0), 0);
  const majorUnits = [];
  if(sourceMajorTotal > 0){
    const eliteRewardWave = isEliteRewardWave(wave, waveNo);
    const majorCount = bossWave ? 3 : (eliteRewardWave ? (waveNo % 10 === 0 ? 3 : 1) : sourceMajorTotal);
    for(let i = 0; i < majorCount; i++){
      majorUnits.push({ lv:4, bossRole: bossWave && i === 0, eliteRole: !(bossWave && i === 0) });
    }
  }
  const total = normalUnits.reduce((sum, cfg) => sum + cfg.n, 0) + majorUnits.length;
  const majorTotal = majorUnits.length;
  const points = [];
  let seq = 0;
  let majorSeq = 0;
  let eliteSeq = 0;
  const normalSpawnUnits = buildNormalSpawnUnits(normalUnits, makeWaveWarningRng(waveNo, 7000));
  normalSpawnUnits.forEach(unit => {
    points.push(getSpawnPointForWave(mode, seq, Math.max(1, total - majorTotal), makeWaveWarningRng(waveNo, 1000 + seq)));
    seq++;
  });
  const eliteTotal = majorUnits.filter(unit => unit.eliteRole).length;
  majorUnits.forEach(unit => {
    const thisEliteSeq = unit.eliteRole ? eliteSeq++ : 0;
    points.push(getMajorEnemySpawnPoint(mode, majorSeq, majorTotal, unit.bossRole, thisEliteSeq, eliteTotal, makeWaveWarningRng(waveNo, 5000 + majorSeq)));
    majorSeq++;
  });
  return points;
}

function getWarningSide(p){
  const dx = p.x - G.fortress.worldX;
  const dy = p.y - G.fortress.worldY;
  if(Math.abs(dy) >= Math.abs(dx)) return dy < 0 ? 'top' : 'bottom';
  return dx < 0 ? 'left' : 'right';
}

function getCurrentCameraY(){
  return G && G.fortress ? G.fortress.worldY - CH * 0.4 : 0;
}

function getWarningBucket(side, p){
  const span = (side === 'top' || side === 'bottom') ? CW : CH;
  const pos = (side === 'top' || side === 'bottom') ? p.x : (p.y - getCurrentCameraY());
  return Math.max(0, Math.min(3, Math.floor(pos / Math.max(1, span * 0.3))));
}

function getWaveWarningGroups(info){
  const points = getWaveWarningSpawnPoints(info);
  const groups = {};
  const cameraY = getCurrentCameraY();
  for(const p of points){
    const side = getWarningSide(p);
    const key = side + '_' + getWarningBucket(side, p);
    if(!groups[key]) groups[key] = { side, x:0, y:0, count:0 };
    groups[key].x += p.x;
    groups[key].y += p.y;
    groups[key].count++;
  }
  return Object.values(groups).map(g => ({
    side: g.side,
    count: g.count,
    x: Math.max(28, Math.min(CW - 28, g.x / g.count)),
    y: Math.max(cameraY + 54, Math.min(cameraY + CH - 54, g.y / g.count))
  }));
}

function getWaveIntelLabel(info){
  if(!info) return '';
  return getWaveEntryLabel(info.mode);
}

function shouldTriggerEnemyFrenzy(waveNo, wave){
  if(!isBossWaveConfig(wave, waveNo)) return false;
  if(isInfiniteRun()) return waveNo % 10 === 0;
  return !!(G && G.waves && waveNo === G.waves.length);
}

function getEnemyFrenzyLabel(){
  const n = (G && G.monsters) ? G.monsters.filter(m => m.frenzy && m.hp > 0).length : 0;
  return n > 0 ? `敌方狂热 ${n} · 移速+50%` : '';
}

function activateEnemyFrenzy(waveNo){
  if(!G || !G.monsters || G.monsters.length === 0) return;
  let count = 0;
  for(const m of G.monsters){
    if(m.hp <= 0) continue;
    m.frenzy = true;
    m.frenzyWave = waveNo;
    m.frenzyStart = G.time;
    count++;
  }
  if(count <= 0) return;
  G.enemyFrenzyAnnounceUntil = G.time + 4.5;
  triggerShake(6, 0.3);
  triggerScreenFlash(0.28, '210, 40, 32', 0.32);
  sfx('frenzy');
  spawnSkillPopup(G.fortress.worldX, G.fortress.worldY - 96, '敌军狂热 · 移速+50%', '#f06a5f');
  for(const m of G.monsters.slice(0, 18)){
    if(m.frenzy && m.hp > 0) spawnParticleBurst(m.pos.x, m.pos.y, '#ff3030', 4);
  }
}

function drawWaveEntryWarning(ctx){
  const info = getNextWaveInfo();
  if(!info) return;
  const remain = info.t - G.time;
  const warnLead = info.frenzy ? 16 : (info.boss ? 12 : (info.pressure >= 1.25 ? 10 : 7));
  if(remain > warnLead || remain < 0) return;
  const t = G.time || 0;
  // 双频呼吸：慢呼吸控亮度，快脉冲控箭头放缩，临近时整体加速
  const urgency = 1 - Math.max(0, Math.min(1, remain / warnLead)); // 0→1
  const breath = 0.5 + 0.5 * Math.sin(t * (0.53 + urgency * 0.47));   // 0..1
  const pulse  = 0.5 + 0.5 * Math.sin(t * (1.07 + urgency * 0.67));   // 0..1
  const baseAlpha = (info.boss || info.frenzy) ? 0.78 : 0.62;
  const alpha = baseAlpha * (0.55 + 0.45 * breath);
  const isHot = info.boss || info.frenzy;
  const tipColor  = isHot ? '#ff6b2a' : '#ff9a30';
  const haloColor = isHot ? 'rgba(255,107,42,'  : 'rgba(255,154,48,';
  const groups = getWaveWarningGroups(info);
  if(groups.length === 0){
    const p = getWaveWarningPoint(info.mode);
    groups.push({ side: info.mode, x: p.x, y: p.y, count: 1 });
  }
  for(const g of groups){
    const dx = G.fortress.worldX - g.x;
    const dy = G.fortress.worldY - g.y;
    const ang = Math.atan2(dy, dx);
    ctx.save();
    ctx.translate(g.x, g.y);
    // 呼吸光晕：弱弱的能量圈，呼吸节奏
    const haloR = 18 + 10 * breath + (isHot ? 4 : 0);
    const haloA = (0.18 + 0.22 * breath) * (isHot ? 1.2 : 1);
    ctx.globalAlpha = haloA;
    ctx.fillStyle = haloColor + '0.55)';
    ctx.beginPath(); ctx.arc(0, 0, haloR, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = haloA * 0.45;
    ctx.beginPath(); ctx.arc(0, 0, haloR + 8 * breath, 0, Math.PI * 2); ctx.fill();
    // 主箭头：快脉冲缩放
    ctx.globalAlpha = alpha;
    ctx.rotate(ang);
    const sc = 0.92 + 0.18 * pulse;
    ctx.scale(sc, sc);
    ctx.fillStyle = (g.side === 'bottom' && !isHot) ? '#ffd35a' : tipColor;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(22, 0);
    ctx.lineTo(-8, -10);
    ctx.lineTo(-2, 0);
    ctx.lineTo(-8, 10);
    ctx.closePath();
    ctx.stroke();
    ctx.fill();
    ctx.scale(1 / sc, 1 / sc);
    ctx.rotate(-ang);
    // 文字：与光晕同呼吸（不抖动），临近时颜色更暖
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(0,0,0,0.75)';
    ctx.shadowColor = haloColor + (0.55 + 0.4 * breath) + ')';
    ctx.shadowBlur = 6 + 6 * breath;
    ctx.fillStyle = isHot ? '#ffd0a0' : '#ffe1a3';
    const ty = -24 - 2 * breath;
    ctx.strokeText('即将来袭', 0, ty);
    ctx.fillText('即将来袭', 0, ty);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function makeInfiniteWave(waveNo){
  const phase = ((waveNo - 1) % 5) + 1;
  const templates = [
    [{lv:1,n:5}],
    [{lv:1,n:6},{lv:2,n:1}],
    [{lv:1,n:7},{lv:2,n:2}],
    [{lv:1,n:8},{lv:2,n:2},{lv:3,n:1}],
    [{lv:1,n:6},{lv:2,n:2},{lv:3,n:1}]
  ];
  const m = templates[phase - 1].map(x => Object.assign({}, x));
  if(waveNo % 5 === 0){
    m.push({ lv:4, n: 3 });
  }
  return { t: waveNo * 12, m };
}

function spawnWaveConfig(wave, waveNo){
  const mode = getWaveEntryMode(waveNo, wave);
  const pressure = getWavePressureScale(waveNo, wave, mode);
  const bossWave = isBossWaveConfig(wave, waveNo);
  const normalUnits = [];
  wave.m.forEach(cfg => {
    if(cfg.lv < 4) normalUnits.push(Object.assign({}, cfg));
  });
  const sourceMajorTotal = wave.m.reduce((sum, cfg) => sum + (cfg.lv >= 4 ? cfg.n : 0), 0);
  const majorUnits = [];
  if(sourceMajorTotal > 0){
    const eliteRewardWave = isEliteRewardWave(wave, waveNo);
    const majorCount = bossWave ? 3 : (eliteRewardWave ? (waveNo % 10 === 0 ? 3 : 1) : sourceMajorTotal);
    for(let i = 0; i < majorCount; i++){
      majorUnits.push({ lv:4, bossRole: bossWave && i === 0, eliteRole: !(bossWave && i === 0) });
    }
  }
  const total = normalUnits.reduce((sum, cfg) => sum + cfg.n, 0) + majorUnits.length;
  const majorTotal = majorUnits.length;
  let seq = 0;
  let majorSeq = 0;
  let eliteSeq = 0;
  G.lastSpawnInfo = {
    waveNo,
    mode,
    pressure,
    until: G.time + 4
  };
  if(bossWave){
    // 首领波次：橙红警示闪 + 横幅文字"首领来袭！"，不震屏
    triggerScreenFlash(0.45, '255, 80, 40', 0.5);
    showCeremonyBanner('boss', '首领来袭！', '', 1500);
  } else if(pressure >= 1.25){
    // 高压力波：保留轻微震屏 + 红光
    triggerShake(pressure >= 1.5 ? 5 : 3, 0.18);
    triggerScreenFlash(0.18, '255, 60, 40', pressure >= 1.5 ? 0.32 : 0.22);
  }
  spawnSkillPopup(
    G.fortress.worldX,
    G.fortress.worldY - 70,
    `${bossWave ? '首领波' : '第' + waveNo + '波'} · ${getWaveIntelLabel({ mode, pressure, boss: bossWave })}`,
    (pressure >= 1.25 || bossWave) ? '#ff6060' : '#ffd700'
  );
  const normalSpawnUnits = buildNormalSpawnUnits(normalUnits);
  normalSpawnUnits.forEach(unit => {
    const p = getSpawnPointForWave(mode, seq++, Math.max(1, total - majorTotal));
    const newMon = makeMonster(p.x, p.y, unit.lv, pressure);
    newMon.waveNo = waveNo;
    newMon.waveIdx = waveNo - 1;
    newMon.wavePressure = pressure;
    newMon.entryMode = mode;
    G.monsters.push(newMon);
  });
  const eliteTotal = majorUnits.filter(unit => unit.eliteRole).length;
  majorUnits.forEach(unit => {
    const thisEliteSeq = unit.eliteRole ? eliteSeq++ : 0;
    const p = getMajorEnemySpawnPoint(mode, majorSeq++, majorTotal, unit.bossRole, thisEliteSeq, eliteTotal);
    const newMon = makeMonster(p.x, p.y, unit.lv, pressure, {
      bossRole: unit.bossRole,
      eliteRole: unit.eliteRole
    });
    newMon.waveNo = waveNo;
    newMon.waveIdx = waveNo - 1;
    newMon.wavePressure = pressure;
    newMon.entryMode = mode;
    G.monsters.push(newMon);
  });
  if(shouldTriggerEnemyFrenzy(waveNo, wave)) activateEnemyFrenzy(waveNo);
}

function gameLoop(t){
  if(lastT === null){ lastT = t; raf = requestAnimationFrame(gameLoop); return; }
  const rawDt = (t - lastT) / 1000;
  lastT = t;
  if(!G.running || paused){ render(); raf = requestAnimationFrame(gameLoop); return; }
  const dt = Math.min(rawDt, 0.05);

  G.time += dt;

  updateFortress(G.fortress);
  G.heroes.forEach(h => updateHero(h, dt));
  separateHeroes();
  separateHeroesFromFortress();
  G.monsters.forEach(m => updateMonster(m, dt));
  updateProjectiles(dt);
  updateThunderClouds(dt);
  updateSupportAura(dt);
  updateAuraEffects(dt);
  updateTurrets(dt);
  updateDengaiMinions(dt);
  updateLordSkill(dt);
  updateMergeHint(dt);
  updateHeroPassives(dt);
  updatePopups(dt);
  updateParticles(dt);

  // Cleanup expired chain effects
  for(let i = G.chainEffects.length - 1; i >= 0; i--){
    if(G.chainEffects[i].until <= G.time) G.chainEffects.splice(i, 1);
  }

  // Spawn waves
  const waves = G.waves || [];
  if(isInfiniteRun()){
    while(G.time >= (G.nextInfiniteWaveAt || 12)){
      const waveNo = (G.waveIdx || 0) + 1;
      // 前 20 波（4 个 tier）：缓坡上行；21 波起每波 ×1.20 累乘
      const tierScale = [0.70, 0.85, 1.00, 1.15];
      if(waveNo <= 20){
        const tier = Math.floor((waveNo - 1) / 5);
        G.currentWaveScale = tierScale[tier];
      } else {
        // wave 20 系数 = 1.15；wave N (>20) = 1.15 × 1.20^(N-20)
        G.currentWaveScale = 1.15 * Math.pow(1.20, waveNo - 20);
      }
      spawnWaveConfig(makeInfiniteWave(waveNo), waveNo);
      G.waveIdx = waveNo;
      G.nextInfiniteWaveAt = (G.nextInfiniteWaveAt || 12) + 12;
    }
  }
  while(!isInfiniteRun() && G.waveIdx < waves.length && G.time >= waves[G.waveIdx].t){
    const wave = waves[G.waveIdx];
    spawnWaveConfig(wave, G.waveIdx + 1);
    G.waveIdx++;
  }

  // Remove dead monsters
  for(let i = G.monsters.length - 1; i >= 0; i--){
    const m = G.monsters[i];
    if(m.hp <= 0){
      onMonsterDeath(m);
      const baseGold = [5, 8, 12, 150][m.lv - 1];
      const goldMult = (G.levelConfig && G.levelConfig.affix && G.levelConfig.affix.goldMult) || 1;
      G.gold += baseGold * goldMult;
      // 死亡粒子
      const cols = ['#e74c3c', '#e67e22', '#9b59b6', '#8e6bd8'];
      spawnParticleBurst(m.pos.x, m.pos.y, cols[m.lv - 1], m.bossRole ? 18 : (m.eliteRole ? 12 : 8));
      // 真正首领触发首领反馈；精英奖励波清完精英也会掉宝箱
      if(m.bossRole){
        triggerShake(5, 0.22);
        sfx('boss_kill');
        handleMajorRewardKill(m);
      } else {
        sfx('kill');
        if(m.eliteRole) handleMajorRewardKill(m);
      }
      G.monsters.splice(i, 1);
    }
  }

  // Resources: 起始一次性散布，不再自然刷新
  G.resources = G.resources.filter(r => !r.done);
  updateInfiniteResources(false);

  // 宝箱更新（超时自动拾取）
  updateLootChests();

  // End conditions
  if(G.fortress.hp <= 0){
    G.running = false;
    render(); updateHUD();
    triggerDefeatSequence();
    return;
  }

  const pendingLootChest = G.lootChests && G.lootChests.some(ch => !ch.pickedUp);
  if(!isInfiniteRun() && G.waveIdx >= (G.waves || []).length && G.monsters.length === 0 && !pendingLootChest && !paused){
    G.running = false;
    render(); updateHUD();
    triggerVictorySequence();
    return;
  }

  render();
  updateHUD();
  raf = requestAnimationFrame(gameLoop);
}

function render(){
  // 屏幕震动偏移
  let shakeX = 0, shakeY = 0;
  if(G.shakeUntil && G.shakeUntil > G.time){
    const intensity = G.shakeIntensity || 4;
    shakeX = (Math.random() - 0.5) * intensity * 2;
    shakeY = (Math.random() - 0.5) * intensity * 2;
  }

  const cameraY = G.fortress.worldY - CH * 0.4;

  ctx.save();
  ctx.translate(shakeX, -cameraY + shakeY);

  drawWorldBG(ctx);
  drawWaveEntryWarning(ctx);
  G.resources.forEach(r  => drawResource(ctx, r));
  drawThunderClouds(ctx);
  G.monsters.forEach(m   => drawMonster(ctx, m));
  drawProjectiles(ctx);
  drawChainEffects(ctx);
  drawTurrets(ctx);
  drawDengaiMinions(ctx);
  drawParticles(ctx);
  drawDiaochanAuras(ctx);
  G.heroes.forEach(h     => drawHero(ctx, h));
  drawLvbuFans(ctx);
  drawAuraEffects(ctx);
  drawFortress(ctx, G.fortress);
  drawLord(ctx, G.fortress);
  drawLordPulses(ctx);
  drawLootChests(ctx);
  drawPopups(ctx);

  ctx.restore();

  // 全屏闪光
  if(G.flashScreenUntil && G.flashScreenUntil > G.time){
    const dur = G.flashScreenDuration || 0.15;
    const a = (G.flashScreenUntil - G.time) / dur;
    const col = G.flashScreenColor || '255, 60, 60';
    const maxAlpha = G.flashScreenMaxAlpha || 0.5;
    ctx.fillStyle = `rgba(${col}, ${Math.max(0, Math.min(maxAlpha, a))})`;
    ctx.fillRect(0, 0, CW, CH);
  }
  drawFrenzyScreenEdge(ctx);
  drawBossAmbushCountdown(ctx);
  drawFrenzyCountdown(ctx);
}

// ============================================================
//  EFFECTS: SCREEN SHAKE / PARTICLES / SOUND
// ============================================================
function triggerShake(intensity, duration){
  G.shakeUntil = G.time + (duration || 0.15);
  G.shakeIntensity = intensity || 4;
}
function triggerScreenFlash(duration, color, maxAlpha){
  G.flashScreenUntil = G.time + (duration || 0.15);
  G.flashScreenDuration = duration || 0.15;
  G.flashScreenColor = color || '255, 60, 60';
  G.flashScreenMaxAlpha = maxAlpha != null ? maxAlpha : 0.5;
}
function spawnParticleBurst(x, y, color, count){
  if(!G.particles) G.particles = [];
  count = count || 8;
  for(let i = 0; i < count; i++){
    const ang = Math.random() * Math.PI * 2;
    const spd = 40 + Math.random() * 80;
    G.particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      color,
      life: 0.5,
      maxLife: 0.5,
      size: 2 + Math.random() * 2
    });
  }
}
function updateParticles(dt){
  if(!G.particles) return;
  for(let i = G.particles.length - 1; i >= 0; i--){
    const p = G.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.life -= dt;
    if(p.life <= 0) G.particles.splice(i, 1);
  }
}
function drawParticles(ctx){
  if(!G.particles) return;
  for(const p of G.particles){
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function hasActiveEnemyFrenzy(){
  return !!(G && G.monsters && G.monsters.some(m => m.frenzy && m.hp > 0));
}

function drawFrenzyCountdown(ctx){
  const info = getNextWaveInfo();
  if(!info || !info.frenzy) return;
  const remain = info.t - G.time;
  if(remain <= 0 || remain > 5) return;
  const count = Math.max(1, Math.ceil(remain));
  const pulse = 0.5 + 0.5 * Math.sin((G.time || 0) * 6);
  const y = Math.max(92, CH * 0.20);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // 与 ceremony-banner.boss 同款字样：粗 Arial、硬黑投影 + 双层橙红光晕
  const msg = isInfiniteRun() ? '狂热首领即将降临' : '终局首领即将降临';
  drawBossStyleText(ctx, msg, CW / 2, y - 14, 26, '#ff8030', pulse);
  drawBossStyleText(ctx, String(count), CW / 2, y + 26, 38, pulse > 0.55 ? '#fff080' : '#ffd700', pulse, '#ff8030');
  ctx.restore();
}

function drawBossAmbushCountdown(ctx){
  const info = getNextWaveInfo();
  if(!info || !info.boss || info.frenzy) return;
  const remain = info.t - G.time;
  if(remain <= 0 || remain > 3) return;
  const count = Math.max(1, Math.ceil(remain));
  const pulse = 0.5 + 0.5 * Math.sin((G.time || 0) * 7);
  const y = Math.max(88, CH * 0.20);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  drawBossStyleText(ctx, '首领来袭', CW / 2, y - 12, 24, '#ff8030', pulse);
  drawBossStyleText(ctx, String(count), CW / 2, y + 22, 34, pulse > 0.55 ? '#fff080' : '#ffd700', pulse, '#ff8030');
  ctx.restore();
}

// 与 ceremony-banner.boss 视觉一致：硬黑右下投影 + 双层橙红 shadow + 粗体
function drawBossStyleText(ctx, text, x, y, size, fillColor, pulse, glowColor){
  const glow = glowColor || '#ff5020';
  ctx.font = 'bold ' + size + 'px Arial';
  // 1) 硬黑投影 2,2（CSS 里的 2px 2px 0 #000）
  ctx.fillStyle = '#000';
  ctx.fillText(text, x + 2, y + 2);
  // 2) 远层光晕（对应 0 0 26px rgba(255,80,40,0.8)）
  ctx.shadowColor = glow;
  ctx.shadowBlur = 22 + pulse * 8;
  ctx.fillStyle = fillColor;
  ctx.fillText(text, x, y);
  // 3) 近层光晕（对应 0 0 14px #ff5020）叠一次让中心更亮
  ctx.shadowBlur = 12 + pulse * 4;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

function drawFrenzyScreenEdge(ctx){
  if(!hasActiveEnemyFrenzy()) return;
  const pulse = 0.5 + 0.5 * Math.sin((G.time || 0) * 8);
  const alpha = 0.10 + pulse * 0.08;
  const edge = Math.max(42, Math.min(CW, CH) * 0.11);
  ctx.save();
  let g = ctx.createLinearGradient(0, 0, edge, 0);
  g.addColorStop(0, `rgba(255, 18, 8, ${alpha})`);
  g.addColorStop(1, 'rgba(255, 18, 8, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, edge, CH);
  g = ctx.createLinearGradient(CW, 0, CW - edge, 0);
  g.addColorStop(0, `rgba(255, 18, 8, ${alpha})`);
  g.addColorStop(1, 'rgba(255, 18, 8, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(CW - edge, 0, edge, CH);
  g = ctx.createLinearGradient(0, 0, 0, edge);
  g.addColorStop(0, `rgba(255, 18, 8, ${alpha + 0.08})`);
  g.addColorStop(1, 'rgba(255, 18, 8, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, CW, edge);
  g = ctx.createLinearGradient(0, CH, 0, CH - edge);
  g.addColorStop(0, `rgba(255, 18, 8, ${alpha})`);
  g.addColorStop(1, 'rgba(255, 18, 8, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, CH - edge, CW, edge);
  ctx.lineWidth = 5 + pulse * 2;
  ctx.strokeStyle = `rgba(220, 44, 32, ${0.24 + pulse * 0.12})`;
  ctx.strokeRect(4, 4, CW - 8, CH - 8);
  ctx.restore();
}

// === Web Audio 音效（无需外部文件）===
let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx){
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  return _audioCtx;
}
function playTone(freq, duration, type, volume, slideTo){
  const ctx = getAudioCtx();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if(slideTo){
    osc.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + duration);
  }
  gain.gain.setValueAtTime(volume || 0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}
function sfx(name){
  switch(name){
    case 'hit': playTone(180, 0.06, 'square', 0.05); break;
    case 'crit': playTone(420, 0.12, 'square', 0.10, 200); break;
    case 'kill': playTone(120, 0.20, 'sawtooth', 0.10, 60); break;
    case 'boss_kill':
      playTone(80, 0.4, 'sawtooth', 0.18, 40);
      setTimeout(() => playTone(60, 0.5, 'sine', 0.15, 30), 120);
      break;
    case 'merge': playTone(440, 0.08, 'sine', 0.12, 880); break;
    case 'maxlv':
      playTone(523, 0.1, 'sine', 0.15);
      setTimeout(() => playTone(659, 0.1, 'sine', 0.15), 80);
      setTimeout(() => playTone(784, 0.18, 'sine', 0.18), 160);
      break;
    case 'summon': playTone(330, 0.12, 'triangle', 0.10, 660); break;
    case 'upgrade': playTone(550, 0.08, 'sine', 0.10, 880); break;
    case 'thunder': playTone(80, 0.3, 'sawtooth', 0.18, 30); break;
    case 'explode':
      playTone(150, 0.15, 'sawtooth', 0.18, 60);
      break;
    case 'frenzy':
      playTone(110, 0.18, 'sawtooth', 0.18, 55);
      setTimeout(() => playTone(180, 0.16, 'square', 0.12, 90), 90);
      break;
    case 'fortress_hit': playTone(80, 0.15, 'square', 0.18, 40); break;
    case 'win': {
      const c = getAudioCtx();
      if(!c) return;
      [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => playTone(f, 0.18, 'sine', 0.18), i * 100);
      });
      break;
    }
    case 'lose': playTone(220, 0.5, 'sawtooth', 0.20, 80); break;
  }
}

function getCurrentLevel(){
  // 上次选中的关卡（用于默认选项）
  let lv = 1;
  try {
    const saved = localStorage.getItem('bf_level');
    if(saved){
      const n = parseInt(saved, 10);
      if(!isNaN(n) && n >= 1) lv = n;
    }
  } catch(e){
    console.warn('localStorage unavailable:', e);
  }
  if(window.PERSIST && window.PERSIST.currentLevel) lv = Math.max(lv, window.PERSIST.currentLevel);
  return Math.max(1, lv);
}
function saveCurrentLevel(lv){
  // 仅记录"上次选过的关卡"，不影响解锁进度
  window.PERSIST = window.PERSIST || {};
  window.PERSIST.currentLevel = lv;
  try {
    localStorage.setItem('bf_level', String(lv));
    console.log('[save] last-played level =', lv);
  } catch(e){
    console.warn('localStorage save failed:', e);
  }
}
// 最高解锁关卡（只增不减）
function getMaxUnlockedLevel(){
  let lv = 1;
  let hasStored = false;
  try {
    const saved = localStorage.getItem('bf_unlocked_max');
    if(saved){
      const n = parseInt(saved, 10);
      if(!isNaN(n) && n >= 1){ lv = n; hasStored = true; }
    }
  } catch(e){}
  if(window.PERSIST && window.PERSIST.maxUnlocked) lv = Math.max(lv, window.PERSIST.maxUnlocked);
  // 一次性迁移：从未保存过 unlocked_max → 用 bf_level 作为历史最高，并立即固化
  // 避免之后 bf_level 被改小后丢失历史进度
  if(!hasStored){
    let legacyLv = 1;
    try {
      const savedLegacy = localStorage.getItem('bf_level');
      if(savedLegacy){
        const n = parseInt(savedLegacy, 10);
        if(!isNaN(n) && n >= 1) legacyLv = n;
      }
    } catch(e){}
    if(legacyLv > lv) lv = legacyLv;
    // 立即持久化迁移结果
    try { localStorage.setItem('bf_unlocked_max', String(lv)); } catch(e){}
    window.PERSIST = window.PERSIST || {};
    window.PERSIST.maxUnlocked = lv;
  }
  return Math.max(1, lv);
}
function saveMaxUnlockedLevel(lv){
  // 只增不减
  const cur = getMaxUnlockedLevel();
  const next = Math.max(cur, lv);
  window.PERSIST = window.PERSIST || {};
  window.PERSIST.maxUnlocked = next;
  try {
    localStorage.setItem('bf_unlocked_max', String(next));
    console.log('[save] max unlocked =', next);
  } catch(e){
    console.warn('localStorage save failed:', e);
  }
}
// 通关 lv：仅当 lv == 当前最高解锁时，才把解锁推进到 lv+1
function onLevelCleared(lv){
  const maxNow = getMaxUnlockedLevel();
  if(lv >= maxNow) saveMaxUnlockedLevel(lv + 1);
}

// ============================================================
function getPerfectClears(){
  try {
    const raw = localStorage.getItem('bf_perfect');
    if(raw){
      const arr = JSON.parse(raw);
      if(Array.isArray(arr)) return new Set(arr);
    }
  } catch(e){}
  return new Set();
}
function isPerfectCleared(lv){
  return getPerfectClears().has(lv);
}
function markPerfectClear(lv){
  const set = getPerfectClears();
  if(set.has(lv)) return;
  set.add(lv);
  try {
    localStorage.setItem('bf_perfect', JSON.stringify(Array.from(set)));
    console.log('[perfect] level', lv, 'marked');
  } catch(e){
    console.warn('localStorage save failed:', e);
  }
}
function getInfiniteBestWave(){
  try {
    const n = parseInt(localStorage.getItem('bf_infinite_best_wave'), 10);
    return isNaN(n) ? 0 : Math.max(0, n);
  } catch(e){}
  return 0;
}
function saveInfiniteBestWave(wave){
  wave = Math.max(0, Math.floor(wave || 0));
  const best = Math.max(getInfiniteBestWave(), wave);
  try { localStorage.setItem('bf_infinite_best_wave', String(best)); } catch(e){}
  return best;
}
