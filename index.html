function heroPos(h){ return v2(h.worldX, h.worldY); }

function heroSpeed(h){
  let s = h.spd;
  if(h.cls === 'warrior' && h.heroId !== 'xuchu' && h.heroId !== 'lvbu'){
    // 张飞被动：每层堆叠+2%移速；许褚/吕布不吃 rage buff
    const movePerStack = 0.02 + 0.01 * (G.buffs.warriorRageMax ? Math.round(G.buffs.warriorRageMax / 5) : 0);
    s *= 1 + (G.buffs.warriorMove || 0) + h.rageStack * movePerStack;
  } else if(h.cls === 'warrior'){
    s *= 1 + (G.buffs.warriorMove || 0);
  }
  else if(h.cls === 'assassin') s *= 1 + (G.buffs.assassinMove || 0);
  else if(h.cls === 'gather') s *= 1 + (G.buffs.gatherMove || 0);
  // 真·吕布「赤兔加身」：持续 +30% 移速
  if(h.heroId === 'lvbu' && h.lv >= 5) s *= 1.3;
  // 吕奉先狂暴态：额外 +20% 移速
  if(h.heroId === 'lvbu' && h.lvbuFengXianUntil && h.lvbuFengXianUntil > G.time) s *= 1.2;
  // 吕蒙潜行 +60% 移速
  if(h.heroId === 'lvmeng' && h.lvmengStealth) s *= 1.6;
  // 荀彧加冕移速：L1 +15% / L2 +20% / L3 +25% / L4 +30%；真 +35%
  if(h.xunyuCrownUntil && h.xunyuCrownUntil > G.time){
    const srcLv = h.xunyuCrownLv || 1;
    const moveBonus = h.xunyuCrownTrue ? 0.35 : [0.15, 0.20, 0.25, 0.30][Math.min(srcLv, 4) - 1];
    s *= (1 + moveBonus);
  }
  return s;
}

function heroDPS(h){
  if(h.cls === 'gather') return 0;
  const tbl = CLASS_DPS[h.cls] || CLASS_DPS.warrior;
  const baseDPS = tbl[0];
  const lvMult = [1, 1.8, 3.4, 7, 16][Math.min(h.lv - 1, 4)] || 1;
  // CLASS_DPS_MULT 攻击力补偿：抵消攻速 -20% 对 DPS 的影响，单次伤害更高
  let d = baseDPS * lvMult * CLASS_DPS_MULT;
  if(h.cls === 'warrior') d *= 1 + (G.buffs.warriorAtk || 0);
  else if(h.cls === 'archer') d *= 1 + (G.buffs.archerAtk || 0);
  else if(h.cls === 'assassin') d *= 1 + (G.buffs.assassinAtk || 0);
  else if(h.cls === 'mage') d *= (1 + (G.buffs.mageAtk || 0)) * (1 + (G.buffs.mageDmg || 0));
  else if(h.cls === 'support') d *= (1 + (G.buffs.supDuration || 0) * 0.10);
  // 吕布"吕奉先"状态：攻击力 +50%
  if(h.heroId === 'lvbu' && h.lvbuFengXianUntil && h.lvbuFengXianUntil > G.time){
    d *= 1.5;
  }
  // 荀彧加冕：攻击力阶梯加成 L1 +25% / L2 +30% / L3 +40% / L4 +50%；真·荀彧 +60%
  // buff xunyuKing 每层 +10%
  if(h.xunyuCrownUntil && h.xunyuCrownUntil > G.time){
    const srcLv = h.xunyuCrownLv || 1;
    let crownAtk = h.xunyuCrownTrue ? 0.6 : [0.25, 0.30, 0.40, 0.50][Math.min(srcLv, 4) - 1];
    crownAtk += (G.buffs.xunyuKing || 0);
    d *= (1 + crownAtk);
  }
  // 阵营光环：LV6+ 启用，同阵营 3/4 人 +10/+15%
  if(G.factionAtkBonus && G.factionAtkBonus > 0) d *= (1 + G.factionAtkBonus);
  // Support buff: 攻击力按百分比叠加（buffAtkBonus 表示比例 0~N）
  if(h.buffStacks > 0) d *= (1 + h.buffAtkBonus);
  return d;
}

// 蔡文姬专用：用于增益计算的攻击力（独立于heroDPS）
function supportAttack(h){
  const tbl = CLASS_DPS.support;
  const baseDPS = tbl[0];
  const lvMult = [1, 1.8, 3.4, 7, 16][Math.min(h.lv - 1, 4)] || 1;
  return baseDPS * lvMult * CLASS_DPS_MULT * (1 + (G.buffs.supDuration || 0) * 0.10);
}

function pickIdleTarget(h){
  const fx = G.fortress.worldX, fy = G.fortress.worldY;
  // Skew toward fortress front (up, where monsters come from)
  // Use ang in [-π, 0] for upper hemisphere mostly
  let ang;
  if(Math.random() < 0.8){
    // 80% chance: front semicircle (angles π to 2π in canvas coords = upper half)
    ang = Math.PI + Math.random() * Math.PI;
  } else {
    // 20% chance: anywhere
    ang = Math.random() * Math.PI * 2;
  }
  const r = 30 + Math.random() * 60; // 30-90px from fortress
  h.idleTarget = v2(fx + Math.cos(ang) * r, fy + Math.sin(ang) * r);
}

function updateHero(h, dt){
  h.senseDelay -= dt;
  h.atkCD      -= dt;

  // Warrior rage decay (4秒不攻击清空堆叠)
  if(h.cls === 'warrior' && G.time - h.lastAttackTime > 4) h.rageStack = 0;

  const fpos = v2(G.fortress.worldX, G.fortress.worldY);
  let isIdle = false;
  const moveSpeed = heroSpeed(h);

  if(h.cls === 'gather'){
    // 容量与采集速率同步增长（同 speedLvMult），保证单次贴矿时长 ≈ 2.5s 恒定，
    // 高级黄月英不再"采一秒就跑回去"，跑路占比显著下降
    const capLvMult = [1, 1.8, 3.4, 7, 16][Math.min(h.lv - 1, 4)] || 1;
    const cap = h.maxCol * capLvMult * (1 + (G.buffs.gatherCap || 0));

    const speedLvMult = [1, 1.8, 3.4, 7, 16][Math.min(h.lv - 1, 4)] || 1;
    const speed = moveSpeed;

    const carriedLoad = h.collectedLoad != null ? h.collectedLoad : h.collected;
    if(carriedLoad >= cap){
      const d = vdist(heroPos(h), fpos);
      if(d > 20){
        const dir = vnorm(vsub(fpos, heroPos(h)));
        h.worldX += dir.x * speed * dt;
        h.worldY += dir.y * speed * dt;
      } else {
        const depositAmt = h.collected * GATHER_OUTPUT_MULT;
        G.gold      += depositAmt;
        onGatherDeposit(h, depositAmt);
        h.collected  = 0;
        h.collectedLoad = 0;
      }
      return;
    }

    let best = null, bd = Infinity;
    for(const r of G.resources){
      if(r.done) continue;
      const d = vdist(heroPos(h), r.pos);
      if(d < bd){ bd = d; best = r; }
    }

    if(best){
      if(bd < 18){
        const rate  = 12 * speedLvMult * (1 + (G.buffs.gatherSpeed || 0)) * (best.speedMult || 1);
        const room = Math.max(0, cap - (h.collectedLoad || 0));
        const loadGain = Math.min(room, rate * dt);
        h.collectedLoad = (h.collectedLoad || 0) + loadGain;
        h.collected += loadGain * (best.yieldMult || 1);
        best.hp -= 10 * dt;

        // Dual collect: 每层 buff 同时采集 +1 个邻近矿脉（40px 内）
        const dualStacks = G.buffs.gatherDual || 0;
        if(dualStacks > 0){
          let drained = 0;
          for(const r2 of G.resources){
            if(r2 === best || r2.done) continue;
            if(drained >= dualStacks) break;
            if(vdist(r2.pos, best.pos) < 40){
              const rate2 = 12 * speedLvMult * (1 + (G.buffs.gatherSpeed || 0)) * (r2.speedMult || 1);
              const room2 = Math.max(0, cap - (h.collectedLoad || 0));
              const loadGain2 = Math.min(room2, rate2 * dt * 0.5);
              if(loadGain2 <= 0) break;
              h.collectedLoad = (h.collectedLoad || 0) + loadGain2;
              h.collected += loadGain2 * (r2.yieldMult || 1);
              r2.hp -= 10 * dt;
              if(r2.hp <= 0 && !r2.done){
                r2.done = true;
                tryRespawnResource(r2);
              }
              drained++;
            }
          }
        }

        if(best.hp <= 0 && !best.done){
          best.done = true;
          tryRespawnResource(best);
        }
      } else {
        const dir = vnorm(vsub(best.pos, heroPos(h)));
        h.worldX += dir.x * speed * dt;
        h.worldY += dir.y * speed * dt;
      }
      return;
    }

    if(h.collected > 0){
      const d = vdist(heroPos(h), fpos);
      if(d > 20){
        const dir = vnorm(vsub(fpos, heroPos(h)));
        h.worldX += dir.x * speed * dt;
        h.worldY += dir.y * speed * dt;
      } else {
        const depositAmt = h.collected * GATHER_OUTPUT_MULT;
        G.gold      += depositAmt;
        onGatherDeposit(h, depositAmt);
        h.collected  = 0;
        h.collectedLoad = 0;
      }
      return;
    }

    isIdle = true;

  } else if(h.cls === 'support'){
    // 貂蝉特殊行为：跟堡卡位 + 普攻
    if(h.heroId === 'diaochan' && G.fortress){
      // 多貂蝉按等级降序排序，等级最高占车头（正前方）；其余按 360°/N 平分角度
      const diaochans = G.heroes.filter(x => x.heroId === 'diaochan').slice();
      diaochans.sort((a, b) => (b.lv - a.lv) || (a.id - b.id));
      const idx = diaochans.indexOf(h);
      const n = Math.max(1, diaochans.length);
      const r = 40;
      // 0 号位 = 车头 = -π/2，其余按 idx 顺时针均分
      const ang = -Math.PI / 2 + (2 * Math.PI / n) * idx;
      const targetX = G.fortress.worldX + Math.cos(ang) * r;
      const targetY = G.fortress.worldY + Math.sin(ang) * r;
      const dx = targetX - h.worldX, dy = targetY - h.worldY;
      const d = Math.hypot(dx, dy);
      if(d > 4){
        const sp = heroSpeed(h);
        const k = Math.min(sp * dt, d) / d;
        h.worldX += dx * k;
        h.worldY += dy * k;
      }
      // 在卡位的同时执行普攻（不离开站位）
      if(h.senseDelay <= 0){
        const range = CLASS_RANGE[h.cls] || 120;
        const targets = [...G.monsters].filter(m => m.hp > 0).sort(
          (a, b) => vdist(heroPos(h), a.pos) - vdist(heroPos(h), b.pos)
        );
        if(targets.length > 0){
          h.target = targets[0];
          const td = vdist(heroPos(h), h.target.pos);
          if(td <= range && h.atkCD <= 0){
            performAttack(h, targets, 1);
            h.atkCD = h.atkCDDuration;
          }
        }
      }
      return;
    }
    // Support: 既释放光环增益(updateSupportAura)，也用普通攻击参战
    if(h.senseDelay > 0){
      isIdle = true;
    } else {
      const range = CLASS_RANGE[h.cls] || 120;
      // 辅助优先攻击离主堡最近的敌人
      const fpos2 = G.fortress ? v2(G.fortress.worldX, G.fortress.worldY) : heroPos(h);
      const targets = [...G.monsters].filter(m => m.hp > 0).sort(
        (a, b) => vdist(fpos2, a.pos) - vdist(fpos2, b.pos)
      );
      if(targets.length > 0){
        h.target = targets[0];
        const d = vdist(heroPos(h), h.target.pos);
        if(d > range){
          const dir = vnorm(vsub(h.target.pos, heroPos(h)));
          h.worldX += dir.x * heroSpeed(h) * dt;
          h.worldY += dir.y * heroSpeed(h) * dt;
        } else if(h.atkCD <= 0){
          performAttack(h, targets, 1);
          let cd = h.atkCDDuration;
          // 蔡文姬增益期间攻速加成（按持久祝福强化）
          if(h.buffStacks > 0){
            cd /= (1 + 0.5 + (G.buffs.supDuration || 0) * 0.10);
          }
          h.atkCD = cd;
          if(h.buffStacks > 0){
            h.buffStacks--;
            if(h.buffStacks <= 0) h.buffAtkBonus = 0;
          }
        }
      } else {
        isIdle = true;
      }
    }
  } else {
    // warrior / archer / assassin / mage
    if(h.senseDelay > 0){
      isIdle = true;
    } else {
      const range   = CLASS_RANGE[h.cls] || 40;
      // 射手/法师优先攻击离主堡最近的敌人；战士/刺客优先攻击离自己最近的敌人
      const targetByFortress = (h.cls === 'archer' || h.cls === 'mage');
      const fpos2 = G.fortress ? v2(G.fortress.worldX, G.fortress.worldY) : heroPos(h);
      let targets;
      if(h.heroId === 'xuchu'){
        targets = pickXuchuTargets(h);
      } else {
        targets = [...G.monsters].filter(m => m.hp > 0).sort((a, b) => {
          if(targetByFortress){
            return vdist(fpos2, a.pos) - vdist(fpos2, b.pos);
          }
          return vdist(heroPos(h), a.pos) - vdist(heroPos(h), b.pos);
        });
      }

      // Multi-attack only for archer (via archerMulti)
      let maxT = 1;
      if(h.cls === 'archer') maxT = 1 + (G.buffs.archerMulti || 0);

      h.target = targets[0] || null;

      if(h.target){
        // 许褚卡线：目标位置 = 堡垒-怪物连线上、距怪物 range-5 的拦截点
        let aimPos = h.target.pos;
        if(h.heroId === 'xuchu' && G.fortress){
          const fx = G.fortress.worldX, fy = G.fortress.worldY;
          const tx = h.target.pos.x, ty = h.target.pos.y;
          const dxFM = tx - fx, dyFM = ty - fy;
          const lenFM = Math.hypot(dxFM, dyFM) || 1;
          const standoff = Math.max(5, range - 5);
          aimPos = v2(tx - (dxFM / lenFM) * standoff, ty - (dyFM / lenFM) * standoff);
        }
        const d = vdist(heroPos(h), h.target.pos);
        const dAim = vdist(heroPos(h), aimPos);
        if(h.heroId === 'xuchu' && dAim > 4){
          // 走向拦截点（不是怪物本身）
          const dir = vnorm(vsub(aimPos, heroPos(h)));
          h.worldX += dir.x * moveSpeed * dt;
          h.worldY += dir.y * moveSpeed * dt;
        } else if(d > range){
          const dir = vnorm(vsub(h.target.pos, heroPos(h)));
          h.worldX += dir.x * moveSpeed * dt;
          h.worldY += dir.y * moveSpeed * dt;
        } else if(h.atkCD <= 0){
          performAttack(h, targets, maxT);
          // CD depends on class buffs
          let cd = h.atkCDDuration;
          if(h.cls === 'warrior'){
            // 张飞被动：每层堆叠+2%攻速，万夫不当每层额外+1%
            const spdPerStack = 0.02 + 0.01 * (G.buffs.warriorRageMax ? Math.round(G.buffs.warriorRageMax / 5) : 0);
            cd /= (1 + (G.buffs.warriorSpd || 0) + h.rageStack * spdPerStack);
          }
          else if(h.cls === 'archer') cd /= (1 + (G.buffs.archerSpd || 0));
          else if(h.cls === 'assassin'){
            cd /= (1 + (G.buffs.assassinSpd || 0));
          }
          else if(h.cls === 'mage') cd /= (1 + (G.buffs.mageSpd || 0));
          // 蔡文姬增益期间攻速加成（按持久祝福强化）
          if(h.buffStacks > 0){
            cd /= (1 + 0.5 + (G.buffs.supDuration || 0) * 0.10);
          }
          // 真·黄忠「百步穿杨」：攻速×1.5
          if(h.cls === 'archer' && h.lv >= 5) cd /= 1.5;
          // 荀彧加冕：攻速 +50%
          // 荀彧加冕攻速：L1 +25% / L2 +30% / L3 +40% / L4 +50%；真 +60%
          if(h.xunyuCrownUntil && h.xunyuCrownUntil > G.time){
            const srcLv = h.xunyuCrownLv || 1;
            const spdBonus = h.xunyuCrownTrue ? 0.6 : [0.25, 0.30, 0.40, 0.50][Math.min(srcLv, 4) - 1];
            cd /= (1 + spdBonus);
          }
          // 鲁肃号令：全队攻速 +30%
          if(h.lusuHaoLingUntil && h.lusuHaoLingUntil > G.time) cd /= 1.3;
          // 真·吕布「赤兔加身」：持续 +20% 攻速；狂暴态额外 +20%
          if(h.heroId === 'lvbu' && h.lv >= 5) cd /= 1.2;
          if(h.heroId === 'lvbu' && h.lvbuFengXianUntil && h.lvbuFengXianUntil > G.time) cd /= 1.2;
          h.atkCD = cd;
          // 蔡文姬增益：每次攻击减少1层
          if(h.buffStacks > 0){
            h.buffStacks--;
            if(h.buffStacks <= 0) h.buffAtkBonus = 0;
          }
        }
      } else {
        isIdle = true;
      }
    }
  }

  // Idle behaviour
  if(isIdle){
    if(h.cls === 'gather'){
      let best = null, bd = Infinity;
      for(const r of G.resources){
        if(r.done) continue;
        const d = vdist(heroPos(h), r.pos);
        if(d < bd){ bd = d; best = r; }
      }
      if(best){
        const dir = vnorm(vsub(best.pos, heroPos(h)));
        h.worldX += dir.x * moveSpeed * dt;
        h.worldY += dir.y * moveSpeed * dt;
        isIdle = false;
      } else {
        if(!h.idleTarget || vdist(heroPos(h), h.idleTarget) < 8){
          pickIdleTarget(h);
        }
        const dir = vnorm(vsub(h.idleTarget, heroPos(h)));
        h.worldX += dir.x * moveSpeed * dt;
        h.worldY += dir.y * moveSpeed * dt;
      }
    } else {
      if(!h.idleTarget || vdist(heroPos(h), h.idleTarget) < 8){
        pickIdleTarget(h);
      }
      const dir = vnorm(vsub(h.idleTarget, heroPos(h)));
      h.worldX += dir.x * moveSpeed * dt;
      h.worldY += dir.y * moveSpeed * dt;
    }
  }
}

function computeDamage(h, target){
  let dmg = heroDPS(h);

  if(h.cls === 'warrior'){
    // 张飞被动：每层堆叠+3%伤害，buff "怒火燃烧" 提高每层效果
    const dmgPerStack = 0.03 + (G.buffs.warriorRage || 0);
    dmg *= 1 + h.rageStack * dmgPerStack;
  } else if(h.cls === 'archer'){
    if(Math.random() < (G.buffs.archerCrit || 0)){
      const critMul = 2 + (G.buffs.archerCritDmg || 0);
      dmg *= critMul;
    }
  } else if(h.cls === 'assassin'){
    if(Math.random() < (G.buffs.assassinCrit || 0)){
      dmg *= 2;
    }
    // Execution: 30% HP threshold；真·赵云提升至50%且无需 buff
    // 致命暗杀线性叠加：每层 +100% 处决加成（1层=×2、2层=×3、3层=×4...）
    const execStacks = G.buffs.assassinExec || 0;
    const execTH = (h.lv >= 5) ? 0.5 : (execStacks > 0 ? 0.3 : 0);
    if(execTH > 0 && target && target.hp / target.maxHp < execTH){
      const execMult = h.lv >= 5
        ? (execStacks > 0 ? 1 + execStacks : 2)  // 真赵云无 buff 时双倍兜底
        : 1 + execStacks;
      dmg *= execMult;
    }
  }
  return dmg;
}

// 统一伤害扣除 + DPS统计 + 跳字
// damageType: 字符串或字符串数组（连乘所有匹配类型）
// 类型词典：normal/skill, single/aoe, melee/ranged
function dealDamage(target, amount, ownerCls, isCrit, damageType){
  if(!target || amount <= 0) return;
  const dt = damageType || HERO_DEFAULT_DMG_TYPE[ownerCls] || ['normal'];
  if(Array.isArray(dt)){
    for(const t of dt) amount *= getAffixDmgMult(t);
  } else {
    amount *= getAffixDmgMult(dt);
  }
  // 貂蝉魅惑光环：范围内敌人受所有伤害额外加成（按等级阶梯 + buff diaochanCharm 每层 +5%）
  if(G.diaochanRange > 0 && target.pos){
    const diao = G.heroes && G.heroes.find(h => h.heroId === 'diaochan');
    if(diao){
      const dToDiao = Math.hypot(target.pos.x - diao.worldX, target.pos.y - diao.worldY);
      if(dToDiao <= G.diaochanRange){
        const isTrue = diao.lv >= 5;
        const base = isTrue ? 0.50 : [0.15, 0.20, 0.25, 0.30][Math.min(diao.lv, 4) - 1];
        const vuln = base + (G.buffs.diaochanCharm || 0);
        amount *= (1 + vuln);
      }
    }
  }
  target.hp -= amount;
  // 郭嘉积伤：标记中目标的所有承受伤害累加到 accumDmg（包括其他英雄的伤害）
  if(target.guojiaMark){
    target.guojiaMark.accumDmg = (target.guojiaMark.accumDmg || 0) + amount;
  }
  if(ownerCls && G.dpsStats){
    G.dpsStats[ownerCls] = (G.dpsStats[ownerCls] || 0) + amount;
  }
  spawnDmgPopup(target.pos.x, target.pos.y, Math.round(amount), isCrit);

  // 鲁肃军粮：战斗英雄的每次攻击附带真伤（按 G.lusuRationActive 全局）
  if(ownerCls && ownerCls !== 'gather' && ownerCls !== 'support' && ownerCls !== 'lord'){
    // 检查有效军粮：找任意 attacker 友军身上的 lusuRationUntil > G.time
    const anyHero = G.heroes && G.heroes.find(x => x.cls === ownerCls && x.lusuRationUntil && x.lusuRationUntil > G.time);
    if(anyHero && anyHero.lusuRationPct){
      const trueDmg = amount * anyHero.lusuRationPct;
      target.hp -= trueDmg;
      if(target.guojiaMark){
        target.guojiaMark.accumDmg = (target.guojiaMark.accumDmg || 0) + trueDmg;
      }
      G.dpsStats[ownerCls] = (G.dpsStats[ownerCls] || 0) + trueDmg;
    }
  }
}

// 真伤入口：绕过 dmgType 词缀加成、直接扣血（鲁肃军粮 / 未来真伤源用此）
function dealTrueDamage(target, amount, ownerCls){
  if(!target || amount <= 0) return;
  target.hp -= amount;
  if(target.guojiaMark){
    target.guojiaMark.accumDmg = (target.guojiaMark.accumDmg || 0) + amount;
  }
  if(ownerCls && G.dpsStats){
    G.dpsStats[ownerCls] = (G.dpsStats[ownerCls] || 0) + amount;
  }
  // 真伤跳字白色
  spawnDmgPopup(target.pos.x, target.pos.y, Math.round(amount), false);
}

// 跳字效果
function spawnDmgPopup(x, y, val, isCrit){
  if(!G.popups) G.popups = [];
  G.popups.push({
    type: 'dmg',
    x: x + (Math.random() - 0.5) * 14,
    y: y - 10,
    text: String(val),
    color: isCrit ? '#ffd700' : '#ffffff',
    isCrit: !!isCrit,
    until: G.time + 0.8,
    vy: -28
  });
}
function spawnSkillPopup(x, y, text, color){
  if(!G.popups) G.popups = [];
  G.popups.push({
    type: 'skill',
    x, y,
    text,
    color,
    until: G.time + 1.0,
    vy: -22
  });
}
function updatePopups(dt){
  if(!G.popups) return;
  for(let i = G.popups.length - 1; i >= 0; i--){
    const p = G.popups[i];
    p.y += p.vy * dt;
    p.vy += 25 * dt; // 缓慢减速
    if(p.until <= G.time) G.popups.splice(i, 1);
  }
}
function drawPopups(ctx){
  if(!G.popups) return;
  for(const p of G.popups){
    const lifeLeft = p.until - G.time;
    const totalLife = p.type === 'skill' ? 1.0 : 0.8;
    const alpha = Math.max(0, Math.min(1, lifeLeft / totalLife));
    ctx.globalAlpha = alpha;
    if(p.type === 'skill'){
      ctx.font = 'bold 11px Arial';
    } else if(p.isCrit){
      ctx.font = 'bold 14px Arial';
    } else {
      ctx.font = 'bold 11px Arial';
    }
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = p.type === 'skill' ? 2 : 2.4;
    ctx.strokeStyle = 'rgba(0,0,0,0.68)';
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  }
}

// 许褚：复合评分索敌（先 80px 内候选；选距堡最近，且击退冷却中的目标降权）
//   - 候选过滤：距许褚 ≤ XUCHU_SWITCH_RADIUS，且不在击退冷却中
//   - 评分：0.6·距堡(归一) + 0.4·距许褚(归一)，分越低越优
//   - 兜底：候选为空 → 取距许褚最近的1个（防止扑空）
//   - 锁定：若 h.xuchuStuckUntil > now，强制保持上次目标（最小停留期保护）
const XUCHU_SWITCH_RADIUS = 80;
const XUCHU_KNOCK_CD = 0.8;
const XUCHU_MIN_DWELL = 0.4;
function pickXuchuTargets(h){
  const all = G.monsters.filter(m => m.hp > 0);
  if(all.length === 0) return [];
  // 最小停留：仍锁旧目标
  const now = G.time;
  if(h.target && h.target.hp > 0 && h.xuchuStuckUntil && now < h.xuchuStuckUntil){
    return [h.target, ...all.filter(m => m !== h.target)];
  }
  const isTrue = h.lv >= 5;
  const knockCd = isTrue ? (XUCHU_KNOCK_CD * 0.5) : XUCHU_KNOCK_CD;
  const fx = G.fortress ? G.fortress.worldX : 0;
  const fy = G.fortress ? G.fortress.worldY : 0;
  const hx = h.worldX, hy = h.worldY;
  const inRadius = all.filter(m =>
    vdist(m.pos, v2(hx, hy)) <= XUCHU_SWITCH_RADIUS &&
    !(m.xuchuKnockedUntil && now < m.xuchuKnockedUntil - (XUCHU_KNOCK_CD - knockCd))
  );
  const pool = inRadius.length > 0 ? inRadius : [all.slice().sort((a, b) =>
    vdist(a.pos, v2(hx, hy)) - vdist(b.pos, v2(hx, hy))
  )[0]];
  // 评分归一化：找池内最大距堡/距许褚
  let maxDF = 0, maxDH = 0;
  for(const m of pool){
    const df = vdist(m.pos, v2(fx, fy));
    const dh = vdist(m.pos, v2(hx, hy));
    if(df > maxDF) maxDF = df;
    if(dh > maxDH) maxDH = dh;
  }
  const W_FORT = 0.6, W_SELF = 0.4;
  pool.sort((a, b) => {
    const sa = (vdist(a.pos, v2(fx, fy)) / Math.max(1, maxDF)) * W_FORT
             + (vdist(a.pos, v2(hx, hy)) / Math.max(1, maxDH)) * W_SELF;
    const sb = (vdist(b.pos, v2(fx, fy)) / Math.max(1, maxDF)) * W_FORT
             + (vdist(b.pos, v2(hx, hy)) / Math.max(1, maxDH)) * W_SELF;
    return sa - sb;
  });
  return pool;
}

// ============================================================
//  角色被动效果（按 heroId 分派）
// ============================================================

// 许褚：必触发冲杀（×2 伤害 + 30px 溅射 50% + 25px 击退 + 重度减速）
// 通过"复合评分索敌 + 击退冷却名单 + 最小停留 + 80px 切换半径"组合实现
// 不让怪物接近主堡 + 在怪堆中持续周旋的护卫感
function performXuchuAttack(h, targets, isTrue){
  const t = targets[0];
  if(!t) return;
  const dmg = computeDamage(h, t);
  // 必触发冲杀：基础 ×1.8 / 真 ×2.3（旧 ×3-4 + 概率 30-70%；新去概率，单次伤害下调）
  let chargeMult = isTrue ? 2.3 : 1.8;
  chargeMult *= (1 + (G.buffs.xuchuChargeBoost || 0));
  dealDamage(t, dmg * chargeMult, 'warrior', true, ['skill','single','melee']);
  // 30px 溅射 50%
  const splashR = 30;
  for(const m of G.monsters){
    if(m === t || m.hp <= 0) continue;
    if(vdist(m.pos, t.pos) <= splashR){
      dealDamage(m, dmg * 0.5, 'warrior', false, ['skill','aoe','melee']);
      applySlow(m, 0.5 + (G.buffs.xuchuPlate || 0), 0.5);
    }
  }
  // 主目标重度减速：基础 0.5s，buff xuchuPlate 每层 +0.3s
  applySlow(t, 0.5 + (G.buffs.xuchuPlate || 0), 0.5);
  // 击退（沿"许褚→怪物"方向延伸，许褚总在堡垒侧，天然远离堡垒）
  const kx = t.pos.x - h.worldX, ky = t.pos.y - h.worldY;
  const klen = Math.hypot(kx, ky) || 1;
  const knockStartX = t.pos.x, knockStartY = t.pos.y;
  const knockDist = 25;
  t.pos.x += (kx / klen) * knockDist;
  t.pos.y += (ky / klen) * knockDist;
  // 击退冷却名单：刚顶过的目标 0.8s 内不再被许褚优先选
  t.xuchuKnockedUntil = G.time + XUCHU_KNOCK_CD;
  // 最小停留：本次攻击后必须再吃 1 拍才能切换（防止挥到一半被拽走）
  h.xuchuStuckUntil = G.time + XUCHU_MIN_DWELL;
  // 视觉
  spawnSkillPopup(t.pos.x, t.pos.y - 24, '冲!', '#ff4040');
  triggerShake(3, 0.14);
  triggerScreenFlash(0.10, '255,80,80', 0.18);
  spawnParticleBurst(knockStartX, knockStartY, '#ff6040', 12);
  for(let pi = 0; pi < 5; pi++){
    const f = pi / 5;
    G.particles.push({
      x: knockStartX + (t.pos.x - knockStartX) * f + (Math.random()-0.5)*6,
      y: knockStartY + (t.pos.y - knockStartY) * f + (Math.random()-0.5)*6,
      vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10,
      life:0.35, maxLife:0.35, color:'#ff8050', size:3
    });
  }
  G.explosionEffects = G.explosionEffects || [];
  G.explosionEffects.push({ x: t.pos.x, y: t.pos.y, radius: splashR, until: G.time + 0.22, color: '#ff5040' });
  // L5 群体连环：1 次普攻命中后自动连冲 2 次（不再依赖 4s 内累计）
  if(isTrue){
    const others = G.monsters.filter(m => m !== t && m.hp > 0)
      .sort((a, b) => vdist(a.pos, v2(h.worldX, h.worldY)) - vdist(b.pos, v2(h.worldX, h.worldY)))
      .slice(0, 2);
    for(const m of others){
      dealDamage(m, dmg * chargeMult * 0.7, 'warrior', false, ['skill','single','melee']);
      const kx2 = m.pos.x - h.worldX, ky2 = m.pos.y - h.worldY;
      const kl2 = Math.hypot(kx2, ky2) || 1;
      m.pos.x += (kx2 / kl2) * knockDist;
      m.pos.y += (ky2 / kl2) * knockDist;
      m.xuchuKnockedUntil = G.time + XUCHU_KNOCK_CD * 0.5;
      spawnSkillPopup(m.pos.x, m.pos.y - 24, '连冲', '#ff6060');
    }
  }
  h.lastAttackTime = G.time;
}

// 吕布：概率扫击（50/70/90px AOE，×1.5/×2 伤害，附减速）
function performLvbuAttack(h, targets, isTrue){
  const t = targets[0];
  if(!t) return;
  const lv = h.lv;
  // 触发率 20/30/45/55%；L5 70%
  const chance = isTrue ? 0.70 : [0.20, 0.30, 0.45, 0.55][Math.min(lv, 4) - 1];
  const dmg = computeDamage(h, t);
  if(Math.random() < chance){
    // 扇形扫击：半径按等级阶梯（L1 80 / L2 95 / L3 110 / L4 125 / L5 真 150）；buff lvbuRange 每层 +15px
    const aoeR = (isTrue ? 150 : [80, 95, 110, 125][Math.min(lv, 4) - 1]) + (G.buffs.lvbuRange || 0);
    const dmgMult = isTrue ? 2 : 1.5;
    const dirX = t.pos.x - h.worldX, dirY = t.pos.y - h.worldY;
    const dirLen = Math.hypot(dirX, dirY) || 1;
    const fx = dirX / dirLen, fy = dirY / dirLen;
    const halfArc = isTrue ? Math.cos(Math.PI / 2) : Math.cos(Math.PI / 3); // 真180°=0/正常120°=0.5
    let hitAny = 0;
    for(const m of G.monsters){
      if(m.hp <= 0) continue;
      const ddx = m.pos.x - h.worldX, ddy = m.pos.y - h.worldY;
      const dd = Math.hypot(ddx, ddy);
      if(dd > aoeR || dd < 1) continue;
      const dot = (ddx / dd) * fx + (ddy / dd) * fy;
      if(dot < halfArc) continue;
      dealDamage(m, dmg * dmgMult, 'warrior', true, ['skill','aoe','melee']);
      applySlow(m, 0.5, 0.3);
      spawnParticleBurst(m.pos.x, m.pos.y, '#ffd700', 4);
      hitAny++;
    }
    spawnSkillPopup(h.worldX, h.worldY - 28, '无双', '#ffd700');
    triggerShake(3, 0.16);
    triggerScreenFlash(0.1, '255,215,0', 0.2);
    // 扇形视觉效果（用 explosionEffects 拓展 + 自定义）
    G.lvbuFans = G.lvbuFans || [];
    G.lvbuFans.push({
      x: h.worldX, y: h.worldY,
      radius: aoeR,
      angle: Math.atan2(fy, fx),
      arc: isTrue ? Math.PI : Math.PI * 2 / 3,
      until: G.time + 0.3
    });
    // 吕奉先狂暴：每次无双附加 1s 自身攻击力 +30%，buff lvbuFury 每层 +1s
    if(G.buffs.lvbuFury){
      const furyDur = 1 + (G.buffs.lvbuFury || 0);
      h.lvbuFengXianUntil = G.time + furyDur;
    }
    // L5 双无双触发"吕奉先"（强化态）
    if(isTrue){
      h.lvbuLastWuShuang = h.lvbuLastWuShuang || 0;
      if(G.time - h.lvbuLastWuShuang <= 4){
        h.lvbuFengXianUntil = G.time + 5;
        h.lvbuLastWuShuang = 0;
        spawnSkillPopup(h.worldX, h.worldY - 32, '吕奉先!', '#fff080');
        triggerScreenFlash(0.2, '255,215,0', 0.35);
      } else {
        h.lvbuLastWuShuang = G.time;
      }
    }
  } else {
    dealDamage(t, dmg, 'warrior', false, ['normal','single','melee']);
  }
  h.lastAttackTime = G.time;
}

// 张辽：普攻普通近战；瞬移突击由 updateHeroPassives 周期触发
function performZhangliaoAttack(h, targets, isTrue){
  const t = targets[0];
  if(!t) return;
  const dmg = computeDamage(h, t);
  dealDamage(t, dmg, 'assassin', false, ['normal','single','melee']);
  h.lastAttackTime = G.time;
}

// 吕蒙：普攻普通近战；若处于潜行态，首次普攻为白衣突袭
function performLvmengAttack(h, targets, isTrue){
  const t = targets[0];
  if(!t) return;
  const dmg = computeDamage(h, t);
  if(h.lvmengStealth){
    // 白衣突袭：×2.5 + L3+ AOE
    const surgeMult = isTrue ? 100 : 2.5;
    dealDamage(t, dmg * 2.5, 'assassin', true, ['skill','aoe','melee']);
    // L3+/L5 范围 AOE 50/100%
    const aoeRange = isTrue ? 80 : (h.lv >= 3 ? 60 : 0);
    const aoeMul = isTrue ? 1.0 : (h.lv >= 3 ? 0.6 : 0);
    if(aoeRange > 0){
      for(const m of G.monsters){
        if(m === t || m.hp <= 0) continue;
        if(vdist(m.pos, t.pos) <= aoeRange){
          dealDamage(m, dmg * aoeMul, 'assassin', false, ['skill','aoe','melee']);
        }
      }
      G.explosionEffects = G.explosionEffects || [];
      G.explosionEffects.push({ x: t.pos.x, y: t.pos.y, radius: aoeRange, until: G.time + 0.22, color: '#80d8ff' });
    }
    // L4+ 附 0.5s 减速
    if(h.lv >= 4) applySlow(t, 0.5, 0.4);
    spawnSkillPopup(t.pos.x, t.pos.y - 26, '白衣突袭', '#80d8ff');
    triggerShake(3, 0.16);
    h.lvmengStealth = false;
    h.lvmengStealthSince = 0;
  } else {
    dealDamage(t, dmg, 'assassin', false, ['normal','single','melee']);
  }
  h.lastAttackTime = G.time;
}

// ============================================================
//  角色被动每帧更新（DOT / 引爆 / 标记追踪等）
// ============================================================
function updateHeroPassives(dt){
  // 鲁肃军粮每秒回金
  if(G.lusuGoldUntil && G.lusuGoldUntil > G.time && G.lusuGoldRate){
    G._lusuGoldAcc = (G._lusuGoldAcc || 0) + (G.lusuGoldRate * dt);
    if(G._lusuGoldAcc >= 1){
      const add = Math.floor(G._lusuGoldAcc);
      G.gold += add;
      G._lusuGoldAcc -= add;
    }
  }
  // 张辽：周期瞬移突袭最近敌人
  // 吕蒙：N秒未攻击进入潜行
  // 貂蝉：每帧更新自身和敌方调试
  // 荀彧：周期加冕一名战斗英雄
  let diaochanRangeMax = 0;
  for(const h of (G.heroes || [])){
    if(h.cls === 'support' && h.heroId === 'diaochan'){
      const isTrue = h.lv >= 5;
      const rList = [100, 130, 160, 200];
      // buff diaochanCharm 每层 +20px 范围
      let r = (isTrue ? 300 : rList[Math.min(h.lv, 4) - 1]) + (G.buffs.diaochanCharm || 0) / 0.05 * 20;
      if(r > diaochanRangeMax) diaochanRangeMax = r;
      // 周期魅惑控制：范围内敌人原地不动；CD 阶梯 + buff diaochanCharmMax 每层 -0.5s
      const cdList = [8, 7, 6, 5];
      let cd = isTrue ? 3.5 : cdList[Math.min(h.lv, 4) - 1];
      cd = Math.max(2, cd - (G.buffs.diaochanCharmMax || 0));
      h.diaochanCharmNextAt = h.diaochanCharmNextAt != null ? h.diaochanCharmNextAt : G.time + cd;
      if(G.time >= h.diaochanCharmNextAt){
        let hitCount = 0;
        // 魅惑持续：基础 1s/真 1.5s + buff diaochanCharmMax 每层 +0.3s
        const charmDur = (isTrue ? 1.5 : 1.0) + (G.buffs.diaochanCharmMax || 0) * 0.6;
        for(const m of G.monsters){
          if(m.hp <= 0) continue;
          const dToDiao = Math.hypot(m.pos.x - h.worldX, m.pos.y - h.worldY);
          if(dToDiao <= r){
            m.stunUntil = Math.max(m.stunUntil || 0, G.time + charmDur * getCcMult());
            spawnParticleBurst(m.pos.x, m.pos.y, '#ff5fa2', 4);
            hitCount++;
          }
        }
        if(hitCount > 0){
          spawnSkillPopup(h.worldX, h.worldY - 32, '魅惑', '#ff5fa2');
          triggerScreenFlash(0.12, '255, 95, 162', 0.18);
          G.explosionEffects = G.explosionEffects || [];
          G.explosionEffects.push({ x: h.worldX, y: h.worldY, radius: r, until: G.time + 0.35, color: '#ff5fa2' });
        }
        h.diaochanCharmNextAt = G.time + cd;
      }
    }
    if(h.cls === 'support' && h.heroId === 'xunyu'){
      const isTrue = h.lv >= 5;
      const cdList = [12, 10, 8, 6];
      let cd = cdList[Math.min(h.lv, 4) - 1];
      // buff xunyuRhythm 每层 -1s CD
      cd = Math.max(2, cd - (G.buffs.xunyuRhythm || 0));
      h.xunyuNextAt = h.xunyuNextAt != null ? h.xunyuNextAt : G.time + cd;
      if(G.time >= h.xunyuNextAt){
        // 候选：非辅非采、且当前未被加冕的优先；如果所有人都在加冕态，则也选当前最弱加冕的人
        const candidates = G.heroes.filter(x => x.cls !== 'support' && x.cls !== 'gather');
        if(candidates.length > 0){
          const notCrowned = candidates.filter(x => !x.xunyuCrownUntil || x.xunyuCrownUntil <= G.time);
          const picks = (notCrowned.length > 0 ? notCrowned : candidates)
                          .slice().sort(() => Math.random() - 0.5);
          const pickCount = isTrue ? 2 : 1;
          // 时长 +1s/层 buff
          const dur = (isTrue ? 10 : 5) + (G.buffs.xunyuRhythm || 0);
          for(let i = 0; i < Math.min(pickCount, picks.length); i++){
            const t = picks[i];
            t.xunyuCrownUntil = G.time + dur;
            t.xunyuCrownTrue = isTrue;
            t.xunyuCrownLv = h.lv;  // 记录来源等级，用于加成阶梯
            spawnSkillPopup(t.worldX, t.worldY - 32, '加冕', '#ffd700');
            spawnParticleBurst(t.worldX, t.worldY, '#ffd700', 14);
            // 王佐之才：每加冕回堡 2HP/层
            const kingStacks = G.buffs.xunyuKing || 0;
            if(kingStacks > 0 && G.fortress){
              G.fortress.hp = Math.min(G.fortress.maxHp, G.fortress.hp + 2 * kingStacks);
              spawnSkillPopup(G.fortress.worldX, G.fortress.worldY - 20, '+' + (2 * kingStacks) + 'HP', '#80ffaa');
            }
          }
          h.xunyuNextAt = G.time + cd;
        } else {
          h.xunyuNextAt = G.time + 0.5;
        }
      }
    }
  }
  G.diaochanRange = diaochanRangeMax;
  for(const h of (G.heroes || [])){
    if(h.cls === 'assassin' && h.heroId === 'zhangliao'){
      const isTrue = h.lv >= 5;
      const cdList = [5, 4, 3, 2.5];
      let cd = isTrue ? 2 : cdList[Math.min(h.lv, 4) - 1];
      // buff zhangliaoCD 每层 -0.5s（最少 1s）
      cd = Math.max(1, cd - (G.buffs.zhangliaoCD || 0) * 0.5);
      h.zhangliaoNextAt = h.zhangliaoNextAt != null ? h.zhangliaoNextAt : G.time + cd;
      if(G.time >= h.zhangliaoNextAt){
        // 找最近的敌人
        let best = null, bd = Infinity;
        for(const m of G.monsters){
          if(m.hp <= 0) continue;
          const d = vdist(m.pos, heroPos(h));
          if(d < bd){ bd = d; best = m; }
        }
        if(best){
          // 记录出发点（用于残影）
          const fromX = h.worldX, fromY = h.worldY;
          // 瞬移
          h.worldX = best.pos.x;
          h.worldY = best.pos.y - 8;
          // 命中：×2 + 25px AOE 50%
          const dmg = computeDamage(h, best);
          dealDamage(best, dmg * 2, 'assassin', true, ['skill','single','melee']);
          for(const m of G.monsters){
            if(m === best || m.hp <= 0) continue;
            if(vdist(m.pos, best.pos) <= 25){
              dealDamage(m, dmg * 0.5, 'assassin', false, ['skill','aoe','melee']);
            }
          }
          if(isTrue) applySlow(best, 0.5, 0.4);
          // 残影粒子（从 fromX/fromY 到 to）
          for(let pi = 0; pi < 8; pi++){
            const f = pi / 8;
            G.particles.push({
              x: fromX + (h.worldX - fromX) * f,
              y: fromY + (h.worldY - fromY) * f,
              vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6,
              life:0.35, maxLife:0.35, color:'#4a90e2', size:3
            });
          }
          // 起点闪光粒子爆发
          spawnParticleBurst(fromX, fromY, '#80c0ff', 10);
          // 终点冲击粒子爆发
          spawnParticleBurst(best.pos.x, best.pos.y, '#4a90e2', 14);
          // 终点圆形爆炸视觉
          G.explosionEffects = G.explosionEffects || [];
          G.explosionEffects.push({ x: best.pos.x, y: best.pos.y, radius: 25, until: G.time + 0.22, color: '#4a90e2' });
          // 威名连击：连续3次触发全场减速
          h.zhangliaoHits = (h.zhangliaoHits || 0) + 1;
          if(h.zhangliaoHits >= 3){
            for(const m of G.monsters){
              if(m.hp > 0) applySlow(m, 1, 0.3);
            }
            // 加全队"威名"buff（攻速+30% / buff zhangliaoFame 每层+1s）
            const fameDur = 2 + (G.buffs.zhangliaoFame || 0);
            for(const x of G.heroes){
              if(x.cls === 'gather' || x.cls === 'support') continue;
              x.zhangliaoFameUntil = G.time + fameDur;
            }
            spawnSkillPopup(h.worldX, h.worldY - 32, '威名!', '#ffd700');
            triggerScreenFlash(0.18, '255, 215, 80', 0.3);
            triggerShake(4, 0.18);
            h.zhangliaoHits = 0;
          }
          spawnSkillPopup(best.pos.x, best.pos.y - 22, '突袭', CLASS_COLOR.assassin);
          triggerShake(3, 0.14);
          h.zhangliaoNextAt = G.time + cd;
        } else {
          // 没敌人就半秒后再尝试
          h.zhangliaoNextAt = G.time + 0.5;
        }
      }
    }
    if(h.cls === 'assassin' && h.heroId === 'lvmeng'){
      const isTrue = h.lv >= 5;
      const silenceList = [6, 5, 4, 3];
      let needSilence = isTrue ? 2 : silenceList[Math.min(h.lv, 4) - 1];
      // buff lvmengSilence 每层 -0.5s（最少 1s）
      needSilence = Math.max(1, needSilence - (G.buffs.lvmengSilence || 0) * 0.5);
      const lastAtk = h.lastAttackTime || 0;
      if(!h.lvmengStealth && G.time - lastAtk > needSilence){
        h.lvmengStealth = true;
        h.lvmengStealthSince = G.time;
      }
    }
  }

  if(!G.monsters || G.monsters.length === 0) return;
  for(let i = G.monsters.length - 1; i >= 0; i--){
    const m = G.monsters[i];
    if(m.hp <= 0) continue;
    // 周瑜燃身 DOT
    if(m.zhouyuBurn && m.zhouyuBurn.until > G.time){
      const b = m.zhouyuBurn;
      if(G.time - (b.lastTick || 0) >= 0.5){
        // 每 0.5s tick 一次（视觉 + 计算频率）
        const tickDmg = b.dotPerSec * 0.5;
        dealDamage(m, tickDmg, 'mage', false, ['skill','single','ranged']);
        b.lastTick = G.time;
        if(Math.random() < 0.4){
          G.particles && G.particles.push({
            x: m.pos.x + (Math.random()-0.5)*16, y: m.pos.y + (Math.random()-0.5)*16,
            vx: (Math.random()-0.5)*8, vy: -20 - Math.random()*16,
            life: 0.4, maxLife: 0.4, color: '#ff7028', size: 2
          });
        }
      }
    } else if(m.zhouyuBurn){
      m.zhouyuBurn = null;
    }
    // 郭嘉积伤引爆：到时间引爆
    if(m.guojiaMark){
      if(G.time >= m.guojiaMark.explodeAt){
        triggerGuojiaExplode(m);
      }
    }
  }
  // === 郭嘉周期标记维护（每个郭嘉独立堆叠）===
  for(const h of (G.heroes || [])){
    if(h.heroId !== 'guojia') continue;
    const isTrue = h.lv >= 5;
    // 标记数上限：基础按等级 + buff guojiaMarkBoost 每层 +1
    const baseSlot = isTrue ? 5 : [1, 2, 3, 4][Math.min(h.lv, 4) - 1];
    const slotMax = baseSlot + (G.buffs.guojiaMarkBoost || 0);
    // CD：基础按等级
    const cdList = [4.0, 3.5, 3.0, 2.5];
    const cd = isTrue ? 2.0 : cdList[Math.min(h.lv, 4) - 1];
    // 引爆系数：基础按等级 + buff guojiaBoom 每层 +0.2
    let factor = isTrue ? 1.5 : [0.80, 0.90, 1.00, 1.20][Math.min(h.lv, 4) - 1];
    factor += (G.buffs.guojiaBoom || 0);
    // 引爆持续：固定 2s（真郭嘉 1.5s）
    const dur = isTrue ? 1.5 : 2.0;
    // 自己当前活跃的标记列表
    h.guojiaActiveMarks = (h.guojiaActiveMarks || []).filter(m => m && m.hp > 0 && m.guojiaMark && m.guojiaMark.ownerHeroId === h.id);
    h.guojiaNextAt = h.guojiaNextAt != null ? h.guojiaNextAt : G.time + cd;
    if(G.time >= h.guojiaNextAt && h.guojiaActiveMarks.length < slotMax){
      // 找一个未被任何郭嘉标记、HP 最高的敌人；优先距堡垒最近防止打不到
      let best = null, bestScore = -Infinity;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        if(m.guojiaMark) continue;
        // 评分：HP 占主，距堡垒近 + 加权
        const distFort = G.fortress ? Math.hypot(m.pos.x - G.fortress.worldX, m.pos.y - G.fortress.worldY) : 0;
        const score = m.hp - distFort * 0.5;
        if(score > bestScore){ bestScore = score; best = m; }
      }
      if(best){
        best.guojiaMark = {
          explodeAt: G.time + dur,
          accumDmg: 0,
          factor: factor,
          isTrue: isTrue,
          ownerHeroId: h.id
        };
        h.guojiaActiveMarks.push(best);
        spawnSkillPopup(best.pos.x, best.pos.y - 24, '奇谋', '#a070ff');
        h.guojiaNextAt = G.time + cd;
      } else {
        // 没目标可标，0.3s 后重试
        h.guojiaNextAt = G.time + 0.3;
      }
    }
  }
}
function triggerGuojiaExplode(target){
  if(!target.guojiaMark) return;
  const accum = target.guojiaMark.accumDmg || 0;
  const factor = target.guojiaMark.factor || 1;
  const isTrue = target.guojiaMark.isTrue;
  const boomR = isTrue ? 80 : 60;
  const boomDmg = accum * factor;
  target.guojiaMark = null;
  for(const m of G.monsters){
    if(m.hp <= 0) continue;
    if(vdist(m.pos, target.pos) <= boomR){
      dealDamage(m, boomDmg, 'mage', true, ['skill','aoe','ranged']);
      // 真·郭嘉附带 1s 减速
      if(isTrue) applySlow(m, 1.0, 0.35);
    }
  }
  G.explosionEffects = G.explosionEffects || [];
  G.explosionEffects.push({ x: target.pos.x, y: target.pos.y, radius: boomR, until: G.time + 0.3, color: '#a070ff' });
  spawnParticleBurst(target.pos.x, target.pos.y, '#a070ff', 18);
  spawnSkillPopup(target.pos.x, target.pos.y - 30, '引爆', '#a070ff');
  triggerShake(3, 0.16);
  sfx('explode');
}
// 采集英雄入账事件（鲁肃 / 邓艾）
function onGatherDeposit(h, amount){
  if(!h || h.cls !== 'gather') return;
  // 鲁肃：发放军粮 buff（真伤）+ 一次性金币奖励（与入账金额挂钩）
  if(h.heroId === 'lusu'){
    const isTrue = h.lv >= 5;
    const lv = h.lv;
    // 真伤百分比
    const trueDmgPct = isTrue ? 0.30 : [0.08, 0.12, 0.16, 0.20][Math.min(lv, 4) - 1];
    // 一次性金币奖励 = 入账金额 × N%（取代旧的每秒回金）
    const bonusGoldPct = isTrue ? 0.20 : [0.05, 0.08, 0.12, 0.15][Math.min(lv, 4) - 1];
    const dur = isTrue ? 8 : 5;
    for(const x of G.heroes){
      if(x.cls === 'gather' || x.cls === 'support') continue;
      x.lusuRationUntil = G.time + dur;
      x.lusuRationPct = trueDmgPct;
    }
    // 一次性金币奖励
    const bonus = Math.floor((amount || 0) * bonusGoldPct);
    if(bonus > 0){
      G.gold += bonus;
      spawnSkillPopup(h.worldX, h.worldY - 36, '+' + bonus + '金', '#80ffaa');
    }
    // 关闭旧的持续回金
    G.lusuGoldUntil = 0;
    G.lusuGoldRate = 0;
    // L5 号令：全队攻速+30%/3s + 堡垒+3HP
    if(isTrue){
      G.fortress.hp = Math.min(G.fortress.maxHp, G.fortress.hp + 3);
      for(const x of G.heroes){
        if(x.cls === 'gather' || x.cls === 'support') continue;
        x.lusuHaoLingUntil = G.time + 3;
      }
      spawnSkillPopup(h.worldX, h.worldY - 32, '号令', '#80ffaa');
    }
    spawnSkillPopup(h.worldX, h.worldY - 22, '军粮', '#80ffaa');
  }
  // 邓艾：每次入账召唤矿工小兵到最远矿脉处采集
  if(h.heroId === 'dengai'){
    spawnDengaiMinion(h);
  }
}

// 邓艾矿工小兵
function spawnDengaiMinion(h){
  // buff dengaiCount 每层 +1 矿工
  const count = 1 + (G.buffs.dengaiCount || 0);
  for(let i = 0; i < count; i++){
    spawnSingleDengaiMinion(h);
  }
}
function spawnSingleDengaiMinion(h){
  const isTrue = h.lv >= 5;
  const lv = h.lv;
  const speedList = [40, 55, 70, 90];
  const collectRateList = [12, 16, 22, 30];
  const capList         = [30, 50, 75, 110];
  // buff dengaiSpd 每层 +20% 移速
  let speed = isTrue ? 110 : speedList[Math.min(lv, 4) - 1];
  speed *= (1 + (G.buffs.dengaiSpd || 0));
  const rate  = isTrue ? 40  : collectRateList[Math.min(lv, 4) - 1];
  const cap   = isTrue ? 160 : capList[Math.min(lv, 4) - 1];
  // 找未完成的矿：优先 300px 内距堡垒最远的；其次屏幕内；最后向全场找
  const fpos = G.fortress ? { x: G.fortress.worldX, y: G.fortress.worldY } : null;
  const cameraY = G.fortress ? (G.fortress.worldY - CH * 0.4) : 0;
  const screenTop = cameraY, screenBot = cameraY + CH;
  let target = null, bestD = -Infinity;
  // 第一轮：300px 半径内
  if(fpos){
    for(const r of G.resources || []){
      if(r.done) continue;
      const dToF = vdist(r.pos, fpos);
      if(dToF > 300) continue;
      if(dToF > bestD){ bestD = dToF; target = r; }
    }
  }
  // 第二轮：屏幕内
  if(!target){
    bestD = -Infinity;
    for(const r of G.resources || []){
      if(r.done) continue;
      if(r.pos.y < screenTop || r.pos.y > screenBot) continue;
      const d = fpos ? vdist(r.pos, fpos) : 0;
      if(d > bestD){ bestD = d; target = r; }
    }
  }
  // 第三轮：屏幕外兜底
  if(!target){
    bestD = -Infinity;
    for(const r of G.resources || []){
      if(r.done) continue;
      const d = fpos ? vdist(r.pos, fpos) : 0;
      if(d > bestD){ bestD = d; target = r; }
    }
  }
  // 如果没矿，矿工直接转成攻击小人（如果是真邓艾）；普通邓艾跳过
  if(!target){
    if(isTrue){
      // 直接召唤一个攻击小人在堡垒前方
      const sx = G.fortress.worldX + (Math.random() - 0.5) * 60;
      const sy = G.fortress.worldY - 30;
      G.minions = G.minions || [];
      G.minions.push({
        x: sx, y: sy,
        speed: speed,
        cap: cap, collected: 0, rate: rate,
        target: null, mode: 'attack',
        attackUntil: G.time + 10,
        atkCD: 0,
        dps: heroDPS(h) * 1.5,
        spawnTime: G.time
      });
      spawnSkillPopup(sx, sy - 12, '小兵!', '#ffaa30');
    }
    return;
  }
  // 召唤矿工：从邓艾旁边出发
  G.minions = G.minions || [];
  G.minions.push({
    x: h.worldX + (Math.random() - 0.5) * 24,
    y: h.worldY + (Math.random() - 0.5) * 16,
    speed: speed,
    cap: cap, collected: 0, rate: rate,
    target: target,
    mode: 'mine',  // 'mine' → 'return' → 'done' or 'attack'(真)
    isTrue: isTrue,
    dps: heroDPS(h) * 1.5,
    atkCD: 0,
    spawnTime: G.time
  });
  spawnSkillPopup(h.worldX, h.worldY - 22, '矿工!', '#ffaa30');
  spawnParticleBurst(h.worldX, h.worldY, '#ffaa30', 8);
}

function updateDengaiMinions(dt){
  if(!G.minions || G.minions.length === 0) return;
  for(let i = G.minions.length - 1; i >= 0; i--){
    const u = G.minions[i];
    if(u.mode === 'mine'){
      // 飞往目标矿脉
      if(!u.target || u.target.done){
        // 矿没了：优先找屏幕内距矿工最近的；找不到再全局
        let next = null, bestD = Infinity;
        const camY = G.fortress ? (G.fortress.worldY - CH * 0.4) : 0;
        const sTop = camY, sBot = camY + CH;
        for(const r of G.resources){
          if(r.done) continue;
          if(r.pos.y < sTop || r.pos.y > sBot) continue;
          const d = Math.hypot(r.pos.x - u.x, r.pos.y - u.y);
          if(d < bestD){ bestD = d; next = r; }
        }
        if(!next){
          // 屏幕外兜底
          bestD = Infinity;
          for(const r of G.resources){
            if(r.done) continue;
            const d = Math.hypot(r.pos.x - u.x, r.pos.y - u.y);
            if(d < bestD){ bestD = d; next = r; }
          }
        }
        if(next){ u.target = next; }
        else { u.mode = 'return'; continue; }
      }
      const dx = u.target.pos.x - u.x, dy = u.target.pos.y - u.y;
      const d = Math.hypot(dx, dy);
      if(d > 14){
        u.x += dx / d * u.speed * dt;
        u.y += dy / d * u.speed * dt;
      } else {
        // 采集
        const r = u.rate * dt;
        const room = u.cap - u.collected;
        const gain = Math.min(room, r);
        u.collected += gain * (u.target.yieldMult || 1);
        u.target.hp -= 10 * dt;
        if(u.target.hp <= 0){
          u.target.done = true;
          tryRespawnResource(u.target);
          u.target = null;
        }
        if(u.collected >= u.cap){
          u.mode = 'return';
        }
      }
    } else if(u.mode === 'return'){
      // 返堡
      if(!G.fortress){ G.minions.splice(i, 1); continue; }
      const fx = G.fortress.worldX, fy = G.fortress.worldY;
      const dx = fx - u.x, dy = fy - u.y;
      const d = Math.hypot(dx, dy);
      if(d > 22){
        u.x += dx / d * u.speed * dt;
        u.y += dy / d * u.speed * dt;
      } else {
        // 入账（鲁肃军粮可能也对此次生效，但邓艾不再二次召唤避免循环）
        if(u.collected > 0){
          G.gold += u.collected * GATHER_OUTPUT_MULT;
          spawnSkillPopup(u.x, u.y - 14, '+' + Math.floor(u.collected * GATHER_OUTPUT_MULT) + '金', '#ffd700');
        }
        // 真邓艾：转攻击小人
        if(u.isTrue){
          u.mode = 'attack';
          u.attackUntil = G.time + 10;
          u.atkCD = 0;
          u.collected = 0;
          spawnSkillPopup(u.x, u.y - 14, '迎战', '#ffaa30');
        } else {
          G.minions.splice(i, 1);
        }
      }
    } else if(u.mode === 'attack'){
      // 攻击小人模式：找最近敌人攻击
      if(G.time > u.attackUntil){
        // 消失
        spawnParticleBurst(u.x, u.y, '#ffaa30', 8);
        G.minions.splice(i, 1);
        continue;
      }
      let best = null, bestD = Infinity;
      for(const m of G.monsters){
        if(m.hp <= 0) continue;
        const d = Math.hypot(m.pos.x - u.x, m.pos.y - u.y);
        if(d < bestD){ bestD = d; best = m; }
      }
      if(best){
        if(bestD > 35){
          u.x += (best.pos.x - u.x) / bestD * u.speed * dt;
          u.y += (best.pos.y - u.y) / bestD * u.speed * dt;
        } else {
          u.atkCD = (u.atkCD || 0) - dt;
          if(u.atkCD <= 0){
            dealDamage(best, u.dps, 'gather', false, ['normal','single','melee']);
            u.atkCD = 0.6;
          }
        }
      }
    }
  }
}

function drawDengaiMinions(ctx){
  if(!G.minions || G.minions.length === 0) return;
  for(const u of G.minions){
    ctx.save();
    if(u.mode === 'attack'){
      // 攻击小人 - 红橙色
      ctx.fillStyle = '#ff8030';
      ctx.fillRect(u.x - 6, u.y - 6, 12, 12);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(u.x - 6, u.y - 6, 12, 12);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('兵', u.x, u.y + 0.5);
      // 剩余时长 ring
      const left = Math.max(0, u.attackUntil - G.time);
      const ratio = left / 10;
      ctx.strokeStyle = ratio > 0.3 ? '#ffd700' : '#ff4040';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(u.x, u.y, 9, -Math.PI/2, -Math.PI/2 + ratio * Math.PI * 2);
      ctx.stroke();
    } else {
      // 矿工 - 黄色
      ctx.fillStyle = '#d4a040';
      ctx.fillRect(u.x - 5, u.y - 5, 10, 10);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(u.x - 5, u.y - 5, 10, 10);
      ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('矿', u.x, u.y + 0.5);
      // 采集进度条
      if(u.cap > 0){
        const w = 12;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(u.x - w/2, u.y + 8, w, 2);
        ctx.fillStyle = '#80ffaa';
        ctx.fillRect(u.x - w/2, u.y + 8, w * (u.collected / u.cap), 2);
      }
    }
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
  }
}

// 怪物死亡时：周瑜火焰传染 + 郭嘉死亡立即引爆
function onMonsterDeath(m){
  // 周瑜火焰：跳到 60px 内未燃烧的最近敌人
  if(m.zhouyuBurn && m.zhouyuBurn.chainLeft > 0){
    let best = null, bd = Infinity;
    for(const m2 of G.monsters){
      if(m2 === m || m2.hp <= 0) continue;
      if(m2.zhouyuBurn && m2.zhouyuBurn.until > G.time) continue;
      const d = vdist(m.pos, m2.pos);
      if(d <= 60 && d < bd){ bd = d; best = m2; }
    }
    if(best){
      const remainTime = Math.max(1, m.zhouyuBurn.until - G.time);
      best.zhouyuBurn = {
        dotPerSec: m.zhouyuBurn.dotPerSec,
        until: G.time + remainTime,
        lastTick: G.time,
        chainLeft: m.zhouyuBurn.chainLeft - 1,
        stack: m.zhouyuBurn.stack || 1,
        isTrue: m.zhouyuBurn.isTrue
      };
      spawnSkillPopup(best.pos.x, best.pos.y - 24, '传火', '#ff7028');
      // 传火弧线（橙红色 chain，与赵云蓝闪电链区分）
      G.chainEffects = G.chainEffects || [];
      G.chainEffects.push({
        from: { x: m.pos.x, y: m.pos.y },
        to:   { x: best.pos.x, y: best.pos.y },
        until: G.time + 0.3,
        color: '#ff7028'
      });
      // 起点和终点都迸火粒子
      spawnParticleBurst(m.pos.x, m.pos.y, '#ff7028', 6);
      spawnParticleBurst(best.pos.x, best.pos.y, '#ff7028', 6);
    }
  }
  // 郭嘉标记：死亡时立即引爆（如果是真·郭嘉）
  if(m.guojiaMark && m.guojiaMark.isTrue){
    triggerGuojiaExplode(m);
  }
}

// 太史慈：弹道附追魂数据，命中后由 updateProjectiles 引爆追踪
function performTaishiciAttack(h, targets, maxT, isTrue){
  const hitCount = Math.min(maxT, targets.length);
  for(let i = 0; i < hitCount; i++){
    const t = targets[i];
    const dmg = computeDamage(h, t);
    const dx = t.pos.x - h.worldX, dy = t.pos.y - h.worldY;
    const len = Math.hypot(dx, dy) || 1;
    const spd = 280;
    // 连追次数：L1 1 / L2 2 / L3 3 / L4 4；L5 必触发上限6；buff taishiciChase 每层 +1
    const chaseMax = (isTrue ? 6 : [1, 2, 3, 4][Math.min(h.lv, 4) - 1]) + (G.buffs.taishiciChase || 0);
    G.projectiles.push({
      x: h.worldX, y: h.worldY,
      vx: dx / len * spd, vy: dy / len * spd,
      targetId: t.id,
      dmg,
      owner: 'archer',
      taishici: true,
      tsChaseLeft: chaseMax,
      tsChasedIds: [],
      tsIsTrue: !!isTrue,
      lifetime: 2.5
    });
  }
}

// 夏侯渊：连射 N 箭 + 末段补射；用调度数组按时序发射
function performXiahouyuanAttack(h, targets, maxT, isTrue){
  // 多重射击：对前 maxT 个目标各发一组连射
  const hitCount = Math.min(maxT, targets.length);
  if(hitCount === 0) return;
  // 段数：L1 2 / L2 3 / L3 3 / L4 4；L5 6；buff xiahouyuanSeg 每层 +1
  let shots = (isTrue ? 6 : [2, 3, 3, 4][Math.min(h.lv, 4) - 1]) + (G.buffs.xiahouyuanSeg || 0);
  // 距堡垒最近的目标（targets[0]，已按距离排序） → 额外+2 段
  for(let ti = 0; ti < hitCount; ti++){
    const t = targets[ti];
    const dmg = computeDamage(h, t);
    let myShots = shots;
    if(isTrue && ti === 0) myShots += 2;
    for(let i = 0; i < myShots; i++){
      const dx = t.pos.x - h.worldX, dy = t.pos.y - h.worldY;
      const len = Math.hypot(dx, dy) || 1;
      const spd = 280;
      G.projectiles.push({
        x: h.worldX, y: h.worldY,
        vx: dx / len * spd, vy: dy / len * spd,
        targetId: t.id,
        dmg: dmg * 0.65,
        owner: 'archer',
        spawnAt: G.time + i * 0.12,
        xiahouyuan: true,
        isLast: i === myShots - 1,
        xhyTrueRefill: (isTrue ? 5 : 0) + (G.buffs.xiahouyuanChase || 0),
        lifetime: 2.5
    });
    }
  }
}

// 周瑜：普攻挂"燃身" DOT，目标死亡时跳到附近未燃烧敌人
function performZhouyuAttack(h, targets, isTrue){
  const t = targets[0];
  if(!t) return;
  // 走 mage 通用 AOE 弹道（命中后 AOE 伤害 + 给主目标挂燃身 DOT）
  const dmg = computeDamage(h, t) * 0.7;
  const aoeR = 25 * (1 + (G.buffs.mageRange || 0)) * (isTrue ? 1.5 : 1);
  const dx = t.pos.x - h.worldX, dy = t.pos.y - h.worldY;
  const len = Math.hypot(dx, dy) || 1;
  const spd = 220;
  G.projectiles.push({
    x: h.worldX, y: h.worldY,
    vx: dx / len * spd, vy: dy / len * spd,
    targetId: t.id,
    dmg,
    owner: 'mage',
    aoeRadius: aoeR,
    slow: Math.min(0.8, G.buffs.mageSlow || 0),
    zhouyuMark: { heroId: h.id, isTrue: isTrue, lv: h.lv },
    lifetime: 2.5
  });
}

function applyZhouyuBurn(target, h, isTrue){
  const lv = h.lv;
  const dotPctList = [0.25, 0.30, 0.35, 0.40];
  const durList = [5, 6, 6, 7];
  let dotPct = isTrue ? 0.60 : dotPctList[Math.min(lv, 4) - 1];
  // 燃身强化 buff
  dotPct *= (1 + (G.buffs.zhouyuBurnDmg || 0));
  let dur = isTrue ? 8 : durList[Math.min(lv, 4) - 1];
  const existing = target.zhouyuBurn;
  let stack = 1;
  if(existing && existing.until > G.time){
    stack = Math.min(isTrue ? 3 : 1, (existing.stack || 1) + (isTrue ? 1 : 0));
  }
  // 跳传上限 = 基础 + buff
  const baseChain = isTrue ? 6 : [1, 2, 2, 3][Math.min(lv, 4) - 1];
  target.zhouyuBurn = {
    dotPerSec: dotPct * heroDPS(h) * (1 + 0.2 * (stack - 1)),
    until: G.time + dur,
    lastTick: G.time,
    fromHeroId: h.id,
    chainLeft: baseChain + (G.buffs.zhouyuChain || 0),
    stack: stack,
    isTrue: isTrue
  };
}

function performAttack(h, targets, maxT){
  const isTrue = h.lv >= 5;
  if(h.cls === 'warrior'){
    // 区分角色：张飞 = 越战越勇；许褚 = 概率冲杀；吕布 = 概率扫击
    const hid = h.heroId || 'zhangfei';
    if(hid === 'xuchu') return performXuchuAttack(h, targets, isTrue);
    if(hid === 'lvbu')  return performLvbuAttack(h, targets, isTrue);
    // 默认：张飞
    // 张飞被动：每次攻击+1堆叠（上限10+buff，真·英雄+15），4秒不攻击清空
    const maxStack = 10 + Math.round((G.buffs.warriorRageMax || 0)) + (isTrue ? 15 : 0);
    const prevStack = h.rageStack;
    h.rageStack = Math.min(maxStack, h.rageStack + 1);
    h.lastAttackTime = G.time;
    // 首次达到满层：跳字+震屏特效
    if(prevStack < maxStack && h.rageStack === maxStack){
      spawnSkillPopup(h.worldX, h.worldY - 30, '狂怒!', '#ff4040');
      triggerShake(3, 0.15);
      spawnParticleBurst(h.worldX, h.worldY, '#ff4040', 10);
    }
    const t = targets[0];
    if(!t) return;
    let dmg = computeDamage(h, t);
    dealDamage(t, dmg, 'warrior', false, ['normal','single','melee']);
    // "横扫千军"增益才有溅射AOE，普攻保持单体
    const stunChance = 0.25 + (h.lv - 1) * 0.05 + (G.buffs.warriorStun || 0);
    const ccMult = (G.levelConfig && G.levelConfig.affix && G.levelConfig.affix.ccDurationMult) || 1;
    const stunDur = (1 + (h.lv - 1) * 0.5) * ccMult;
    if(Math.random() < stunChance){
      t.stunUntil = G.time + stunDur;
      // 张飞触发眩晕：技能跳字"重击" + 震屏
      spawnSkillPopup(t.pos.x, t.pos.y - 24, '重击', CLASS_COLOR.warrior);
      triggerShake(2.5, 0.1);
    }

    // AOE: 30px splash around primary target
    if(G.buffs.warriorAOE){
      // 基础范围 30，每层增加 10
      const aoeR = 20 + G.buffs.warriorAOE;
      let hitAny = false;
      for(const m of G.monsters){
        if(m === t || m.hp <= 0) continue;
        if(vdist(m.pos, t.pos) <= aoeR){
          dealDamage(m, dmg * 0.5, 'warrior', false, ['skill','aoe','melee']);
          hitAny = true;
        }
      }
      if(hitAny){
        // AOE视觉提示
        G.explosionEffects = G.explosionEffects || [];
        G.explosionEffects.push({
          x: t.pos.x, y: t.pos.y,
          radius: aoeR,
          until: G.time + 0.25,
          color: CLASS_COLOR.warrior
        });
      }
    }
    // 真·张飞「万夫莫敌」：普攻附带60px半径横扫AOE（伤害50%）
    if(isTrue){
      const aoeR = 60;
      const hpos = v2(h.worldX, h.worldY);
      let hitAny = false;
      for(const m of G.monsters){
        if(m === t || m.hp <= 0) continue;
        if(vdist(m.pos, hpos) <= aoeR){
          dealDamage(m, dmg * 0.5, 'warrior', false, ['skill','aoe','melee']);
          hitAny = true;
        }
      }
      if(hitAny){
        G.explosionEffects = G.explosionEffects || [];
        G.explosionEffects.push({
          x: h.worldX, y: h.worldY,
          radius: aoeR,
          until: G.time + 0.22,
          color: '#ffaa30'
        });
      }
      // 满层附加震慑
      if(h.rageStack >= maxStack){
        for(const m of G.monsters){
          if(m.hp <= 0) continue;
          if(vdist(m.pos, hpos) <= 50){
            m.stunUntil = Math.max(m.stunUntil || 0, G.time + 0.4);
          }
        }
      }
    }
  } else if(h.cls === 'archer'){
    const hid = h.heroId || 'huangzhong';
    if(hid === 'taishici') return performTaishiciAttack(h, targets, maxT, isTrue);
    if(hid === 'xiahouyuan') return performXiahouyuanAttack(h, targets, maxT, isTrue);
    // 默认：黄忠
    const hitCount = Math.min(maxT, targets.length);
    for(let i = 0; i < hitCount; i++){
      const t = targets[i];
      let dmg = computeDamage(h, t);

      // velocity vector
      const dx = t.pos.x - h.worldX, dy = t.pos.y - h.worldY;
      const len = Math.hypot(dx, dy) || 1;
      const spd = 280;
      // 黄忠概率爆炸：等级提升爆炸概率和伤害倍数
      let explodeChance = 0.3 + (h.lv - 1) * 0.1;  // 1级30% / 2级40% / 3级50% / 4级60% / 5级70%
      let explodeDmgMult = 1 + (h.lv - 1) * 0.3;
      let explodeRadius = 50 + (G.buffs.archerPierce || 0) * 25;
      if(isTrue){
        // 真·黄忠「百步穿杨」：必爆裂，爆炸半径×1.5
        explodeChance = 1.0;
        explodeRadius *= 1.5;
      }
      G.projectiles.push({
        x: h.worldX, y: h.worldY,
        vx: dx / len * spd, vy: dy / len * spd,
        targetId: t.id,
        dmg,
        owner: 'archer',
        explodeChance,
        explodeDmgMult,
        explodeRadius,
        lifetime: 2.5
      });
    }
  } else if(h.cls === 'assassin'){
    const hid = h.heroId || 'zhaoyun';
    if(hid === 'zhangliao') return performZhangliaoAttack(h, targets, isTrue);
    if(hid === 'lvmeng')    return performLvmengAttack(h, targets, isTrue);
    // 默认：赵云
    const t = targets[0];
    if(!t) return;
    let dmg = computeDamage(h, t);
    dealDamage(t, dmg, 'assassin', false, ['normal','single','melee']);

    // 真·赵云「常山赵子龙」：攻击瞬移近敌（突进感）
    if(isTrue){
      const dx = t.pos.x - h.worldX, dy = t.pos.y - h.worldY;
      const d = Math.hypot(dx, dy);
      if(d > 25){
        const k = (d - 22) / d;
        h.worldX += dx * k * 0.6;
        h.worldY += dy * k * 0.6;
      }
    }

    // Lightning chain
    const baseChance = 0.5;
    const maxBounces = 5 + (h.lv - 1) + (G.buffs.assassinChain || 0) + (isTrue ? 6 : 0);
    const chainDmg = dmg * 0.7;
    let curTarget = t;
    let bounces = 0;
    const hitSet = new Set([t.id]);
    let chainTriggered = false;
    while(bounces < maxBounces && Math.random() < (baseChance + (h.lv - 1) * 0.05 + (isTrue ? 0.2 : 0))){
      let next = null, nd = 80;
      for(const m of G.monsters){
        if(hitSet.has(m.id) || m.hp <= 0) continue;
        const d = vdist(curTarget.pos, m.pos);
        if(d < nd){ nd = d; next = m; }
      }
      if(!next) break;
      dealDamage(next, chainDmg, 'assassin', false, ['skill','aoe','melee']);
      hitSet.add(next.id);
      chainTriggered = true;
      G.chainEffects.push({
        from: {x: curTarget.pos.x, y: curTarget.pos.y},
        to: {x: next.pos.x, y: next.pos.y},
        until: G.time + 0.2
      });
      curTarget = next;
      bounces++;
    }
    if(chainTriggered){
      // 赵云闪电链触发：在主目标上方提示 + 震屏
      spawnSkillPopup(t.pos.x, t.pos.y - 28, '闪电链', CLASS_COLOR.assassin);
      triggerShake(2.5, 0.12);
    }
  } else if(h.cls === 'mage'){
    // 周瑜/郭嘉走自己的弹道
    const hid = h.heroId || 'zhangjiao';
    if(hid === 'zhouyu') return performZhouyuAttack(h, targets, isTrue);
    if(hid === 'guojia') return performGuojiaAttack(h, targets, isTrue);
    // 默认：张角
    // 法师：发射雷球弹道，命中后AOE
    const t = targets[0];
    if(!t) return;
    let dmg = computeDamage(h, t) * 0.7;  // 普攻下调30%
    const aoeR = 25 * (1 + (G.buffs.mageRange || 0)) * (isTrue ? 1.5 : 1);
    // 真·张角「苍天逝矣」：3连雷球
    const shots = isTrue ? 3 : 1;
    for(let s = 0; s < shots; s++){
      const off = (s - (shots-1)/2) * 0.18;
      const ang = Math.atan2(t.pos.y - h.worldY, t.pos.x - h.worldX) + off;
      const spd = 220;
      G.projectiles.push({
        x: h.worldX, y: h.worldY,
        vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        targetId: t.id,
        dmg: dmg / (isTrue ? 1.6 : 1), // 3连每发降至62% → 总伤约1.87×
        owner: 'mage',
        aoeRadius: aoeR,
        slow: Math.min(0.8, G.buffs.mageSlow || 0),
        lifetime: 2.5
      });
    }
  } else if(h.cls === 'support'){
    // 辅助：粉色音波弹道，单体伤害
    const t = targets[0];
    if(!t) return;
    let dmg = computeDamage(h, t);
    const dx = t.pos.x - h.worldX, dy = t.pos.y - h.worldY;
    const len = Math.hypot(dx, dy) || 1;
    const spd = 240;
    G.projectiles.push({
      x: h.worldX, y: h.worldY,
      vx: dx / len * spd, vy: dy / len * spd,
      targetId: t.id,
      dmg,
      owner: 'support',
      lifetime: 2.5
    });
  }
}

function drawHero(ctx, h){
  const color = CLASS_COLOR[h.cls] || '#aaa';
  const isTrue = h.lv >= 5;
  const isMax = h.lv === 4;
  const hs    = isTrue ? 18 : (isMax ? 14 : 11);

  // === 状态光环：鲁肃军粮（绿）、荀彧加冕（金）、张辽威名（蓝）、吕布吕奉先（红）===
  const t = G.time;
  if(h.lusuRationUntil && h.lusuRationUntil > t){
    const pulse = 0.6 + 0.4 * Math.sin(t * 4);
    ctx.strokeStyle = `rgba(120,255,180,${0.4 + pulse * 0.3})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = '#80ffaa'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // 偶发上飘绿粒子
    if(Math.random() < 0.15){
      G.particles.push({
        x: h.worldX + (Math.random()-0.5)*hs,
        y: h.worldY + hs,
        vx:(Math.random()-0.5)*8, vy:-30 - Math.random()*15,
        life:0.5, maxLife:0.5, color:'#80ffaa', size:2
      });
    }
  }
  if(h.xunyuCrownUntil && h.xunyuCrownUntil > t){
    const pulse = 0.6 + 0.4 * Math.sin(t * 3);
    ctx.strokeStyle = `rgba(255,215,0,${0.5 + pulse * 0.4})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // "冠"字头上
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('冠', h.worldX, h.worldY - hs - 12);
  }
  if(h.lvbuFengXianUntil && h.lvbuFengXianUntil > t){
    const pulse = 0.7 + 0.3 * Math.sin(t * 6);
    ctx.strokeStyle = `rgba(255,80,80,${0.5 + pulse * 0.4})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ff5050'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 6, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  if(h.zhangliaoFameUntil && h.zhangliaoFameUntil > t){
    const pulse = 0.6 + 0.4 * Math.sin(t * 5);
    ctx.strokeStyle = `rgba(80,150,255,${0.45 + pulse * 0.35})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = '#5096ff'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  // 吕蒙潜行：自身半透明 + 蓝色淡光
  if(h.heroId === 'lvmeng' && h.lvmengStealth){
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = 'rgba(128,216,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 真·英雄：双层金色光环 + 持续粒子飘散
  if(isTrue){
    const t = G.time;
    const breath = 0.6 + 0.4 * Math.sin(t * 2.4);
    ctx.strokeStyle = `rgba(255, 215, 80, ${0.35 + breath * 0.4})`;
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 14 + breath * 8;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 7 + breath * 3, 0, Math.PI * 2);
    ctx.stroke();
    const ang = t * 1.2;
    ctx.strokeStyle = 'rgba(255, 240, 160, 0.9)';
    ctx.lineWidth = 1.8;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 3, ang, ang + Math.PI * 1.4);
    ctx.stroke();
    ctx.shadowBlur = 0;
    if(Math.random() < 0.15){
      const a2 = Math.random() * Math.PI * 2;
      const r2 = hs + 3 + Math.random() * 5;
      G.particles.push({
        x: h.worldX + Math.cos(a2) * r2,
        y: h.worldY + Math.sin(a2) * r2,
        vx: Math.cos(a2) * 18, vy: Math.sin(a2) * 18 - 14,
        life: 0.6, maxLife: 0.6,
        color: '#ffe680',
        size: 2 + Math.random() * 1.5
      });
    }
  }

  // 张飞堆叠光环
  if(h.cls === 'warrior' && h.rageStack > 0){
    const maxStack = 10 + (G.buffs.warriorRageMax || 0) + (isTrue ? 15 : 0);
    const ratio = Math.min(1, h.rageStack / maxStack);
    const glowR = hs + 4 + ratio * 6;
    ctx.strokeStyle = `rgba(255, ${Math.round(100 - 80 * ratio)}, ${Math.round(80 - 60 * ratio)}, ${0.4 + 0.5 * ratio})`;
    ctx.lineWidth = 2 + ratio * 2;
    ctx.shadowColor = '#ff3030';
    ctx.shadowBlur = 6 + ratio * 8;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, glowR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // === 阴影（与矿工一致）===
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.beginPath();
  ctx.ellipse(h.worldX, h.worldY + hs + 2, hs * 0.95, hs * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const flashing = h.flashUntil && h.flashUntil > G.time;
  // === 主体色块 + 白色描边（矿工质感）===
  ctx.fillStyle = color;
  ctx.fillRect(h.worldX - hs, h.worldY - hs, hs * 2, hs * 2);
  // 默认白色描边（所有英雄都有）
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(h.worldX - hs, h.worldY - hs, hs * 2, hs * 2);

  if(flashing){
    const phase = ((G.time * 6) | 0) % 2;
    if(phase === 0){
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.strokeRect(h.worldX - hs - 3, h.worldY - hs - 3, hs * 2 + 6, hs * 2 + 6);
      ctx.shadowBlur = 0;
    }
  }

  // 真·英雄/L4 外框金色描边（在白色描边外围）
  if(isTrue){
    ctx.strokeStyle = '#fff080';
    ctx.lineWidth   = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur  = 8;
    ctx.strokeRect(h.worldX - hs - 2, h.worldY - hs - 2, hs * 2 + 4, hs * 2 + 4);
    ctx.shadowBlur = 0;
  } else if(isMax){
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth   = 2;
    ctx.strokeRect(h.worldX - hs - 2, h.worldY - hs - 2, hs * 2 + 4, hs * 2 + 4);
  }

  if(h.slotIdx === G.selectedSlot){
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth   = 2;
    ctx.strokeRect(h.worldX - hs, h.worldY - hs, hs * 2, hs * 2);
  }

  // === 中央：单个汉字（角色姓 / 真·xx 显示"真"）===
  ctx.fillStyle    = '#fff';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  const heroName = (HERO_DEFS[h.heroId] && HERO_DEFS[h.heroId].name) || CLASS_NAME_CN[h.cls] || '?';
  // 真英雄也用本名首字（之前固定显示"真"会丢失角色名识别）
  const centerChar = heroName.charAt(0);
  ctx.font = `bold ${Math.round(hs * 1.1)}px Arial`;
  // 文字阴影增加可读性
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 2;
  ctx.fillText(centerChar, h.worldX, h.worldY + 0.5);
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';

  // === 左上角小角标：等级标志位 — L1/L2/L3/L4 / "真"（真武将是等级序列的延续）===
  {
    const badgeR = 6;
    const bx = h.worldX - hs + badgeR - 1;
    const by = h.worldY - hs + badgeR - 1;
    const goldFill = isTrue || isMax;
    ctx.fillStyle = goldFill ? '#ffd700' : 'rgba(0,0,0,0.75)';
    ctx.beginPath();
    ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = isTrue ? '#fff080' : '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = goldFill ? '#3a2a08' : '#ffd700';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(isTrue ? '真' : String(h.lv), bx, by + 0.5);
    ctx.textBaseline = 'alphabetic';
  }

  // 蔡文姬增益指示
  if(h.buffStacks > 0){
    ctx.strokeStyle = '#ff5fa2';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, hs + 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ff5fa2';
    ctx.font = 'bold 8px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(h.buffStacks, h.worldX + hs + 4, h.worldY - hs);
  }

  // 张飞堆叠数字
  if(h.cls === 'warrior' && h.rageStack > 0){
    const maxStack = 10 + (G.buffs.warriorRageMax || 0);
    const ratio = Math.min(1, h.rageStack / maxStack);
    ctx.fillStyle = `rgb(255, ${Math.round(180 - 130 * ratio)}, ${Math.round(120 - 100 * ratio)})`;
    ctx.font = h.rageStack >= maxStack ? 'bold 11px Arial' : 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    const sx = h.worldX, sy = h.worldY - hs - 9;
    ctx.strokeText('×' + h.rageStack, sx, sy);
    ctx.fillText('×' + h.rageStack, sx, sy);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.globalAlpha = 1;
}

function separateHeroes(){
  const heroes   = G.heroes;
  const MIN_DIST = 22;
  for(let i = 0; i < heroes.length; i++){
    if(heroes[i].cls === 'gather') continue;
    for(let j = i + 1; j < heroes.length; j++){
      if(heroes[j].cls === 'gather') continue;
      const a = heroes[i], b = heroes[j];
      // 貂蝉之间不互推：她们围堡按 360°/N 角度自动卡位，互推会与该逻辑互相对抗导致卡死
      if(a.heroId === 'diaochan' && b.heroId === 'diaochan') continue;
      const dx = b.worldX - a.worldX, dy = b.worldY - a.worldY;
      const dist = Math.hypot(dx, dy);
      if(dist < MIN_DIST && dist > 0.001){
        const overlap = (MIN_DIST - dist) / 2;
        const nx = dx / dist, ny = dy / dist;
        a.worldX -= nx * overlap; a.worldY -= ny * overlap;
        b.worldX += nx * overlap; b.worldY += ny * overlap;
      }
    }
  }
}

function separateHeroesFromFortress(){
  if(!G.fortress) return;
  const fx = G.fortress.worldX, fy = G.fortress.worldY;
  const MIN_DIST = 22 + 28;
  for(let i = 0; i < G.heroes.length; i++){
    const h = G.heroes[i];
    if(h.cls === 'gather') continue;
    const dx = h.worldX - fx, dy = h.worldY - fy;
    const dist = Math.hypot(dx, dy);
    if(dist < MIN_DIST && dist > 0.001){
      const overlap = MIN_DIST - dist;
      const nx = dx / dist, ny = dy / dist;
      h.worldX += nx * overlap;
      h.worldY += ny * overlap;
    }
  }
}

function separateMonstersFromFortress(){
  if(!G.fortress) return;
  const fx = G.fortress.worldX, fy = G.fortress.worldY;
  const MIN_DIST = 20 + 28;
  for(let i = 0; i < G.monsters.length; i++){
    const m = G.monsters[i];
    const dx = m.pos.x - fx, dy = m.pos.y - fy;
    const dist = Math.hypot(dx, dy);
    if(dist < MIN_DIST && dist > 0.001){
      const overlap = MIN_DIST - dist;
      const nx = dx / dist, ny = dy / dist;
      m.pos.x += nx * overlap;
      m.pos.y += ny * overlap;
    }
  }
}
