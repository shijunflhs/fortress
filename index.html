function bindLevelGridDrag(grid){
  if(!grid || grid.dataset.dragBound === '1') return;
  grid.dataset.dragBound = '1';

  let pending = false;
  let active = false;
  let pointerId = -1;
  let startX = 0;
  let startY = 0;
  let startScroll = 0;

  const selectFromCell = (cell) => {
    if(!cell || cell.classList.contains('locked')) return false;
    const lv = parseInt(cell.dataset.level, 10);
    if(!lv) return false;
    G.pendingLevel = lv;
    renderLevelGrid();
    return true;
  };

  const cleanup = () => {
    pending = false;
    active = false;
    pointerId = -1;
    grid.classList.remove('dragging');
  };

  grid.addEventListener('pointerdown', (e) => {
    if(e.button != null && e.button !== 0) return;
    pending = true;
    active = false;
    pointerId = e.pointerId;
    startX = e.clientX;
    startY = e.clientY;
    startScroll = grid.scrollTop;
    e.preventDefault();
  });

  window.addEventListener('pointermove', (e) => {
    if(!pending && !active) return;
    if(pointerId !== -1 && e.pointerId !== pointerId) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if(!active){
      if(Math.hypot(dx, dy) < 8) return;
      active = true;
      pending = false;
      grid.classList.add('dragging');
    }
    if(active){
      grid.scrollTop = startScroll - dy;
      e.preventDefault();
    }
  }, { passive:false });

  window.addEventListener('pointerup', (e) => {
    if(!pending && !active) return;
    if(pointerId !== -1 && e.pointerId !== pointerId) return;
    if(active){
      cleanup();
      return;
    }
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const cell = target && target.closest ? target.closest('.level-cell') : null;
    cleanup();
    if(cell && grid.contains(cell)) selectFromCell(cell);
  });

  window.addEventListener('pointercancel', () => {
    if(pending || active) cleanup();
  });
}

function renderLevelGrid(){
  const grid = document.getElementById('level-grid');
  const info = document.getElementById('level-current-info');
  if(!grid) return;
  bindLevelGridDrag(grid);
  grid.innerHTML = '';
  const maxUnlocked = getMaxUnlockedLevel();
  const perfectSet = getPerfectClears();
  // 显示范围：1..maxUnlocked（最多展示maxUnlocked，无下一关锁定预览以节省空间）
  // 但要给玩家展示"还有未解锁"的感觉：多展示1个锁定关卡
  const showCount = Math.min(10, Math.max(5, maxUnlocked + 1));
  for(let lv = 1; lv <= showCount; lv++){
    const cell = document.createElement('div');
    cell.className = 'level-cell';
    cell.dataset.level = String(lv);
    const unlocked = lv <= maxUnlocked;
    const cleared = lv < maxUnlocked;
    const perfect = perfectSet.has(lv);
    if(!unlocked) cell.classList.add('locked');
    if(cleared) cell.classList.add('cleared');
    if(perfect) cell.classList.add('perfect');
    if(unlocked && lv === G.pendingLevel) cell.classList.add('selected');
    const cfg = getLevelConfig(lv);
    const isInfinite = !!cfg.infinite;
    const bestWave = isInfinite ? getInfiniteBestWave() : 0;
    const lockedAffixMini = isInfinite ? '通关 LV9 后解锁无尽战场' : '未解锁';
    const affixMini = unlocked
      ? (isInfinite ? '波次无限，坚守到底' : (cfg.affixName || '无特殊词缀'))
      : lockedAffixMini;
    const meta = !unlocked
      ? '<div class="lv-lock">🔒</div>'
      : (isInfinite
          ? `<div class="lv-meta">无限<br>${bestWave > 0 ? '最高' + bestWave + '波' : '未挑战'}</div>`
          : `<div class="lv-meta">${perfect ? '完美' : (cleared ? '已通关' : '可挑战')}</div>`);
    cell.innerHTML = `
      <div class="lv-num">${isInfinite ? '∞' : lv}</div>
      <div class="lv-main">
        <div class="lv-name">${unlocked ? (cfg.name || '') : (isInfinite ? '无尽战场' : '???')}</div>
        <div class="lv-affix-mini">${affixMini}</div>
      </div>
      ${meta}
    `;
    grid.appendChild(cell);
  }
  // 详情区
  if(info){
    const lv = G.pendingLevel;
    const cfg = getLevelConfig(lv);
    const descHtml = (cfg.affixDesc || '').replace(/\[\[([^\]]+)\]\]/g,
      '<span style="color:#ffd700;font-weight:bold;">$1</span>');
    const isInfinite = !!cfg.infinite;
    const bestWave = isInfinite ? getInfiniteBestWave() : 0;
    const perfectBadge = perfectSet.has(lv)
      ? '<span style="color:#ffd700;font-weight:bold;text-shadow:0 0 6px #ffaa20;margin-left:6px;">★完美</span>'
      : '';
    const infiniteBadge = isInfinite
      ? `<div style="color:#ffd700;font:bold 12px Arial;margin-top:4px;">最高坚守：${bestWave > 0 ? bestWave + ' 波' : '暂无记录'}</div>`
      : '';
    info.style.display = 'block';
    info.innerHTML = `
      <div class="lv-title">${cfg.infinite ? cfg.name : ('LV' + lv + ' · ' + cfg.name)}${perfectBadge}</div>
      <div class="lv-affix">${cfg.affixName ? '【' + cfg.affixName + '】 ' : ''}${descHtml || '无特殊词缀'}</div>
      ${infiniteBadge}
    `;
  }
}

// LV1-5：旧版 6 卡布局（一职业一张默认角色卡，2 列网格）
function renderLegacyHeroCards(grid, cfg){
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = 'repeat(2, 1fr)';
  const unlockedClsSet = new Set(cfg.unlocked || ALL_CLS);
  const recoSet = new Set(cfg.recommended || []);
  syncSelectedClassesFromHeroes();
  for(const cls of ALL_CLS){
    const heroId = DEFAULT_HEROES[cls];
    const def = HERO_DEFS[heroId];
    if(!def) continue;
    const isUnlocked = unlockedClsSet.has(cls);
    const isReco = recoSet.has(cls);
    const isSelected = (G.selectedHeroes || []).includes(heroId);
    const card = document.createElement('div');
    card.className = 'select-card';
    if(!isUnlocked) card.classList.add('disabled');
    if(isSelected) card.classList.add('selected');

// LV6+：扩展英雄分组（3 候选/职业）
function renderExpandedHeroCards(grid, cfg){
  // 关卡推荐：LV6+ 按词缀优势映射到具体英雄；LV1-5 走 cfg.recommended（职业级）
  let recoHeroSet;
  const pendingLv = (G && G.pendingLevel) || 1;
  if(pendingLv >= 6 && pendingLv !== 10){
    recoHeroSet = new Set(getRecommendedHeroIds(cfg));
  } else {
    recoHeroSet = new Set((cfg.recommended || []).map(cls => DEFAULT_HEROES[cls]).filter(Boolean));
  }
  syncSelectedClassesFromHeroes();
  let visibleCount = 0;
  for(const cls of ALL_CLS){
    const heroIds = getHeroIdsByClass(cls);
    const visibleIds = heroIds.filter(id => {
      if(isHeroUnlocked(id)) return true;
      if(id === DEFAULT_HEROES[cls]) return true;
      return false;
    });
    if(visibleIds.length === 0) continue;
    const anyUnlocked = visibleIds.some(id => isHeroUnlocked(id));
    visibleCount += visibleIds.filter(id => isHeroUnlocked(id)).length;
    const group = document.createElement('div');
    group.className = 'cls-group';
    if(!anyUnlocked) group.classList.add('disabled');
    const header = document.createElement('div');
    header.className = 'cls-group-header';
    const headTag = !anyUnlocked
      ? `<span class="cls-lock">${(HERO_UNLOCK[DEFAULT_HEROES[cls]] || {}).hint || '未解锁'}</span>`
      : '';
    header.innerHTML = `<span class="cls-title" style="color:${CLASS_COLOR[cls]}">${CLASS_ROLE_CN[cls] || cls}</span>${headTag}`;
    group.appendChild(header);
    const row = document.createElement('div');
    row.className = 'cls-group-cards';
    for(const id of visibleIds){
      const def = HERO_DEFS[id];
      const heroUnlocked = isHeroUnlocked(id);
      const isReco = heroUnlocked && recoHeroSet.has(id);
      const card = document.createElement('div');
      const isSelected = (G.selectedHeroes || []).includes(id);
      card.className = 'hero-card';
      if(!heroUnlocked) card.classList.add('disabled');
      if(isSelected) card.classList.add('selected');
      if(isReco) card.classList.add('recommended');
      const color = CLASS_COLOR[cls];
      const fac = def.faction || 'qun';
      const facBadge = `<div class="hero-fac" style="background:${FACTION_COLOR[fac]}">${FACTION_NAME[fac]}</div>`;
      const recoBadge = isReco ? `<div class="hero-reco-tip">推荐</div>` : '';
      const lockBadge = heroUnlocked ? '' : `<div class="hero-lock-tip">${(HERO_UNLOCK[id] || {}).hint || '未解锁'}</div>`;
      card.innerHTML = `
        ${facBadge}
        ${recoBadge}
        <div class="hero-avatar" style="background:${color}">${(def.name || '')[0]}</div>
        <div class="hero-name">${def.name}</div>
        <div class="hero-passive">${def.passiveName || ''}</div>
        ${lockBadge}
      `;
      bindHeroSelectCardEvents(card, id, heroUnlocked);
      row.appendChild(card);
    }
    group.appendChild(row);
    grid.appendChild(group);
  }
}

// 选英雄滚动条拖动适配（与卡片点击/长按共存）
function bindHeroSelectGridDrag(grid){
  if(!grid || grid.dataset.dragBound === '1') return;
  grid.dataset.dragBound = '1';

  let pending = false;
  let active = false;
  let pointerId = -1;
  let startY = 0;
  let startScroll = 0;

  const cleanup = () => {
    pending = false;
    active = false;
    pointerId = -1;
    grid.classList.remove('dragging');
  };

  grid.addEventListener('pointerdown', (e) => {
    if(e.button != null && e.button !== 0) return;
    pending = true;
    active = false;
    pointerId = e.pointerId;
    startY = e.clientY;
    startScroll = grid.scrollTop;
  }, { passive: true });

  window.addEventListener('pointermove', (e) => {
    if(!pending && !active) return;
    if(pointerId !== -1 && e.pointerId !== pointerId) return;
    const dy = e.clientY - startY;
    if(!active){
      if(Math.abs(dy) < 8) return;
      active = true;
      pending = false;
      grid.classList.add('dragging');
    }
    if(active){
      grid.scrollTop = startScroll - dy;
    }
  }, { passive: true });

  window.addEventListener('pointerup', (e) => {
    if(!pending && !active) return;
    if(pointerId !== -1 && e.pointerId !== pointerId) return;
    cleanup();
  });

  window.addEventListener('pointercancel', () => {
    if(pending || active) cleanup();
  });
}

// 长按打开详情；短按 toggle 选中
function bindHeroSelectCardEvents(card, heroId, isUnlocked){
  let pressTimer = null, longTriggered = false;
  let startX = 0, startY = 0, moved = false;
  const LONG_MS = 450;
  const onDown = (x, y) => {
    longTriggered = false; moved = false;
    startX = x; startY = y;
    pressTimer = setTimeout(() => {
      longTriggered = true;
      openHeroDetail(heroId);
    }, LONG_MS);
  };
  const onMove = (x, y) => {
    if(Math.hypot(x - startX, y - startY) > 8){
      moved = true;
      if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
    }
  };
  const onUp = () => {
    if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
    // 如果 grid 正在拖动滚动，吞掉这次"点击"
    const grid = document.getElementById('select-grid');
    if(grid && grid.classList.contains('dragging')) return;
    if(!longTriggered && !moved && isUnlocked){
      toggleHeroSelection(heroId);
    }
  };
  card.addEventListener('pointerdown', (e) => { onDown(e.clientX, e.clientY); });
  card.addEventListener('pointermove', (e) => { onMove(e.clientX, e.clientY); });
  card.addEventListener('pointerup', onUp);
  card.addEventListener('pointercancel', () => {
    if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
  });
  card.addEventListener('pointerleave', () => {
    if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
  });
  card.addEventListener('contextmenu', (e) => { e.preventDefault(); openHeroDetail(heroId); });
}

const HERO_UNLOCK_CHEAT_SEQUENCE = [
  ['gather', true],
  ['warrior', true],
  ['support', true],
  ['archer', true],
  ['support', false],
  ['warrior', false],
  ['gather', false],
  ['archer', false]
];

function resetHeroUnlockCheat(){
  if(G) G.heroUnlockCheatStep = 0;
}

function recordHeroUnlockCheat(cls, selected, beforeCount){
  if(!G) return;
  const step = G.heroUnlockCheatStep || 0;
  const expected = HERO_UNLOCK_CHEAT_SEQUENCE[step];
  const isExpected = expected && expected[0] === cls && expected[1] === selected;

  if(step === 0){
    G.heroUnlockCheatStep = (beforeCount === 0 && isExpected) ? 1 : 0;
  } else if(isExpected){
    G.heroUnlockCheatStep = step + 1;
  } else {
    G.heroUnlockCheatStep =
      (beforeCount === 0 && cls === 'gather' && selected) ? 1 : 0;
  }

  if(G.heroUnlockCheatStep >= HERO_UNLOCK_CHEAT_SEQUENCE.length){
    const target = Math.max(getMaxUnlockedLevel(), 10);
    saveMaxUnlockedLevel(target);
    G.heroUnlockCheatStep = 0;
    const backBtn = document.getElementById('back-to-levels-btn');
    if(backBtn) backBtn.style.display = 'inline-block';
    showTrueHeroToast('最高进度已提升至第10关');
  }
}

function toggleHeroSelection(heroId){
  const def = HERO_DEFS[heroId];
  if(!def) return;
  if(!isHeroUnlocked(heroId)) return;
  const cls = def.cls;
  if(!G.selectedHeroes) G.selectedHeroes = [];
  const beforeCount = G.selectedHeroes.length;
  const idx = G.selectedHeroes.indexOf(heroId);
  let selected = false;
  if(idx >= 0){
    // 已选中 → 取消
    G.selectedHeroes.splice(idx, 1);
  } else {
    // 同职业互斥：若已选过同职业的其他角色，先剔除
    for(let i = G.selectedHeroes.length - 1; i >= 0; i--){
      const otherDef = HERO_DEFS[G.selectedHeroes[i]];
      if(otherDef && otherDef.cls === cls){
        G.selectedHeroes.splice(i, 1);
      }
    }
    if(G.selectedHeroes.length >= 4){
      // 容量满，且不是同职业替换 → 拒绝
      syncSelectedClassesFromHeroes();
      renderHeroSelectionCards();
      updateSelectionStatus();
      return;
    }
    G.selectedHeroes.push(heroId);
    selected = true;
  }
  recordHeroUnlockCheat(cls, selected, beforeCount);
  syncSelectedClassesFromHeroes();
  renderHeroSelectionCards();
  updateSelectionStatus();
}

function updateSelectionStatus(){
  syncSelectedClassesFromHeroes();
  const n = (G.selectedHeroes || []).length;
  const pendingLv = (G && G.pendingLevel) || 1;
  const extra = pendingLv >= 6 ? ' <span style="color:#888;font-size:11px;">(每个职业至多上阵1人)</span>' : '';
  document.getElementById('select-status').innerHTML = `已选 ${n}/4${extra}`;
  document.getElementById('confirm-select-btn').disabled = (n !== 4);
  renderFactionAuraStatus();
}

  const levelConfig = getLevelConfig(level);

  G = {

    time: 0, running: true,

    waveIdx: 0,

    factionAtkBonus: level >= 6 ? computeFactionAura(selectedHeroes).bonus : 0,
    buffs: {},
    upgradeRefreshCount: 0,
    lastMajorRoll: 0,
    refreshLeft: 3,
    allinLeft: 1,
    upgradeMode: 'normal',
    lootChests: [],
    bossKillCount: 0,
    mageCloudCD: 15,
    supportCD: 10,
    fortressBonus: 0,
    trueHeroSpawned: false,
    trueHeroCount: 0,
    trueHeroQuota: 1,
    lordSkillCD: 0,
    lordPulses: [],
    minions: [],
    lastMergeOpTime: 0,
    nextMergeHintAt: 5,
    dpsStats: { warrior:0, archer:0, assassin:0, mage:0, support:0, gather:0 },
    dpsStartTime: 0,
    nextInfiniteWaveAt: 12,
    currentWaveScale: 1,
    infiniteResourceSeq: 0,
    waveEntrySeed: Math.floor(Math.random() * 1000000000)
  };

  initTrees();

  const resourceMult = (levelConfig.affix && levelConfig.affix.resourceMult);
  const effMult = (resourceMult == null) ? 1 : resourceMult;
  // 起始一次性散布；矿脉避开主道路（中线±40px），分布在两侧野地（x:50~140 和 x:220~310）
  const waveCount = (G.waves && G.waves.length) || 0;
  const baseResourceCount = waveCount >= 15 ? 65 : (waveCount >= 10 ? 50 : 30);
  const resCount = Math.max(0, Math.round(baseResourceCount * effMult));
  const resourceStartY = FORTRESS_START_Y;
  const resourceEndY = isTieredResourceLevel()
    ? FORTRESS_END_Y - RESOURCE_VISIBLE_LEAD
    : FORTRESS_END_Y;
  if(!isInfiniteRun()){
  for(let i = 0; i < resCount; i++){
    const t = i / Math.max(1, resCount - 1);
    // 左右交替，两侧野地各分一半矿脉
    const side = i % 2 === 0 ? -1 : 1;
    const sideOffset = 60 + Math.random() * 70;  // 60~130px 偏移
    const wx = 180 + side * sideOffset;
    const wy = resourceEndY + t * (resourceStartY - resourceEndY) + (Math.random() * 100 - 50);
    const tierRoll = (i * 0.61803398875) % 1;
    spawnResourceAt(wx, wy, null, tierRoll);
  }
  ensureResourceTierMinimums();
  } else {
    updateInfiniteResources(true);
  }

  G.summonN = 0;

  updateHUD();
  renderHeroGrid();
  lastT  = null;
  paused = false;
  raf    = requestAnimationFrame(gameLoop);
  // 开战仪式 banner
  const cfg = G.levelConfig || {};
  const subtitle = cfg.infinite ? '无尽战场' : (`LV${G.level} · ${cfg.name || ''}`);
  showCeremonyBanner('battle', '战斗开始！', subtitle, 1800);
}

function spawnResource(){
  const wy   = G.fortress.worldY - 300 + Math.random() * 600;
  const wx   = 180 + (Math.random() - 0.5) * 200;
  spawnResourceAt(wx, wy);
}
function spawnResourceAt(wx, wy, tier, tierRoll){
  G.resources.push(makeResource(wx, wy, tier || pickResourceTierByY(wy, tierRoll)));
}

function updateInfiniteResources(initial){
  if(!isInfiniteRun()) return;
  const cameraY = G.fortress.worldY - CH * 0.4;
  const minY = cameraY - 180;
  const maxY = cameraY + CH + 560;
  G.resources = G.resources.filter(r => !r.done && r.pos.y <= cameraY + CH + 220);

  const target = initial ? 34 : 30;
  const probs = getInfiniteResourceTierWeights();
  const desiredHigh = Math.round(target * probs.high);
  const desiredMid = Math.round(target * probs.mid);
  const bandResources = () => G.resources.filter(r => r.pos.y >= minY && r.pos.y <= maxY);
  let inBandResources = bandResources();
  let inBand = inBandResources.length;
  let highCount = inBandResources.filter(r => r.tier === 'high').length;
  let midCount = inBandResources.filter(r => r.tier === 'mid').length;
  while(inBand < target){
    const seq = G.infiniteResourceSeq || 0;
    const side = seq % 2 === 0 ? -1 : 1;
    const sideOffset = 58 + Math.random() * 74;
    const wx = 180 + side * sideOffset;
    const wy = minY + Math.random() * (maxY - minY);
    const tierRoll = ((seq + 1) * 0.61803398875) % 1;
    let tier = null;
    if(highCount < desiredHigh){
      tier = 'high';
    } else if(midCount < desiredMid){
      tier = 'mid';
    }
    if(!tier) tier = pickInfiniteResourceTier(tierRoll);
    spawnResourceAt(wx, wy, tier, tierRoll);
    if(tier === 'high') highCount++;
    else if(tier === 'mid') midCount++;
    G.infiniteResourceSeq = seq + 1;
    inBand++;
  }
}

function spawnHeroToSlot(h){
  let slot = -1;
  for(let i = 0; i < G.unlockedSlots; i++){
    if(!G.heroes.find(x => x.slotIdx === i)){ slot = i; break; }
  }
  if(slot === -1) return false;
  h.slotIdx = slot;
  const ang  = Math.random() * Math.PI * 2;
  const dist = SUMMON_R * (0.4 + Math.random() * 0.6);
  h.worldX   = G.fortress.worldX + Math.cos(ang) * dist;
  h.worldY   = G.fortress.worldY + Math.sin(ang) * dist;
  G.heroes.push(h);
  return true;
}

// ============================================================
//  SUMMON
// ============================================================
function summonPool(){
  // 召唤池保留所有已选职业（含 gather）；第1次出 gather 走特判逻辑
  return G.selectedClasses.slice();
}

function doSummon(){
  if(!G.running || paused) return;
  if(occupiedSlots() >= G.unlockedSlots) return;
  let cost = computeSummonCost(G.summonN);
  if(G.summonDiscount > 0) cost = Math.ceil((cost * 0.8) / 10) * 10;
  if(G.gold < cost) return;
  G.gold -= cost;
  G.summonN++;
  if(G.summonDiscount > 0) G.summonDiscount--;

  // 解锁阶梯：填满初始 6 格之后，每开一个新格的所需召唤数 3/4/4/5/5/6
  // 对应解锁第 7/8/9/10/11/12 格的累计 summonN 阈值：6 / 10 / 14 / 19 / 24 / 30
  if(G.unlockedSlots < 12){
    const idx = G.unlockedSlots - 6;
    let thresh = 3;
    for(let i = 0; i <= idx; i++) thresh += SLOT_UNLOCK_STEPS[i];
    if(G.summonN >= thresh) G.unlockedSlots++;
  }

  const pool = summonPool();
  let cls;
  if(G.summonN === 1){
    // 第1次：选了采集必出采集，否则 pool 随机；记录到 usedClasses 用于后两次去重
    if(G.selectedClasses.includes('gather')){
      cls = 'gather';
    } else {
      cls = pool[Math.floor(Math.random() * pool.length)];
    }
    G.usedClasses = cls ? [cls] : [];
  } else if(G.summonN === 2 || G.summonN === 3){
    // 前3次保证不重复职业
    const available = pool.filter(c => !G.usedClasses.includes(c));
    cls = available.length > 0
      ? available[Math.floor(Math.random() * available.length)]
      : pool[Math.floor(Math.random() * pool.length)];
    G.usedClasses.push(cls);
    if(G.summonN === 3) G.usedClasses = [];
  } else {
    cls = pool[Math.floor(Math.random() * pool.length)];
  }

  if(!cls) cls = pool[0] || 'warrior';

  // 从 selectedHeroes 找出该职业对应的具体角色 id；找不到回退默认
  let heroId = (G.selectedHeroes || []).find(id => HERO_DEFS[id] && HERO_DEFS[id].cls === cls);
  if(!heroId) heroId = DEFAULT_HEROES[cls];
  spawnHeroToSlot(makeHero(1, cls, heroId));
  sfx('summon');
  updateHUD(); renderHeroGrid();
}

function occupiedSlots(){
  return G.heroes.filter(h => h.slotIdx >= 0 && h.slotIdx < G.unlockedSlots).length;
}

// ============================================================
//  UPGRADE (3-card UI with tiers)
// ============================================================
function rollTier(){
  const r = Math.random();
  if(r < 0.6) return 'minor';
  if(r < 0.9) return 'mid';
  return 'major';
}

function getAvailableBuffs(tier){
  const out = [];
  for(const cls of G.selectedClasses){
    const arr = getActiveBuffPoolByCls(cls);
    for(const b of arr){
      if(b.tier !== tier) continue;
      // Exclude already-applied non-stackable buffs
      if(!b.stack && (G.buffs[b.key] || 0) > 0) continue;
      out.push(b);
    }
  }
  return out;
}

function pickBuff(tier){
  let pool = getAvailableBuffs(tier);
  if(pool.length === 0){
    // Fallback to other tiers
    const fallbacks = tier === 'major' ? ['mid', 'minor'] : (tier === 'mid' ? ['minor', 'major'] : ['mid', 'major']);
    for(const t of fallbacks){
      pool = getAvailableBuffs(t);
      if(pool.length > 0) break;
    }
  }
  if(pool.length === 0) return null;
  return pool[Math.floor(Math.random() * pool.length)];
}

function doUpgrade(){
  if(!G.running || paused) return;
  const cost = upgradeCost(G.upgradeN);
  if(G.gold < cost) return;
  G.gold -= cost;
  G.upgradeN++;
  G.upgradeRefreshCount++;
  paused = true;
  G.upgradeMode = 'normal';

  const cards = rollUpgradeCards();
  renderUpgradeCards(cards, false);
  updateHUD();
}

// 抽3张升级卡（含保底逻辑），独立函数便于刷新复用
function rollUpgradeCards(){
  let cards = [];
  let hasMajorRolled = false;
  for(let i = 0; i < 3; i++){
    let tier = rollTier();
    if(tier === 'major' && hasMajorRolled) tier = 'mid';
    if(tier === 'major') hasMajorRolled = true;
    const b = pickBuff(tier);
    if(b) cards.push(b);
  }

  const hasMidOrMajor = cards.some(c => c.tier === 'mid' || c.tier === 'major');
  if(!hasMidOrMajor){
    const replacement = pickBuff('mid') || pickBuff('major');
    if(replacement && cards.length >= 3) cards[2] = replacement;
    else if(replacement) cards.push(replacement);
  }

  const drySpell = G.upgradeRefreshCount - G.lastMajorRoll;
  const hasMajor = cards.some(c => c.tier === 'major');
  if(drySpell >= 4 && !hasMajor){
    const forced = pickBuff('major') || pickBuff('mid');
    if(forced && cards.length >= 3) cards[2] = forced;
    else if(forced) cards.push(forced);
  }

  if(cards.some(c => c && c.tier === 'major')){
    G.lastMajorRoll = G.upgradeRefreshCount;
  }

  const seen = new Set();
  cards = cards.filter(c => {
    if(!c) return false;
    if(seen.has(c.key)) return false;
    seen.add(c.key);
    return true;
  });
  while(cards.length < 3){
    const extra = pickBuff(rollTier());
    if(!extra) break;
    if(seen.has(extra.key)) continue;
    seen.add(extra.key);
    cards.push(extra);
  }
  return cards;
}

// 升级界面：刷新增益（全局3次）
function doRefreshUpgrade(){
  if(G.upgradeMode !== 'normal') return;
  if(G.refreshLeft <= 0) return;
  G.refreshLeft--;
  const cards = rollUpgradeCards();
  renderUpgradeCards(cards, false);
  sfx('upgrade');
}

// 升级界面：我全都要（全局1次，直接应用当前3张）
function doAllInUpgrade(){
  if(G.upgradeMode !== 'normal') return;
  if(G.allinLeft <= 0) return;
  const cardEls = document.querySelectorAll('#upg-cards .upg-card');
  if(!cardEls.length) return;
  // 取当前渲染的cards（存在div._card上）

  cardEls.forEach(el => { if(el._card) cards.push(el._card); });
  if(!cards.length) return;
  G.allinLeft--;
  document.getElementById('upgrade-overlay').style.display = 'none';
  paused = false;
  cards.forEach(c => applyBuffOnly(c));

  triggerScreenFlash(0.3, '255, 220, 80', 0.4);
  updateHUD();
}

// 仅应用增益数值与英雄闪烁（不收起overlay，不切paused）
function applyBuffOnly(card){
  G.buffs[card.key] = (G.buffs[card.key] || 0) + card.val;
  let targetCls = null;
  for(const c of ALL_CLS){
    if(card.key.startsWith(c) || (c === 'support' && card.key.startsWith('sup'))){
      targetCls = c; break;
    }
  }
  if(targetCls){
    G.flashUntil = G.time + 0.5;
    G.flashClass = targetCls;
    for(const h of G.heroes){
      if(h.cls === targetCls) h.flashUntil = G.time + 0.5;
    }
    renderHeroGrid();
    setTimeout(() => renderHeroGrid(), 500);
  }
}

function renderUpgradeCards(cards, isMaxReward){
  const container = document.getElementById('upg-cards');
  container.innerHTML = '';
  cards.forEach(card => {
    // 推导 buff 所属角色/职业：优先从 HERO_BUFFS_EXTRA 反查，找不到再按 key 前缀
    let cls = null, heroId = null;
    for(const hid in HERO_BUFFS_EXTRA){
      if((HERO_BUFFS_EXTRA[hid] || []).some(b => b.key === card.key)){
        heroId = hid;
        cls = HERO_DEFS[hid] && HERO_DEFS[hid].cls;
        break;
      }
    }
    if(!cls){
      for(const c of ALL_CLS){
        if(card.key.startsWith(c) || (c === 'support' && card.key.startsWith('sup'))){
          cls = c;
          break;
        }
      }
    }
    // 显示名：若是某专属，用对应 heroId 的角色名；否则用上阵角色名
    const displayName = heroId ? (HERO_DEFS[heroId].name) : heroNameForCls(cls);
    const targetLabel = cls
      ? `<div class="ctarget" style="color:${CLASS_COLOR[cls]}">${displayName} · ${CLASS_ROLE_CN[cls]}</div>`
      : '';
    const div = document.createElement('div');
    div.className = 'upg-card tier-' + card.tier;
    div._card = card;
    div.innerHTML = `
      <div class="ctier ${card.tier}">${TIER_NAME_CN[card.tier]}</div>
      ${targetLabel}
      <div class="cname">${card.name}</div>
      <div class="cdesc">${card.desc}</div>
    `;
    div.onclick = () => applyUpgrade(card);
    container.appendChild(div);
  });
  // 控制庆祝横幅
  document.getElementById('upgrade-banner').style.display = isMaxReward ? 'block' : 'none';
  document.getElementById('chest-banner').style.display = 'none';
  document.getElementById('chest-close').style.display = 'none';
  // 控制刷新/我全都要按钮：仅在 normal 模式显示
  const actions = document.getElementById('upg-actions');
  if(actions){
    if(G.upgradeMode === 'normal'){
      actions.style.display = 'flex';
      const rb = document.getElementById('upg-refresh-btn');
      const ab = document.getElementById('upg-allin-btn');
      const rc = document.getElementById('upg-refresh-count');
      const ac = document.getElementById('upg-allin-count');
      if(rc) rc.textContent = `剩余 ${G.refreshLeft}`;
      if(ac) ac.textContent = `剩余 ${G.allinLeft}`;
      if(rb) rb.classList.toggle('disabled', G.refreshLeft <= 0);
      if(ab) ab.classList.toggle('disabled', G.allinLeft <= 0);
    } else {
      actions.style.display = 'none';
    }
  }
  document.getElementById('upgrade-overlay').style.display = 'flex';
}

// 满级英雄奖励：固定1高级+2中级，从该职业池中抽取
function doMaxLevelReward(cls){
  paused = true;
  G.upgradeMode = 'maxLevel';
  const classBuffs = getActiveBuffPoolByCls(cls);
  const usedKeys = new Set();
  const cards = [];

  // 动态更新顶部横幅文案：显示具体哪个角色 L4
  const bn = document.getElementById('upgrade-banner');
  if(bn){
    bn.innerHTML = `★ ${heroNameForCls(cls)} 进阶 L4！选择强化方向 ★`;
  }

  // 1张高级
  const majors = classBuffs.filter(b => b.tier === 'major' && (b.stack || !G.buffs[b.key]));
  if(majors.length > 0){
    const m = majors[Math.floor(Math.random() * majors.length)];
    cards.push(m);
    usedKeys.add(m.key);
  }

  // 2张中级
  const mids = classBuffs.filter(b => b.tier === 'mid' && !usedKeys.has(b.key) && (b.stack || !G.buffs[b.key]));
  // 随机抽2张
  for(let i = 0; i < 2 && mids.length > 0; i++){
    const idx = Math.floor(Math.random() * mids.length);
    const m = mids[idx];
    cards.push(m);
    usedKeys.add(m.key);
    mids.splice(idx, 1);
  }

  // 不足3张则补充（fallback到任意未用的）
  while(cards.length < 3){
    const remaining = classBuffs.filter(b => !usedKeys.has(b.key) && (b.stack || !G.buffs[b.key]));
    if(remaining.length === 0) break;
    const r = remaining[Math.floor(Math.random() * remaining.length)];
    cards.push(r);
    usedKeys.add(r.key);
  }

  if(cards.length > 0){
    renderUpgradeCards(cards, true);
  } else {
    paused = false;
  }
}

// 真·英雄奖励：3选2（1高级+2中级），玩家任选2张应用
function doTrueHeroReward(cls){
  paused = true;
  G.upgradeMode = 'trueHero';
  G.trueHeroPickCount = 0;
  G.trueHeroPickMax   = 2;
  const classBuffs = getActiveBuffPoolByCls(cls);
  const usedKeys = new Set();
  const cards = [];

  const majors = classBuffs.filter(b => b.tier === 'major' && (b.stack || !G.buffs[b.key]));
  if(majors.length > 0){
    const m = majors[Math.floor(Math.random() * majors.length)];
    cards.push(m); usedKeys.add(m.key);
  }
  const mids = classBuffs.filter(b => b.tier === 'mid' && !usedKeys.has(b.key) && (b.stack || !G.buffs[b.key]));
  for(let i = 0; i < 2 && mids.length > 0; i++){
    const idx = Math.floor(Math.random() * mids.length);
    const m = mids[idx];
    cards.push(m); usedKeys.add(m.key);
    mids.splice(idx, 1);
  }
  while(cards.length < 3){
    const remaining = classBuffs.filter(b => !usedKeys.has(b.key) && (b.stack || !G.buffs[b.key]));
    if(remaining.length === 0) break;
    const r = remaining[Math.floor(Math.random() * remaining.length)];
    cards.push(r); usedKeys.add(r.key);

      bn.innerHTML = `★ 真·${heroNameForCls(cls)}「${(HERO_DEFS[(G.selectedHeroes||[]).find(id => HERO_DEFS[id] && HERO_DEFS[id].cls === cls)] || {}).title || TRUE_HERO_TITLE[cls] || ''}」觉醒 ★ <span style="color:#fff;font-size:13px">3选2</span>`;
      bn.style.display = 'block';
    }
  } else {
    G.upgradeMode = 'normal';
    paused = false;
  }
}

function applyUpgrade(card){
  // 真·英雄 3选2：不立即关闭，挑2张
  const isTrueHero = G.upgradeMode === 'trueHero';
  if(!isTrueHero){
    document.getElementById('upgrade-overlay').style.display = 'none';
    paused = false;
  }
  G.buffs[card.key] = (G.buffs[card.key] || 0) + card.val;
  sfx('upgrade');

  // 推导出该增益生效的职业
  let targetCls = null;
  for(const hid in HERO_BUFFS_EXTRA){
    if((HERO_BUFFS_EXTRA[hid] || []).some(b => b.key === card.key)){
      targetCls = HERO_DEFS[hid] && HERO_DEFS[hid].cls;
      break;
    }
  }
  if(!targetCls){
    for(const c of ALL_CLS){
      if(card.key.startsWith(c) || (c === 'support' && card.key.startsWith('sup'))){
        targetCls = c;
        break;
      }
    }
  }
  // 让所有该职业的英雄闪烁
  if(targetCls){
    G.flashUntil = G.time + 0.5;
    G.flashClass = targetCls;
    for(const h of G.heroes){
      if(h.cls === targetCls){
        h.flashUntil = G.time + 0.5;
      }
    }
    renderHeroGrid();
    setTimeout(() => renderHeroGrid(), 500);
  }
  updateHUD();

  if(isTrueHero){
    // 标记当前卡为已选，灰显并禁用
    const container = document.getElementById('upg-cards');
    if(container){
      const cards = container.querySelectorAll('.upg-card');
      for(const el of cards){
        if(el._card === card){
          el.classList.add('picked');
          el.onclick = null;
        }
      }
    }
    G.trueHeroPickCount = (G.trueHeroPickCount || 0) + 1;
    if(G.trueHeroPickCount >= (G.trueHeroPickMax || 2)){
      // 关闭
      document.getElementById('upgrade-overlay').style.display = 'none';
      G.upgradeMode = 'normal';
      paused = false;
    } else {
      // 更新横幅提示
      const bn = document.getElementById('upgrade-banner');
      if(bn){
        const left = (G.trueHeroPickMax || 2) - G.trueHeroPickCount;
        bn.innerHTML = bn.innerHTML.replace(/3选2|还可选\d+张/, `还可选${left}张`);
      }
    }
  }
}

// 找出所有含首领(lv=4)的波次index数组
function getBossWaveIndices(){
  const waves = G.waves || [];
  const out = [];
  for(let i = 0; i < waves.length; i++){
    const w = waves[i];
    if(w && w.m && w.m.some(c => c.lv === 4)) out.push(i);
  }
  return out;
}

// 处理首领/精英奖励怪死亡，决定是否掉宝箱
function handleMajorRewardKill(m){
  const myWave = m.waveIdx;
  if(myWave === undefined) return;
  const waveNo = myWave + 1;
  // 无尽：10x 波掉宝；普通关用 isEliteRewardWave 判定
  let shouldDrop;
  if(isInfiniteRun()){
    shouldDrop = (waveNo % 10 === 0);
  } else {
    const wave = (G.waves || [])[myWave];
    shouldDrop = isEliteRewardWave(wave, waveNo);
  }
  if(!shouldDrop) return;
  // 等本波所有精英/BOSS 都死光
  const stillAlive = G.monsters.some(mon => (mon.eliteRole || mon.bossRole) && mon.waveIdx === myWave && mon.hp > 0);
  if(stillAlive) return;
  if(!G.chestDroppedWaves) G.chestDroppedWaves = {};
  if(G.chestDroppedWaves[myWave]) return;
  G.chestDroppedWaves[myWave] = true;
  spawnLootChest(m.pos.x, m.pos.y, waveNo);
}

function spawnLootChest(wx, wy, waveNo){
  G.lootChests.push({
    id: Math.random(),
    pos: v2(wx, wy),
    spawnTime: G.time,
    timeoutAt: G.time + 10,
    pickedUp: false,
    waveNo: waveNo || 0
  });
  sfx('upgrade');
  triggerScreenFlash(0.3, '255, 200, 80', 0.35);
  spawnParticleBurst(wx, wy, '#ffd700', 16);
}

// 渲染宝箱
function drawLootChests(ctx){
  if(!G.lootChests || G.lootChests.length === 0) return;
  for(const ch of G.lootChests){
    const pulse = 0.7 + 0.3 * Math.sin(G.time * 6);
    const bob = Math.sin(G.time * 3.5) * 2;  // 上下浮动
    const r = 18;
    ctx.save();
    // 地面阴影
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.beginPath();
    ctx.ellipse(ch.pos.x, ch.pos.y + 13, 22, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // 强金光外圈（呼吸）
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 22 + pulse * 10;
    drawRoundRect(ctx, ch.pos.x - r, ch.pos.y - r * 0.55 + bob, r * 2, r * 1.35, 5, '#8a4f20', '#ffd700', 2);
    ctx.shadowBlur = 0;
    // 盖子
    const lidGrad = ctx.createLinearGradient(ch.pos.x, ch.pos.y - r * 1.05 + bob, ch.pos.x, ch.pos.y + bob);
    lidGrad.addColorStop(0, '#ffe080');
    lidGrad.addColorStop(1, '#ad6728');
    drawRoundRect(ctx, ch.pos.x - r - 1, ch.pos.y - r * 1.0 + bob, r * 2 + 2, r * 0.72, 6, lidGrad, '#fff080', 1.5);
    // 锁扣
    ctx.fillStyle = '#5a2f18';
    ctx.fillRect(ch.pos.x - r + 4, ch.pos.y - 3 + bob, r * 2 - 8, 5);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(ch.pos.x - 4, ch.pos.y - 7 + bob, 8, 12);
    ctx.strokeStyle = '#5c2a1a';
    ctx.strokeRect(ch.pos.x - 4, ch.pos.y - 7 + bob, 8, 12);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(ch.pos.x, ch.pos.y - 1 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    // 强呼吸光环（吸引点击）
    ctx.strokeStyle = `rgba(255,255,200,${0.55 + pulse * 0.4})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(ch.pos.x, ch.pos.y + bob, r + 10 + pulse * 5, 0, Math.PI * 2);
    ctx.stroke();
    // 第二层光环
    ctx.strokeStyle = `rgba(255,215,80,${0.3 + pulse * 0.2})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ch.pos.x, ch.pos.y + bob, r + 18 + pulse * 6, 0, Math.PI * 2);
    ctx.stroke();
    // "点击拾取" 提示文字（在宝箱上方）
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${11 + pulse * 1.5}px Arial`;
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.lineWidth = 3;
    const tipY = ch.pos.y - r - 12 + bob;
    ctx.strokeText('点击拾取', ch.pos.x, tipY);
    ctx.fillStyle = `rgba(255, 240, ${Math.round(100 + pulse * 100)}, 1)`;
    ctx.fillText('点击拾取', ch.pos.x, tipY);
    ctx.restore();
  }
}

// 更新宝箱：超时自动拾取
function updateLootChests(){
  if(!G.lootChests || G.lootChests.length === 0) return;
  for(let i = G.lootChests.length - 1; i >= 0; i--){
    const ch = G.lootChests[i];
    if(ch.pickedUp){
      G.lootChests.splice(i, 1);
      continue;
    }
    if(G.time >= ch.timeoutAt){
      pickupLootChest(ch);
      G.lootChests.splice(i, 1);
    }
  }
}

// 拾取宝箱：触发宝箱奖励UI
function pickupLootChest(ch){
  ch.pickedUp = true;
  // 1-3张概率：30/60/10
  const r = Math.random();
  const nCards = r < 0.3 ? 1 : (r < 0.9 ? 2 : 3);
  const cards = [];
  const seen = new Set();
  let attempts = 0;
  while(cards.length < nCards && attempts < 30){
    attempts++;
    const tier = Math.random() < 0.7 ? 'mid' : 'major';
    const b = pickBuff(tier);
    if(!b) continue;
    if(seen.has(b.key)) continue;
    seen.add(b.key);
    cards.push(b);
  }
  // 固定 3 槽：剩余位置补 null（空槽）
  while(cards.length < 3) cards.push(null);
  // 无尽关每 20 波宝箱：强制塞入 1 张"金色品质·真武将+1"奖励，位置随机
  const chestWaveNo = ch.waveNo || G.waveIdx || 0;
  const isQuotaWave = isInfiniteRun() && chestWaveNo > 0 && (chestWaveNo % 20 === 0);
  if(isQuotaWave){
    const slot = Math.floor(Math.random() * 3);
    cards[slot] = { __trueHeroQuota: true, tier: 'legend', name: '虎符传檄', desc: '本局可拥有的真·武将上限 +1', key: '__trueHeroQuotaPlus' };
  }
  paused = true;
  G.upgradeMode = 'chest';
  renderChestReward(cards);
}

// 宝箱奖励UI（不可选，直接全部应用）
function renderChestReward(cards){
  // 复用 upgrade overlay 渲染
  const container = document.getElementById('upg-cards');
  container.innerHTML = '';
  // 拼装最终目标 HTML（用于揭晓）
  const finalHTMLs = cards.map(card => {
    if(!card){
      // 空槽 → 100 金币（包装为初级"鏖战犒赏"，与正常增益结构对齐：等级/目标/名/描述）
      return {
        tier: 'minor',
        html: `
          <div class="ctier minor">${TIER_NAME_CN.minor}</div>
          <div class="ctarget" style="color:#bbb">通用</div>
          <div class="cname">鏖战犒赏</div>
          <div class="cdesc">征伐辛劳，主公犒赏100金币</div>
        `
      };
    }
    if(card.__trueHeroQuota){
      return {
        tier: 'legend',
        html: `
          <div class="ctier legend">★ 传世 ★</div>
          <div class="cname" style="color:#fff080">${card.name}</div>
          <div class="cdesc">${card.desc}</div>
        `
      };
    }
    let cls = null, heroId = null;
    for(const hid in HERO_BUFFS_EXTRA){
      if((HERO_BUFFS_EXTRA[hid] || []).some(b => b.key === card.key)){
        heroId = hid;
        cls = HERO_DEFS[hid] && HERO_DEFS[hid].cls;
        break;
      }
    }
    if(!cls){
      for(const c of ALL_CLS){
        if(card.key.startsWith(c) || (c === 'support' && card.key.startsWith('sup'))){
          cls = c; break;
        }
      }
    }
    const displayName = heroId ? (HERO_DEFS[heroId].name) : heroNameForCls(cls);
    const targetLabel = cls
      ? `<div class="ctarget" style="color:${CLASS_COLOR[cls]}">${displayName} · ${CLASS_ROLE_CN[cls]}</div>`
      : '';
    return {
      tier: card.tier,
      html: `
        <div class="ctier ${card.tier}">${TIER_NAME_CN[card.tier]}</div>
        ${targetLabel}
        <div class="cname">${card.name}</div>
        <div class="cdesc">${card.desc}</div>
      `
    };
  });
  // 先创建占位卡（固定 3 槽，统一中性灰底，避免提前透露 tier）
  cards.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'upg-card slot-rolling';
    div._card = card;
    div.style.cursor = 'default';
    div.dataset.slotIdx = idx;
    div.innerHTML = `<div class="slot-reel">？</div>`;
    container.appendChild(div);
  });
  // 切换UI元素
  document.getElementById('upgrade-banner').style.display = 'none';
  document.getElementById('chest-banner').textContent = '战利品宝箱 · 抽取中…';
  document.getElementById('chest-banner').style.display = 'block';
  document.getElementById('chest-close').style.display = 'none';
  document.getElementById('upg-actions').style.display = 'none';
  document.getElementById('upgrade-overlay').style.display = 'flex';

  // 老虎机滚动
  const allBuffs = [];
  for(const cls of (G.selectedClasses || [])){
    allBuffs.push(...getActiveBuffPoolByCls(cls));
  }
  const slotEls = container.querySelectorAll('.upg-card');
  slotEls.forEach((el, idx) => {
    const baseDur = 800 + idx * 350;
    let elapsed = 0;
    const tickFn = () => {
      elapsed += 60;
      const pct = elapsed / baseDur;
      const interval = 50 + pct * 200;
      const reel = el.querySelector('.slot-reel');
      if(reel){
        if(allBuffs.length > 0){
          const b = allBuffs[Math.floor(Math.random() * allBuffs.length)];
          reel.innerHTML = `
            <div class="ctier ${b.tier}" style="font-size:9px">${TIER_NAME_CN[b.tier]}</div>
            <div style="font:bold 12px Arial; color:#aaa">${b.name}</div>
          `;
        } else {
          reel.textContent = '？';
        }
        sfx && sfx('hit');
      }
      if(elapsed >= baseDur){
        el.classList.remove('slot-rolling');
        el.classList.add('slot-revealed');
        const card = cards[idx];
        // 揭晓时再赋真实 tier 底色
        const tierClass = card ? (card.__trueHeroQuota ? 'tier-legend' : ('tier-' + card.tier)) : 'tier-minor';
        el.classList.add(tierClass);
        el.innerHTML = finalHTMLs[idx].html;
        spawnSlotRevealEffect(el);
        sfx && sfx(card ? (card.tier === 'major' ? 'maxlv' : 'upgrade') : 'hit');
        const remaining = container.querySelectorAll('.slot-rolling').length;
        if(remaining === 0){
          // 应用：buff 走 applyBuffOnly；空槽给 +100 金币；传世 → 真·武将配额 +1
          cards.forEach(c => {
            if(!c){ G.gold += 100; return; }
            if(c.__trueHeroQuota){
              G.trueHeroQuota = (G.trueHeroQuota || 1) + 1;
              return;
            }
            applyBuffOnly(c);
          });
          const realCount = cards.filter(c => c).length;
          const consolationCount = cards.length - realCount;
          let txt = '战利品宝箱 · ';
          if(realCount > 0 && consolationCount > 0) txt += `获得 ${realCount} 个增益 · 犒赏 ${consolationCount * 100} 金币`;
          else if(realCount > 0) txt += `获得 ${realCount} 个增益`;
          else txt += `犒赏 ${consolationCount * 100} 金币`;
          document.getElementById('chest-banner').textContent = txt;
          document.getElementById('chest-close').style.display = 'block';
          G._pendingChestCards = cards;
        }
        return;
      }
      setTimeout(tickFn, interval);
    };
    setTimeout(tickFn, 60 + idx * 80); // 错峰启动
  });
}

function spawnSlotRevealEffect(el){
  // 简单视觉：给 el 加上闪烁类，几百毫秒后移除
  el.classList.add('slot-flash');

}

  document.getElementById('chest-banner').style.display = 'none';

// 玩家点击地图宝箱
function tryPickupChestAt(canvasX, canvasY){
  if(!G.lootChests || G.lootChests.length === 0) return false;
  // 转换为世界坐标
  const cameraY = G.fortress.worldY - CH * 0.4;
  const worldX = canvasX;
  const worldY = canvasY + cameraY;
  for(let i = G.lootChests.length - 1; i >= 0; i--){
    const ch = G.lootChests[i];
    if(ch.pickedUp) continue;
    const dx = ch.pos.x - worldX;
    const dy = ch.pos.y - worldY;
    if(Math.hypot(dx, dy) <= 32){
      pickupLootChest(ch);
      G.lootChests.splice(i, 1);
      return true;
    }
  }
  return false;
}

function showTrueHeroToast(msg){
  const el = document.getElementById('true-hero-toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.remove('show');
  void el.offsetWidth; // restart anim
  el.classList.add('show');
  clearTimeout(el._ttHideT);
  el._ttHideT = setTimeout(() => el.classList.remove('show'), 1700);
}

// 仪式 BANNER：mode='battle'|'victory'|'defeat'，duration ms 后自动隐藏；返回 Promise 在隐藏时 resolve
function showCeremonyBanner(mode, title, sub, duration){
  return new Promise(resolve => {
    const el = document.getElementById('ceremony-banner');
    if(!el){ resolve(); return; }
    document.getElementById('cb-title').textContent = title || '';
    document.getElementById('cb-sub').textContent = sub || '';
    el.className = '';
    void el.offsetWidth;
    el.classList.add('show', mode);
    if(mode === 'battle') triggerScreenFlash(0.3, '255, 215, 128', 0.4);
    else if(mode === 'victory') triggerScreenFlash(0.4, '120, 255, 200', 0.5);
    else if(mode === 'defeat') triggerScreenFlash(0.5, '180, 40, 40', 0.6);
    // boss 模式：屏闪由调用方触发，这里不重复
    clearTimeout(el._cbHideT);
    el._cbHideT = setTimeout(() => {
      el.classList.remove('show');
      resolve();
    }, duration || 1800);
  });
}
window.showCeremonyBanner = showCeremonyBanner;

// 胜利结算流程：banner → 1.6s 后 endGame
function triggerVictorySequence(){
  const cfg = G.levelConfig || {};
  const subtitle = cfg.infinite ? '无尽战场' : (`LV${G.level} · ${cfg.name || ''}`);

// 失败结算流程：堡垒爆炸 1.5s → banner → endGame
function triggerDefeatSequence(){
  const f = G.fortress;
  // 主堡爆炸：连发多波粒子 + 屏闪 + 多次震屏
  if(f){
    const fx = f.worldX, fy = f.worldY;
    G.fortressExploding = true;
    G.fortressExplodeUntil = (G.time || 0) + 1.5;
    // 第一波
    spawnParticleBurst(fx, fy, '#ff4030', 32);
    spawnParticleBurst(fx, fy, '#ffaa30', 24);
    triggerScreenFlash(0.5, '255, 80, 60', 0.7);
    triggerShake(10, 0.5);
    // 持续 1.5s 内多波连爆
    let burstCount = 0;
    const burstTimer = setInterval(() => {
      burstCount++;
      if(burstCount > 6 || !G.fortressExploding){ clearInterval(burstTimer); return; }
      const ox = (Math.random() - 0.5) * 40;
      const oy = (Math.random() - 0.5) * 30;
      spawnParticleBurst(fx + ox, fy + oy, '#ff5040', 20);
      spawnParticleBurst(fx + ox, fy + oy, '#ffaa30', 12);
      triggerShake(6, 0.2);
      G.explosionEffects = G.explosionEffects || [];
      G.explosionEffects.push({ x: fx + ox, y: fy + oy, radius: 25 + Math.random() * 30, until: (G.time || 0) + 0.3, color: '#ff5040' });
    }, 200);
  }
  // 1.5s 后展示 banner
  setTimeout(() => {
    G.fortressExploding = false;
    showCeremonyBanner('defeat', '撤离失败！', '', 1700).then(() => {
      endGame();
    });
  }, 1500);
}
window.triggerVictorySequence = triggerVictorySequence;
window.triggerDefeatSequence = triggerDefeatSequence;

function handleSlotClick(idx){
  if(!G.running || paused) return;
  if(idx >= G.unlockedSlots) return;

  const sel = G.selectedSlot;
  const h   = getHeroAtSlot(idx);

  if(sel === -1){
    if(h) G.selectedSlot = idx;
    renderHeroGrid();
    return;
  }

  if(sel === idx){
    G.selectedSlot = -1;
    renderHeroGrid();
    return;
  }

  const heroA = getHeroAtSlot(sel);
  const heroB = getHeroAtSlot(idx);

  if(heroA && heroB && heroA.cls === heroB.cls && heroA.lv === heroB.lv && heroA.lv < 5){
    // L4→L5：单局仅允许1次
    if(heroA.lv === 4){
      if(isTrueHeroFull()){
        const q = G.trueHeroQuota || 1;
        showTrueHeroToast(`单局至多合成${q}个真·英雄`);
        G.selectedSlot = -1;
        renderHeroGrid();
        return;
      }
    }
    const newLv      = heroA.lv + 1;
    const freeSlot   = idx;

    // New class from selectedClasses only；L5 强制保留同名（觉醒）
    // 黄月英保底：若合成会导致场上 gather 数 ≤ 1，强制本次产出 gather（前提：玩家选了 gather）
    let newCls;
    const consumesGather = (heroA.cls === 'gather' ? 1 : 0) + (heroB.cls === 'gather' ? 1 : 0);
    const gatherAfterConsume = G.heroes.filter(x => x.cls === 'gather').length - consumesGather;
    const needGatherFallback = consumesGather > 0
      && gatherAfterConsume <= 1
      && G.selectedClasses.includes('gather');
    // 输出职业保底：若本次合成消耗的是 L2+ 输出职业，且消耗后场上无任何 L2+ 输出英雄，
    // 则随机产出仅在玩家选择的输出职业中随机（避免全场只剩 L1 输出 + 采集/辅助）
    const DPS_CLS = ['warrior','archer','assassin','mage'];
    const consumedDpsCount = (DPS_CLS.includes(heroA.cls) ? 1 : 0) + (DPS_CLS.includes(heroB.cls) ? 1 : 0);
    const lv2PlusDpsAfter = G.heroes.filter(x =>
      DPS_CLS.includes(x.cls) && x.lv >= 2 && x !== heroA && x !== heroB
    ).length;
    // 合成产物若 newLv >= 2 且类别为 dps，则它本身可补位；
    // 触发条件：消耗了 dps 且消耗后无任何 lv>=2 的 dps（产物若是非 dps 就会断档）
    const selectedDps = G.selectedClasses.filter(c => DPS_CLS.includes(c));
    const needDpsFallback = consumedDpsCount > 0 && lv2PlusDpsAfter === 0 && selectedDps.length > 0;
    if(newLv === 5){
      newCls = heroA.cls;
    } else if(needGatherFallback){
      newCls = 'gather';
    } else if(needDpsFallback){
      // 仅在玩家选择的输出职业中随机（含 heroA.cls 本身）
      newCls = selectedDps[Math.floor(Math.random() * selectedDps.length)];
    } else if(Math.random() < 0.6){
      newCls = heroA.cls;
    } else {
      const others = G.selectedClasses.filter(c => c !== heroA.cls);
      newCls = others.length > 0
        ? others[Math.floor(Math.random() * others.length)]
        : heroA.cls;
    }

    G.heroes = G.heroes.filter(x => x !== heroA && x !== heroB);

    // 找该职业对应的角色 id：优先继承 heroA/heroB 同 cls 的 heroId（合并后的角色身份延续）
    let mergedHeroId = (heroA.cls === newCls && heroA.heroId) ? heroA.heroId
                     : (heroB.cls === newCls && heroB.heroId) ? heroB.heroId
                     : (G.selectedHeroes || []).find(id => HERO_DEFS[id] && HERO_DEFS[id].cls === newCls)
                     || DEFAULT_HEROES[newCls];
    const merged   = makeHero(newLv, newCls, mergedHeroId);
    merged.slotIdx = freeSlot;
    // 继承 heroB（被合成目标）的当前位置（不重置回出生点）
    merged.worldX  = heroB.worldX;
    merged.worldY  = heroB.worldY;
    // 继承当前 buff / 状态字段（CD 类字段重置）
    merged.buffStacks       = heroB.buffStacks       || 0;
    merged.buffAtkBonus     = heroB.buffAtkBonus     || 0;
    merged.xunyuCrownUntil  = heroB.xunyuCrownUntil  || 0;
    merged.xunyuCrownTrue   = heroB.xunyuCrownTrue   || false;
    merged.xunyuCrownLv     = heroB.xunyuCrownLv     || 0;
    merged.lusuRationUntil  = heroB.lusuRationUntil  || 0;
    merged.lusuRationPct    = heroB.lusuRationPct    || 0;
    merged.lusuHaoLingUntil = heroB.lusuHaoLingUntil || 0;
    merged.zhangliaoFameUntil = heroB.zhangliaoFameUntil || 0;
    merged.lvbuFengXianUntil  = heroB.lvbuFengXianUntil  || 0;
    merged.flashUntil       = heroB.flashUntil       || 0;
    merged.mergeHintUntil   = heroB.mergeHintUntil   || 0;
    // 张飞越战越勇堆叠：保留两人中较高的层数和最近攻击时间（升级不浪费 rageStack）
    const rageA = heroA.cls === newCls ? (heroA.rageStack || 0) : 0;
    const rageB = heroB.cls === newCls ? (heroB.rageStack || 0) : 0;
    merged.rageStack       = Math.max(rageA, rageB);
    merged.lastAttackTime  = Math.max(heroA.lastAttackTime || 0, heroB.lastAttackTime || 0);
    // 角色专属状态（保留最近一次记录）
    merged.zhangliaoHits   = Math.max(heroA.zhangliaoHits || 0, heroB.zhangliaoHits || 0);
    merged.lvbuLastWuShuang = Math.max(heroA.lvbuLastWuShuang || 0, heroB.lvbuLastWuShuang || 0);
    merged.xuchuLastCharge = Math.max(heroA.xuchuLastCharge || 0, heroB.xuchuLastCharge || 0);
    // 吕蒙潜行：合成成功也算一次"出场"，所以重置潜行（让升级后重新累静默期）
    merged.lvmengStealth = false;
    merged.lvmengStealthSince = 0;
    // 黄月英采集容量继承（采到一半合成不能浪费）
    merged.collected = heroB.collected || 0;
    merged.collectedLoad = heroB.collectedLoad || 0;
    // CD 重置（atkCD/cloudCD/auraCD 等已由 makeHero 初始化为默认）
    G.heroes.push(merged);
    G.selectedSlot = -1;
    bumpMergeOpTime();

    // === 合成升级提醒：场景粒子 + 头顶跳字 + 卡槽闪烁 ===
    const mergeColor = CLASS_COLOR[newCls] || '#ffd700';
    // 卡槽闪烁（drawHero 检查 flashUntil；renderHeroGrid 用 flashing class）
    merged.flashUntil = G.time + 0.6;
    if(newLv >= 5){
      // 真·英雄起势：金光爆发+震屏+闪屏
      G.trueHeroCount = (G.trueHeroCount || 0) + 1;
      G.trueHeroSpawned = isTrueHeroFull();
      spawnParticleBurst(merged.worldX, merged.worldY, '#ffd700', 40);
      spawnParticleBurst(merged.worldX, merged.worldY, '#fff8c0', 28);
      triggerScreenFlash(0.5, '255, 215, 80', 0.6);
      triggerShake(8, 0.4);
      sfx('maxlv');
      spawnSkillPopup(merged.worldX, merged.worldY - 22, '真·' + heroNameForCls(newCls), '#ffd700');
    } else if(newLv >= 4){
      // L4 进阶
      spawnParticleBurst(merged.worldX, merged.worldY, '#ffd700', 24);
      spawnParticleBurst(merged.worldX, merged.worldY, mergeColor, 14);
      triggerShake(5, 0.25);
      sfx('maxlv');
      spawnSkillPopup(merged.worldX, merged.worldY - 24, heroNameForCls(newCls) + ' 进阶 L4', '#ffd700');
    } else {
      // L2/L3 升级
      spawnParticleBurst(merged.worldX, merged.worldY, mergeColor, 14);
      spawnParticleBurst(merged.worldX, merged.worldY, '#fff', 8);
      sfx('merge');
      spawnSkillPopup(merged.worldX, merged.worldY - 22, heroNameForCls(newCls) + ' → L' + newLv, mergeColor);
    }
    // 升级金色光环（一次性 0.6s）
    G.explosionEffects = G.explosionEffects || [];
    G.explosionEffects.push({
      x: merged.worldX, y: merged.worldY,
      radius: newLv >= 4 ? 36 : 28,
      until: G.time + 0.5,
      color: newLv >= 5 ? '#ffe680' : (newLv >= 4 ? '#ffd700' : mergeColor)
    });

    // 合成达到4级：触发对应职业的满级奖励
    if(newLv === 4){
      renderHeroGrid();
      doMaxLevelReward(newCls);
      return;
    }
    // 合成达到5级：触发真·英雄 3选2
    if(newLv === 5){
      renderHeroGrid();
      doTrueHeroReward(newCls);
      return;
    }

  } else if(heroA && heroB && heroA.cls === heroB.cls && heroA.lv === heroB.lv && heroA.lv === 4 && isTrueHeroFull()){
    // 已经合成过真·英雄：点了2个L4也只提示
    showTrueHeroToast('单局至多合成1个真·英雄');
    G.selectedSlot = -1;
    renderHeroGrid();
    return;
  } else {
    G.selectedSlot = heroB ? idx : -1;
  }

  renderHeroGrid();
}

function getHeroAtSlot(idx){
  return G.heroes.find(h => h.slotIdx === idx) || null;
}

  ghost: null,
  hoverIdx: -1,
  pointerId: -1
};

function dragGetSlotIdxFromPoint(x, y){
  const grid = document.getElementById('hero-grid');
  if(!grid) return -1;
  const slots = grid.querySelectorAll('.hslot');
  for(let i = 0; i < slots.length; i++){
    const r = slots[i].getBoundingClientRect();
    if(x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return i;
  }
  return -1;
}
// 判断是否拖到丢弃槽
function dragIsOverDiscard(x, y){
  const el = document.getElementById('discard-slot');
  if(!el || el.classList.contains('hidden')) return false;
  const r = el.getBoundingClientRect();
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

function dragCanMergeIntoSlot(srcIdx, dstIdx){
  if(srcIdx < 0 || dstIdx < 0 || srcIdx === dstIdx) return false;
  const a = getHeroAtSlot(srcIdx);
  const b = getHeroAtSlot(dstIdx);
  if(!a || !b) return false;
  if(a.cls !== b.cls || a.lv !== b.lv) return false;
  if(a.lv >= 5) return false;
  return true;
}

function dragCreateGhost(slotEl, h){
  const ghost = document.createElement('div');
  ghost.id = 'drag-ghost';
  const r = slotEl.getBoundingClientRect();
  ghost.style.width  = r.width  + 'px';
  ghost.style.height = r.height + 'px';
  const isTrue = h.lv >= 5, isMax = h.lv === 4;
  const color = CLASS_COLOR[h.cls] || '#aaa';
  ghost.style.background = isTrue ? `linear-gradient(135deg, ${color}55, #5a4010aa)` : (color + '33');
  ghost.style.border = '2.5px solid ' + (isTrue ? '#ffe680' : (isMax ? '#ffd700' : color));
  const lvLabel = isTrue ? '真' : (isMax ? 'L4' : ('L' + h.lv));
  const heroName0 = (HERO_DEFS[h.heroId] && HERO_DEFS[h.heroId].name) || CLASS_NAME_CN[h.cls] || '?';
  const nameLabel = isTrue ? ('真·' + heroName0) : heroName0;
  ghost.innerHTML =
    `<div style="color:#ffd700;font-weight:bold;font-size:11px">${lvLabel}</div>
     <div style="color:#eee;font-size:9px">${nameLabel}</div>`;
  document.body.appendChild(ghost);
  DRAG.ghost = ghost;
}

function dragMoveGhost(x, y){
  if(!DRAG.ghost) return;
  const r = DRAG.ghost.getBoundingClientRect();
  DRAG.ghost.style.left = (x - r.width / 2) + 'px';
  DRAG.ghost.style.top  = (y - r.height / 2) + 'px';
}

function dragHighlightHover(){
  const grid = document.getElementById('hero-grid');
  if(!grid) return;
  const slots = grid.querySelectorAll('.hslot');
  slots.forEach((el, i) => {
    el.classList.remove('drag-target', 'drag-hover', 'drag-target-bad');
    if(i === DRAG.srcIdx) return;
    const canMerge = dragCanMergeIntoSlot(DRAG.srcIdx, i);
    if(canMerge){
      // 全部可合成目标常驻高亮
      el.classList.add('drag-target');
      // 当前 hover 的可合成目标额外强化
      if(DRAG.hoverIdx === i) el.classList.add('drag-hover');
    } else if(DRAG.hoverIdx === i && getHeroAtSlot(i)){
      el.classList.add('drag-target-bad');
    }
  });
  // 丢弃槽 hover 高亮
  const dsEl = document.getElementById('discard-slot');
  if(dsEl) dsEl.classList.toggle('drag-target', !!DRAG.overDiscard);
}

function dragEndCleanup(){
  if(DRAG.longPressTimer){ clearTimeout(DRAG.longPressTimer); DRAG.longPressTimer = null; }
  DRAG.longTriggered = false;
  if(DRAG.ghost){ DRAG.ghost.remove(); DRAG.ghost = null; }
  const grid = document.getElementById('hero-grid');
  if(grid){
    grid.querySelectorAll('.hslot').forEach(el => {
      el.classList.remove('dragging', 'drag-target', 'drag-hover', 'drag-target-bad');
    });
  }
  DRAG.active = false;
  DRAG.pending = false;
  DRAG.srcIdx = -1;
  DRAG.hoverIdx = -1;
  DRAG.pointerId = -1;
}

function tryMergeByDrag(srcIdx, dstIdx){
  // 若两者都是 L4 且无法升5（已生成真英雄），仅提示
  const a = getHeroAtSlot(srcIdx);
  const b = getHeroAtSlot(dstIdx);
  if(a && b && a.cls === b.cls && a.lv === b.lv && a.lv === 4 && isTrueHeroFull()){
    const q = G.trueHeroQuota || 1;
    showTrueHeroToast(`单局至多合成${q}个真·英雄`);
    return;
  }
  if(!dragCanMergeIntoSlot(srcIdx, dstIdx)) return;
  // 复用 handleSlotClick 的合成路径：先选 src，再点 dst
  G.selectedSlot = srcIdx;
  handleSlotClick(dstIdx);
}

function bindSlotDrag(el, idx){
  el.addEventListener('pointerdown', (e) => {
    if(!G.running || paused) return;
    if(idx >= G.unlockedSlots) return;
    const h = getHeroAtSlot(idx);
    if(!h){
      return;
    }
    DRAG.pending = true;
    DRAG.active = false;
    DRAG.srcIdx = idx;
    DRAG.startX = e.clientX;
    DRAG.startY = e.clientY;
    DRAG.pointerId = e.pointerId;
    // 长按 → 打开详情（450ms）
    DRAG.longPressTimer = setTimeout(() => {
      // 必须未进入拖动状态才视为长按
      if(DRAG.active) return;
      const hero = getHeroAtSlot(DRAG.srcIdx);
      if(!hero) return;
      DRAG.longTriggered = true;
      DRAG.pending = false;
      openHeroDetail(hero.heroId, hero.lv);
    }, 450);
    e.preventDefault();
  });
}

window.addEventListener('pointermove', (e) => {
  if(!DRAG.pending && !DRAG.active) return;
  if(DRAG.pointerId !== -1 && e.pointerId !== DRAG.pointerId) return;
  const dx = e.clientX - DRAG.startX;
  const dy = e.clientY - DRAG.startY;
  if(!DRAG.active){
    if(Math.hypot(dx, dy) < 8) return;
    // 进入拖动模式：取消长按计时
    if(DRAG.longPressTimer){ clearTimeout(DRAG.longPressTimer); DRAG.longPressTimer = null; }
    DRAG.active = true;
    DRAG.pending = false;
    // 取消之前的 selection（不让旧的选中干扰）
    if(G.selectedSlot !== -1){ G.selectedSlot = -1; renderHeroGrid(); }
    const grid = document.getElementById('hero-grid');
    const slots = grid && grid.querySelectorAll('.hslot');
    if(slots && slots[DRAG.srcIdx]){
      slots[DRAG.srcIdx].classList.add('dragging');
      const h = getHeroAtSlot(DRAG.srcIdx);
      if(h) dragCreateGhost(slots[DRAG.srcIdx], h);
    }
    // 进入拖动即高亮所有可合成目标
    DRAG.hoverIdx = -1;
    dragHighlightHover();
  }
  if(DRAG.active){
    dragMoveGhost(e.clientX, e.clientY);
    const newHover = dragGetSlotIdxFromPoint(e.clientX, e.clientY);
    const overDiscard = dragIsOverDiscard(e.clientX, e.clientY);
    if(newHover !== DRAG.hoverIdx || overDiscard !== DRAG.overDiscard){
      DRAG.hoverIdx = newHover;
      DRAG.overDiscard = overDiscard;
      dragHighlightHover();
    }
  }
});

window.addEventListener('pointerup', (e) => {
  if(!DRAG.pending && !DRAG.active) return;
  if(DRAG.pointerId !== -1 && e.pointerId !== DRAG.pointerId) return;
  if(DRAG.active){
    const overDiscard = dragIsOverDiscard(e.clientX, e.clientY);
    const src = DRAG.srcIdx;
    if(overDiscard){
      // 丢弃确认弹框
      dragEndCleanup();
      openDiscardConfirm(src);
      return;
    }
    const dst = dragGetSlotIdxFromPoint(e.clientX, e.clientY);
    dragEndCleanup();
    if(dst >= 0 && dst < (G.unlockedSlots || 6)){
      tryMergeByDrag(src, dst);
    }
  } else {
    // 没进入拖动：可能是点击 / 长按
    const idx = DRAG.srcIdx;
    const longFired = DRAG.longTriggered;
    dragEndCleanup();
    if(longFired) return; // 长按已开详情，吞掉
    if(idx >= 0) handleSlotClick(idx);
  }
});

window.addEventListener('pointercancel', () => {
  if(DRAG.active || DRAG.pending) dragEndCleanup();
});

function renderBuffStats(){
  const el = document.getElementById('buff-stats');
  if(!el) return;
  if(!G.selectedClasses || G.selectedClasses.length === 0){
    el.innerHTML = '';
    el.style.display = 'none';
    return;
  }
  // 计算每个职业已选的"张数"（值非0的key数）
  const counts = {};
  for(const cls of G.selectedClasses){
    let n = 0;
    const list = getActiveBuffPoolByCls(cls);
    for(const b of list){
      if((G.buffs[b.key] || 0) > 0){
        // stack=true时 val 累加，count以"张次"计：用val/单张val
        const single = b.val;
        if(b.stack && single){
          n += Math.round((G.buffs[b.key] || 0) / single);
        } else {
          n += 1;
        }
      }
    }
    counts[cls] = n;
  }
  const html = G.selectedClasses.filter(cls => (counts[cls] || 0) > 0).map(cls => {
    const color = CLASS_COLOR[cls];
    return `<div class="bs-row"><div class="bs-dot" style="background:${color}"></div><div class="bs-num">${counts[cls]}</div></div>`;
  }).join('');
  el.innerHTML = html;
  el.style.display = html ? 'flex' : 'none';
}

function updateHUD(){
  document.getElementById('gold-val').textContent = Math.floor(G.gold);
  // 词缀显示
  const affixBox = document.getElementById('affix-box');
  if(affixBox && G.levelConfig){
    const cfg = G.levelConfig;
    if(cfg.affixDesc){
      const types = cfg.affixKeyTypes || [];
      let _i = 0;
      const descHtml = cfg.affixDesc.replace(/\[\[([^\]]+)\]\]/g, (m, key) => {
        const t = types[_i++] || 'debuff';
        return `<span class="a-key ${t}">${key}</span>`;
      });
      affixBox.innerHTML = `<div class="a-name">「${cfg.affixName}」</div><div class="a-desc">${descHtml}</div>`;
    } else {
      affixBox.innerHTML = '';
    }
  }
  // 下一波倒计时 + 当前波次进度
  if(isInfiniteRun()){
    const nextAt = G.nextInfiniteWaveAt || 12;
    const remain = Math.max(0, nextAt - G.time);
    const nextInfo = getNextWaveInfo();
    const intel = getWaveIntelLabel(nextInfo);
    const frenzy = getEnemyFrenzyLabel();
    document.getElementById('t-display').textContent = `下一波 ${Math.ceil(remain)}s${intel ? ' · ' + intel : ''}${frenzy ? ' · ' + frenzy : ''}`;
    document.getElementById('prog-fill').style.width = ((G.waveIdx % 5) / 5 * 100) + '%';
    const segs = document.getElementById('prog-segs');
    if(segs && segs.dataset.totalWaves !== 'infinite'){
      segs.dataset.totalWaves = 'infinite';
      segs.innerHTML = '';
      for(let i = 0; i < 5; i++){
        const div = document.createElement('div');
        div.className = 'seg';
        if(i === 4) div.classList.add('boss');
        segs.appendChild(div);
      }
    }
    document.getElementById('wave-val').textContent = `波次 ${G.waveIdx} / ∞`;
    document.getElementById('level-display').textContent = '无尽战场';
    renderBuffStats();

    let sc = computeSummonCost(G.summonN);
    if(G.summonDiscount > 0) sc = Math.ceil((sc * 0.8) / 10) * 10;
    const uc = upgradeCost(G.upgradeN);
    document.getElementById('su-cost').textContent = sc;
    document.getElementById('up-cost').textContent = uc;

    const slotsFull = occupiedSlots() >= G.unlockedSlots;
    const canSu = G.running && !paused && G.gold >= sc && !slotsFull;
    const canUp = G.running && !paused && G.gold >= uc;
    document.getElementById('btn-su').className = 'act-btn' + (canSu ? '' : ' off');
    document.getElementById('btn-up').className = 'act-btn' + (canUp ? '' : ' off');

    const lordBtn = document.getElementById('lord-btn');
    const lordCdText = document.getElementById('lord-cd-text');
    if(lordBtn && lordCdText){
      const cd = Math.max(0, G.lordSkillCD || 0);
      lordCdText.textContent = cd > 0 ? Math.ceil(cd) + 's' : '';
      lordBtn.classList.toggle('ready', cd <= 0.001);
    }
    return;
  }

  const waves = (G.waves && G.waves.length) ? G.waves : [];
  const totalWaves = waves.length;
  const nextWave = waves[G.waveIdx];
  let nextLabel = '完成';
  if(nextWave){
    const remain = Math.max(0, nextWave.t - G.time);
    const intel = getWaveIntelLabel(getNextWaveInfo());
    nextLabel = `下一波 ${Math.ceil(remain)}s${intel ? ' · ' + intel : ''}`;
  } else if(G.monsters && G.monsters.length > 0){
    nextLabel = '清剿残敌';
  }
  const frenzy = getEnemyFrenzyLabel();
  if(frenzy) nextLabel += ` · ${frenzy}`;
  document.getElementById('t-display').textContent = nextLabel;
  // 进度条按当前波次进度
  document.getElementById('prog-fill').style.width =
    (totalWaves > 0 ? Math.min(100, G.waveIdx / totalWaves * 100) : 0) + '%';
  // 渲染分段（仅在波次数变化时）
  const segs = document.getElementById('prog-segs');
  if(segs && segs.dataset.totalWaves !== String(totalWaves)){
    segs.dataset.totalWaves = totalWaves;
    segs.innerHTML = '';
    for(let i = 0; i < totalWaves; i++){
      const div = document.createElement('div');
      div.className = 'seg';
      // 标记首领波/精英奖励波
      const w = waves[i];
      if(isBossWaveConfig(w, i + 1)) div.classList.add('boss');
      else if(isEliteRewardWave(w, i + 1)) div.classList.add('elite');
      segs.appendChild(div);
    }
  }
  document.getElementById('wave-val').textContent  = `波次 ${G.waveIdx} / ${totalWaves}`;
  document.getElementById('level-display').textContent = `关卡 LV${G.level || 1}`;

  // 各职业已选增益数
  renderBuffStats();

  let sc = computeSummonCost(G.summonN);
  if(G.summonDiscount > 0) sc = Math.ceil((sc * 0.8) / 10) * 10;
  const uc = upgradeCost(G.upgradeN);
  document.getElementById('su-cost').textContent = sc;
  document.getElementById('up-cost').textContent = uc;

  const slotsFull = occupiedSlots() >= G.unlockedSlots;
  const canSu = G.running && !paused && G.gold >= sc && !slotsFull;
  const canUp = G.running && !paused && G.gold >= uc;
  document.getElementById('btn-su').className = 'act-btn' + (canSu ? '' : ' off');
  document.getElementById('btn-up').className = 'act-btn' + (canUp ? '' : ' off');

  // 主公技能冷却
  const lordBtn = document.getElementById('lord-btn');
  const lordCdText = document.getElementById('lord-cd-text');
  if(lordBtn && lordCdText){
    const cd = Math.max(0, G.lordSkillCD || 0);
    lordCdText.textContent = cd > 0 ? Math.ceil(cd) + 's' : '';
    lordBtn.classList.toggle('ready', cd <= 0.001);
  }
}

function renderHeroGrid(){
  const grid = document.getElementById('hero-grid');
  grid.innerHTML = '';
  const unlockedSlots = G.unlockedSlots || 6;
  // 自动提示：未选中任何角色 + 未合成真·英雄 + 存在2个同名L4 → 闪烁高亮
  let autoMergeSlots = null;
  if(G.selectedSlot < 0 && !isTrueHeroFull()){
    const byCls = {};
    for(const h of G.heroes){
      if(h.lv === 4){
        (byCls[h.cls] = byCls[h.cls] || []).push(h);
      }
    }
    for(const cls in byCls){
      if(byCls[cls].length >= 2){
        autoMergeSlots = autoMergeSlots || new Set();
        autoMergeSlots.add(byCls[cls][0].slotIdx);
        autoMergeSlots.add(byCls[cls][1].slotIdx);
        break;
      }
    }
  }
  // 是否处于"满槽且无可合成"的丢弃可见态 → 此时未解锁的格子可花金币购买
  const buyableState = shouldShowDiscardSlot();
  for(let i = 0; i < 12; i++){
    const el     = document.createElement('div');
    const locked = i >= unlockedSlots;
    if(locked){
      // 仅"下一个解锁位"可购买
      const isNextUnlock = (i === unlockedSlots);
      const buyIdx = unlockedSlots - 6;
      const cost = (buyIdx >= 0 && buyIdx < SLOT_BUY_COSTS.length) ? SLOT_BUY_COSTS[buyIdx] : null;
      const canBuy = buyableState && isNextUnlock && cost != null;
      const cantAfford = canBuy && (G.gold || 0) < cost;
      const cls2 = ['hslot','locked'];
      if(canBuy) cls2.push('buyable');
      if(cantAfford) cls2.push('cant-afford');
      el.className = cls2.join(' ');
      if(canBuy){
        el.innerHTML = `<span class="lock-icon">🔓</span><div class="buy-cost">💰${cost}</div>`;
        el.addEventListener('click', () => buyUnlockSlot(i));
      } else if(isNextUnlock && unlockedSlots < 12){
        // 下一个即将解锁的格子才显示进度
        // 解锁阶梯：3/4/4/5/5/6（对应解锁第 7/8/9/10/11/12 格）
        const idx = unlockedSlots - 6;
        const need = SLOT_UNLOCK_STEPS[idx] || 6;
        let cycleStart = 3;
        for(let k = 0; k < idx; k++) cycleStart += SLOT_UNLOCK_STEPS[k];
        const cur = Math.max(0, Math.min(need, G.summonN - cycleStart));
        el.innerHTML = `<span class="lock-icon">🔒</span><div class="unlock-progress">${cur}/${need}</div>`;
      } else {
        el.innerHTML = '<span class="lock-icon">🔒</span>';
      }
    } else {
      const h          = getHeroAtSlot(i);
      const isSelected = (G.selectedSlot === i);
      // 检测是否是可合成目标（已选中其他角色，且本格角色可与之合成）
      let isMergeable = false;
      if(G.selectedSlot >= 0 && G.selectedSlot !== i && h){
        const selH = getHeroAtSlot(G.selectedSlot);
        if(selH && selH.cls === h.cls && selH.lv === h.lv && h.lv < 5){
          // L4→L5：仅在尚未生成真英雄时高亮
          if(h.lv < 4 || !isTrueHeroFull()) isMergeable = true;
        }
      }
      // 自动提示模式：两个同名 L4
      const isAutoTrueHint = autoMergeSlots && autoMergeSlots.has(i);
      if(h){
        const isTrue = h.lv >= 5;
        const isMax = h.lv === 4;
        const flashing = h.flashUntil && h.flashUntil > G.time;
        const mergeHinting = h.mergeHintUntil && h.mergeHintUntil > G.time;
        const cls = ['hslot'];
        if(isSelected) cls.push('selected');
        if(isTrue) cls.push('truelv');
        else if(isMax) cls.push('maxlv');
        if(isMergeable || isAutoTrueHint) cls.push('mergeable');
        if(isAutoTrueHint) cls.push('truehint');
        if(flashing) cls.push('flashing');
        if(mergeHinting) cls.push('merge-hint');
        el.className = cls.join(' ');
        const color  = CLASS_COLOR[h.cls] || '#aaa';
        el.style.borderColor = isSelected ? '#ffd700' : (isTrue ? '#ffe680' : (isMax ? '#ffd700' : color));
        el.style.background  = isTrue ? 'linear-gradient(135deg,' + color + '55,#5a4010aa)' : (color + '33');
        const lvLabel = isTrue ? '真' : (isMax ? 'L4' : ('L' + h.lv));
        const heroName1 = (HERO_DEFS[h.heroId] && HERO_DEFS[h.heroId].name) || CLASS_NAME_CN[h.cls] || '?';
        const heroTitle1 = (HERO_DEFS[h.heroId] && HERO_DEFS[h.heroId].title) || TRUE_HERO_TITLE[h.cls] || '';
        const nameLabel = isTrue ? ('真·' + heroName1) : heroName1;
        el.innerHTML =
          `<div class="lv">${lvLabel}</div><div class="dp">${nameLabel}</div><div class="dp" style="font-size:8px;color:#bbb">${isTrue ? heroTitle1 : (CLASS_ROLE_CN[h.cls] || '')}</div>`;
      } else {
        el.className = 'hslot' + (isSelected ? ' selected' : '');
      }
      const idx = i;
      const hereH = getHeroAtSlot(i);
      if(hereH){
        // 有英雄：拖动入口（pointerdown 触发拖动；pointerup 兜底为点击）
        bindSlotDrag(el, idx);
      } else {
        // 空格子：直接点击行为（取消选中）
        el.addEventListener('click', () => handleSlotClick(idx));
      }
    }
    grid.appendChild(el);
  }
  updateDiscardSlotVisibility();
}
