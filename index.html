<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>堡垒防卫者</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; -webkit-touch-callout:none; -webkit-tap-highlight-color:transparent; }

/* ============================================================
 * 设计系统 / Design Tokens
 * ============================================================ */
:root {
  /* 强调色（金） */
  --gold:        #ffd700;
  --gold-bright: #fff080;
  --gold-dim:    #d4a040;
  --gold-deep:   #5c2a1a;
  /* 主操作色（蓝） */
  --accent:      #4a90e2;
  --accent-hi:   #5aa0f2;
  --accent-dim:  #2a5a9a;
  /* 背景层级 */
  --bg-1:        #0d1626;
  --bg-2:        #1a2840;
  --bg-3:        #1e2a3a;
  --bg-overlay:  rgba(0,0,0,0.85);
  --bg-panel:    rgba(0,0,0,0.55);
  /* 边框 */
  --border-soft: #2a3a55;
  --border-mid:  #3a5577;
  --border-strong:#5a80b0;
  /* 状态色 */
  --danger:      #aa5040;
  --danger-dim:  #7a3020;
  --ok:          #4caf50;
  --ok-dim:      #2d7a32;
  /* 字号 */
  --fs-h1:18px;
  --fs-h2:14px;
  --fs-body:12px;
  --fs-tiny:10px;
}

/* ============================================================
 * 按钮体系（统一基底 + 4 种风格）
 * ============================================================ */
.btn {
  display:inline-flex; align-items:center; justify-content:center;
  padding:12px 20px; border-radius:8px;
  font:bold 14px Arial; cursor:pointer; color:#fff;
  border:2px solid transparent;
  background:transparent;
  transition:filter .15s, background .15s, border-color .15s;
  user-select:none;
  white-space:nowrap;
  line-height:1;
}
.btn:hover { filter:brightness(1.15); }
.btn:disabled, .btn.disabled {
  opacity:0.4; cursor:not-allowed; filter:grayscale(0.4);
  pointer-events:none;
}
.btn-primary {
  background:var(--accent);
  border-color:var(--accent);
}
.btn-primary:hover { background:var(--accent-hi); border-color:var(--accent-hi); }
.btn-ghost {
  background:linear-gradient(135deg, #3a5577, #243a55);
  border-color:var(--border-strong);
}
.btn-danger {
  background:linear-gradient(135deg, var(--danger), var(--danger-dim));
  border-color:var(--danger);
}
.btn-gold {
  background:linear-gradient(135deg,#7a5a20,#3a2a08);
  border-color:var(--gold-dim);
  color:var(--gold-bright);
}

/* 通用关闭按钮 */
.icon-close {
  position:absolute; top:6px; right:8px;
  width:26px; height:26px;
  box-sizing:border-box;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.4); border:1px solid #888; border-radius:50%;
  color:#fff; font:bold 16px/1 Arial; cursor:pointer;
  padding-bottom:2px;
  z-index:10;
}
.icon-close:hover { color:#ff6b6b; border-color:#ff6b6b; }

html, body { height:100%; overflow:hidden; }
body {
  background:#111;
  display:flex; justify-content:center; align-items:center;
  font-family:Arial,sans-serif;
  -webkit-text-size-adjust:100%;
}
#stage {
  /* 整体缩放容器：内部用360×800逻辑尺寸，CSS缩放到屏幕 */
  width:360px; height:800px;
  transform-origin:center center;
  position:relative;
}
#wrap {
  position:relative; width:360px; height:800px;
  overflow:hidden; border:2px solid #555;
}
canvas { position:absolute; top:0; left:0; width:360px; height:800px; }

/* HUD TOP */
#hud-top {
  position:absolute; top:0; left:0; right:0;
  padding:8px 10px 6px;
  background:rgba(0,0,0,0.55);
  pointer-events:none; z-index:10;
}
#hud-top .row1 {
  display:flex; justify-content:space-between;
  color:#fff; font:bold 13px Arial; margin-bottom:4px;
}
.level-display {
  text-align:center; color:#ffd700;
  font:bold 14px Arial;
  margin-bottom:4px;
  text-shadow:0 0 6px rgba(255,215,0,0.5);
}
#prog-bar {
  height:16px; background:rgba(255,255,255,0.15);
  border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.3);
  position:relative;
}
#prog-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,#56ab2f,#a8e063); transition:width 0.2s;
  position:absolute; top:0; left:0;
}
#prog-segs {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:flex; pointer-events:none;
}
#prog-segs .seg {
  flex:1; border-right:1px solid rgba(0,0,0,0.4);
}
#prog-segs .seg:last-child { border-right:none; }
#prog-segs .seg.boss { background:rgba(255,80,80,0.18); }
#prog-segs .seg.elite { background:rgba(230,170,80,0.16); }

/* HUD SIDE */
#hud-side {
  position:absolute; top:80px; left:8px;
  pointer-events:none; z-index:10;
}
.side-box {
  background:rgba(0,0,0,0.5); border-radius:6px;
  padding:5px 10px; color:#fff; font:12px Arial; margin-bottom:5px;
}
.gold-val { color:#ffd700; font-weight:bold; font-size:15px; }
.affix-box { max-width:180px; }
.affix-box .a-name { color:#ffd700; font-weight:bold; font-size:11px; }
.affix-box .a-desc { color:#ddd; font-size:10px; line-height:1.4; margin-top:2px; }
.affix-box .a-key { color:#ff6060; font-weight:bold; }
.affix-box .a-key.buff { color:#80ffaa; }
.affix-box .a-key.debuff { color:#ff6060; }
.affix-box .a-key.neutral { color:#ffd700; }

/* 暂停按钮（右顶格，原 DPS 位置） */
#pause-btn {
  position:absolute; top:80px; right:8px;
  width:36px; height:32px;
  background:rgba(0,0,0,0.6); color:#fff;
  font:bold 18px Arial; line-height:32px; text-align:center;
  border:1px solid #888; border-radius:6px;
  cursor:pointer; z-index:15;
  user-select:none;
}
#pause-btn:hover { background:rgba(0,0,0,0.85); border-color:#ccc; }

/* 暂停面板按钮（参考选英雄/失败结算的左右双按钮风格） */
.pause-actions {
  display:flex; gap:12px; justify-content:space-between;
  margin-top:auto; padding-top:18px;
}
.pause-actions button {
  flex:1; padding:12px 20px; border-radius:8px;
  font:bold 15px Arial; cursor:pointer; color:#fff;
  border:2px solid transparent;
}
.pause-actions .btn-back {
  background:linear-gradient(135deg,#3a5577,#243a55);
  border-color:#5a80b0;
}
.pause-actions .btn-resume {
  background:#4a90e2;
  border-color:#4a90e2;
}
.pause-actions button:hover { filter:brightness(1.15); }
/* 暂停界面顶部关卡名 */
.pause-level-name {
  text-align:center; color:#ffd700;
  font:bold 14px Arial; margin-bottom:12px;
  text-shadow:0 0 6px rgba(255,215,0,0.5);
}
.pause-level-name .pln-affix { color:#ddd; font:11px Arial; margin-top:3px; }

/* 增益统计 */
#buff-stats {
  position:absolute; top:115px; right:8px;
  background:rgba(0,0,0,0.55);
  border-radius:6px; padding:5px 8px;
  display:flex; flex-direction:column; gap:2px;
  pointer-events:none; z-index:10;
  font:bold 11px Arial;
}
#buff-stats .bs-row { display:flex; align-items:center; gap:4px; }
#buff-stats .bs-dot { width:8px; height:8px; border-radius:50%; }
#buff-stats .bs-num { color:#fff; font-size:11px; min-width:14px; text-align:right; }

/* DPS面板 */
#dps-panel {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.85);
  display:none; flex-direction:column;
  padding:30px 20px;
  z-index:35;
}
#dps-panel.show { display:flex; }
#dps-panel #dps-content { flex:1; overflow-y:auto; }
.dps-header {
  display:flex; justify-content:center; align-items:center;
  color:var(--gold); font:bold 18px Arial;
  border-bottom:1px solid var(--gold);
  padding-bottom:8px; margin-bottom:14px;
  text-align:center;
}
.dps-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 12px; margin-bottom:8px;
  background:rgba(255,255,255,0.06);
  border-radius:6px;
}
.dps-row .left { font:bold 13px Arial; }
.dps-row .right { font:12px Arial; color:#ddd; text-align:right; }
.dps-bar {
  height:6px; background:rgba(255,255,255,0.1);
  border-radius:3px; margin-top:5px; overflow:hidden;
}
.dps-bar-fill {
  height:100%; transition:width 0.3s;
}
.dps-total {
  text-align:center; color:#ffd700;
  font:bold 14px Arial; margin-top:10px;
}
.pause-stats-grid {
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:8px;
  margin-bottom:12px;
}
.pause-stat {
  min-height:54px;
  border:1px solid rgba(255,215,128,0.24);
  background:linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.025));
  border-radius:6px;
  padding:8px;
  box-shadow:inset 0 0 12px rgba(0,0,0,0.22);
}
.pause-stat .ps-label {
  color:#9ca8bb;
  font:10px Arial;
  margin-bottom:5px;
}
.pause-stat .ps-value {
  color:#fff4ba;
  font:bold 15px Arial;
  white-space:nowrap;
}

/* BOTTOM */
#hud-bottom {
  position:absolute; bottom:0; left:0; right:0;
  background:rgba(10,10,20,0.93);
  padding:7px 8px 9px; z-index:10;
}
#gold-bar {
  display:flex; align-items:center; justify-content:center; gap:6px;
  background:linear-gradient(180deg, rgba(60,42,12,0.85), rgba(36,24,8,0.85));
  border:1px solid rgba(255,200,80,0.4);
  border-radius:6px;
  padding:4px 10px;
  margin:0 0 7px;
  color:#fff; font:bold 13px Arial;
  box-shadow:inset 0 0 8px rgba(255,200,80,0.18);
}
#gold-bar .gold-icon { font-size:13px; }
#gold-bar .gold-val { color:#ffd700; font-weight:bold; font-size:16px; }
#hero-grid-wrap {
  position:relative;
  margin-bottom:7px;
}
#hero-grid {
  display:grid; grid-template-columns:repeat(6,1fr);
  gap:4px;
}
#discard-slot {
  position:absolute; bottom:100%; right:8px;
  margin-bottom:8px;
  width:48px; height:48px;
  background:rgba(170,80,80,0.92);
  border:2px dashed #ff8080;
  border-radius:6px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#fff; cursor:pointer; user-select:none;
  z-index:15;
  box-shadow:0 0 12px rgba(255,80,80,0.55);
  animation:discard-pulse 1.6s ease-in-out infinite;
}
#discard-slot.hidden { display:none !important; }
#discard-slot .ds-icon { font:14px Arial; line-height:1; }
#discard-slot .ds-text { font:bold 9px Arial; margin-top:2px; }
#discard-slot.drag-target {
  background:#d04040;
  border-color:#fff080;
  transform:scale(1.1);
  box-shadow:0 0 18px #ff4040, 0 0 30px rgba(255,80,80,0.8);
}
@keyframes discard-pulse {
  0%,100% { box-shadow:0 0 8px rgba(255,80,80,0.4); }
  50%     { box-shadow:0 0 18px rgba(255,80,80,0.8); }
}

/* DISCARD CONFIRM */
#discard-confirm {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center;
  z-index:50;
}
#discard-confirm.hidden { display:none !important; }
#discard-confirm .dc-panel {
  background:linear-gradient(140deg, #2a1818, #14080a);
  border:2px solid #ff6060; border-radius:10px;
  padding:18px 18px 14px;
  width:280px; max-width:90%;
  box-shadow:0 0 18px rgba(255,80,80,0.5);
}
#discard-confirm .dc-title {
  color:#ff8080; font:bold 16px Arial;
  text-align:center; margin-bottom:10px;
}
#discard-confirm .dc-msg {
  color:#fff; font:14px Arial;
  text-align:center; line-height:1.6;
  margin-bottom:14px;
  background:rgba(255,255,255,0.05);
  padding:10px; border-radius:6px;
}
#discard-confirm .dc-actions {
  display:flex; gap:10px; justify-content:center;
}
#discard-confirm .dc-actions button { flex:1; }
.hslot {
  aspect-ratio:1; background:#2a2a3a;
  border:1.5px solid #444; border-radius:5px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  color:#aaa; font-size:9px; cursor:pointer; user-select:none;
  position:relative;
}
.hslot.selected { border-color:#ffd700 !important; border-width:2.5px !important; box-shadow:0 0 6px #ffd700; }
.hslot.maxlv {
  border-color:#ffd700 !important;
  border-width:2.5px !important;
  box-shadow:0 0 8px #ffd700, inset 0 0 6px rgba(255,215,0,0.3);
}
.hslot.truelv {
  border-color:#ffe680 !important;
  border-width:2.5px !important;
  box-shadow:0 0 12px #ffd700, 0 0 24px rgba(255,200,80,0.7), inset 0 0 8px rgba(255,230,150,0.5);
  animation: truelv-glow 1.6s ease-in-out infinite;
}
@keyframes truelv-glow {
  0%, 100% { box-shadow:0 0 10px #ffd700, 0 0 20px rgba(255,200,80,0.6), inset 0 0 8px rgba(255,230,150,0.4); }
  50%     { box-shadow:0 0 18px #fff080, 0 0 36px rgba(255,220,120,1), inset 0 0 12px rgba(255,240,180,0.7); }
}
.hslot.truelv .lv { color:#fff080 !important; text-shadow:0 0 6px #ffd700, 0 0 10px #ffaa20; }
.hslot.truehint {
  animation: truehint-breathe 0.7s ease-in-out infinite !important;
}
@keyframes truehint-breathe {
  0%, 100% {
    box-shadow: 0 0 10px #ffd700, 0 0 18px rgba(255,200,80,0.7);
    border-color: #ffd700 !important;
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 22px #fff080, 0 0 40px rgba(255,230,150,1);
    border-color: #fff080 !important;
    transform: scale(1.08);
  }
}
.hslot.mergeable {
  animation: mergeable-breathe 0.8s ease-in-out infinite;
}
@keyframes mergeable-breathe {
  0%, 100% {
    box-shadow: 0 0 6px #4caf50, 0 0 12px rgba(76, 175, 80, 0.7);
    border-color: #4caf50 !important;
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 16px #aaff88, 0 0 28px rgba(160, 255, 130, 1);
    border-color: #aaff88 !important;
    transform: scale(1.06);
  }
}
.hslot.flashing {
  animation: hero-flash 0.15s ease-in-out 3;
}
.hslot.merge-hint {
  animation: merge-hint-flash 0.55s ease-out 1;
}
@keyframes merge-hint-flash {
  0%   { box-shadow: 0 0 4px rgba(255,255,255,0.2); }
  35%  { box-shadow: 0 0 10px #fff, 0 0 16px rgba(255,255,255,0.7); border-color:#fff !important; }
  100% { box-shadow: 0 0 4px rgba(255,255,255,0.05); }
}
.hslot.dragging {
  opacity: 0.55 !important;
  transform: scale(0.95);
  border-color:#ffd700 !important;
  box-shadow:0 0 8px #ffd700, inset 0 0 6px rgba(255,215,0,0.4);
}
.hslot.drag-target {
  border-color: #aaff88 !important;
  border-width: 3px !important;
  box-shadow: 0 0 14px #aaff88, 0 0 28px rgba(160,255,130,0.9);
  animation: drag-target-pulse 0.55s ease-in-out infinite;
}
.hslot.drag-target.drag-hover {
  transform: scale(1.1);
  border-color:#fff080 !important;
  box-shadow:0 0 22px #fff080, 0 0 44px rgba(255,230,150,1);
  animation: none;
}
@keyframes drag-target-pulse {
  0%,100% { box-shadow: 0 0 12px #aaff88, 0 0 24px rgba(160,255,130,0.7); }
  50%     { box-shadow: 0 0 20px #d8ffaa, 0 0 36px rgba(200,255,170,1); }
}
.hslot.drag-target-bad {
  border-color: #ff6060 !important;
  border-width: 2.5px !important;
  box-shadow: 0 0 8px rgba(255,80,80,0.6);
}
#hero-grid { touch-action: none; }
#drag-ghost {
  position:fixed; pointer-events:none; z-index:999;
  border-radius:5px; opacity:0.92;
  box-shadow:0 0 16px #ffd700, 0 0 30px rgba(255,200,80,0.6);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:9px; user-select:none;
}
#true-hero-toast {
  position:absolute; left:50%; top:48%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, rgba(120,60,0,0.95), rgba(60,30,0,0.95));
  border: 2px solid #ffd700;
  color:#ffe680; font:bold 14px Arial;
  padding:10px 20px; border-radius:8px;
  box-shadow:0 0 16px #ffd700, 0 0 30px rgba(255,200,80,0.6);
  z-index:50; pointer-events:none;
  display:none; text-shadow:0 0 6px #ffaa20;
}
#true-hero-toast.show { display:block; animation: th-toast 1.6s ease-out forwards; }

/* 仪式 BANNER */
#ceremony-banner {
  position:absolute; left:0; right:0; top:38%;
  text-align:center;
  pointer-events:none; z-index:90;
  display:none;
}
#ceremony-banner.show { display:block; }
#ceremony-banner .cb-title {
  font:bold 36px Arial; letter-spacing:6px;
  margin-bottom:8px;
  /* 末尾"！"视觉占比小，整体居中时会显偏左；用 padding-left 抵消感受 */
  padding-left:18px;
}
#ceremony-banner .cb-sub {
  font:bold 16px Arial; color:#fff; letter-spacing:2px;
}

/* 开战：金色/白光 */
#ceremony-banner.battle .cb-title {
  color:#ffd700;
  text-shadow:0 0 14px #ffd700, 0 0 28px rgba(255,215,128,0.7), 2px 2px 0 #000;
  animation: cb-battle-in 0.5s ease-out, cb-battle-pulse 1.6s ease-in-out infinite;
}
#ceremony-banner.battle .cb-sub { color:#fff; text-shadow:0 0 6px rgba(255,215,80,0.6); }

/* 胜利：青绿/星金 */
#ceremony-banner.victory .cb-title {
  color:#80ffd0;
  text-shadow:0 0 16px #80ffd0, 0 0 30px rgba(120,255,200,0.7), 2px 2px 0 #000;
  animation: cb-victory-in 0.6s cubic-bezier(.2,1.4,.4,1);
}
#ceremony-banner.victory .cb-sub { color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,0.7); }

/* 失败：血红/暗影 */
#ceremony-banner.defeat .cb-title {
  color:#ff5050;
  text-shadow:0 0 14px #ff3030, 0 0 26px rgba(180,40,40,0.8), 2px 2px 0 #000;
  animation: cb-defeat-in 0.7s ease-out;
}
#ceremony-banner.defeat .cb-sub { color:#ddd; text-shadow:0 0 4px rgba(0,0,0,0.7); }

/* 首领来袭：橙红警示 */
#ceremony-banner.boss .cb-title {
  color:#ff8030;
  text-shadow:0 0 14px #ff5020, 0 0 26px rgba(255,80,40,0.8), 2px 2px 0 #000;
  animation: cb-boss-in 0.5s ease-out;
}
#ceremony-banner.boss .cb-sub { color:#ffd700; text-shadow:0 0 6px rgba(255,180,40,0.7); }
@keyframes cb-boss-in {
  0%   { opacity:0; transform:scale(1.3); letter-spacing:30px; }
  60%  { opacity:1; transform:scale(0.95); letter-spacing:6px; }
  100% { opacity:1; transform:scale(1); letter-spacing:6px; }
}

@keyframes cb-battle-in {
  0% { opacity:0; transform:translateY(-40px) scale(1.2); letter-spacing:30px; }
  100% { opacity:1; transform:translateY(0) scale(1); letter-spacing:6px; }
}
@keyframes cb-battle-pulse {
  0%,100% { text-shadow:0 0 14px #ffd700, 0 0 28px rgba(255,215,128,0.6), 2px 2px 0 #000; }
  50%     { text-shadow:0 0 22px #fff080, 0 0 40px rgba(255,230,160,1), 2px 2px 0 #000; }
}
@keyframes cb-victory-in {
  0%   { opacity:0; transform:scale(0.5) rotate(-8deg); }
  60%  { opacity:1; transform:scale(1.15) rotate(2deg); }
  100% { opacity:1; transform:scale(1) rotate(0); }
}
@keyframes cb-defeat-in {
  0%   { opacity:0; transform:translateY(-30px); filter:blur(8px); }
  40%  { opacity:1; transform:translateY(8px); filter:blur(0); }
  60%  { transform:translateY(-2px); }
  100% { opacity:1; transform:translateY(0); }
}
@keyframes th-toast {
  0%   { opacity:0; transform: translate(-50%, -40%) scale(0.85); }
  15%  { opacity:1; transform: translate(-50%, -50%) scale(1.05); }
  30%  { opacity:1; transform: translate(-50%, -50%) scale(1); }
  85%  { opacity:1; }

// 自适应缩放：让360×800在任何屏幕上完整显示
(function fitStage(){
  function update(){
    const stage = document.getElementById('stage');
    if(!stage) return;
    const sw = window.innerWidth;
    const sh = window.innerHeight;
    const scale = Math.min(sw / 360, sh / 800);
    stage.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', update);
  window.addEventListener('orientationchange', () => setTimeout(update, 100));
  update();
})();
</script>

function getRecommendedHeroIds(cfg){
  if(!cfg) return [];
  const rule = AFFIX_RECO_TAGS[cfg.affixName];
  const out = new Set();
  // 默认采集英雄全员推荐（除贫瘠之地）
  if(!rule || !rule.excludeGather){
    for(const id in HERO_TAGS){
      if(HERO_TAGS[id].includes('gather')) out.add(id);
    }
  }
  if(rule && rule.tags && rule.tags.length){
    for(const id in HERO_TAGS){
      const tags = HERO_TAGS[id];
      if(rule.tags.some(t => tags.includes(t))) out.add(id);
    }
  }
  return Array.from(out);
}

// 角色解锁条件：returns { reqLevel: 已通关最低关卡, hint: 文案 }
//   reqLevel = 0  → 一开始就解锁
//   reqLevel = 1  → 通关 LV1 解锁（用于法师整个职业）
//   reqLevel = 2  → 通关 LV2 解锁（用于刺客整个职业）
//   reqLevel = 5  → 通关 LV5 解锁（用于非默认的扩展角色）
const HERO_UNLOCK = (() => {
  const m = {};
  for(const id in HERO_DEFS){
    const def = HERO_DEFS[id];
    if(id === DEFAULT_HEROES[def.cls]){
      // 默认角色 = 该职业的"起手角色"
      if(def.cls === 'mage')          m[id] = { reqLevel:1, hint:'通关 LV1 解锁' };
      else if(def.cls === 'assassin') m[id] = { reqLevel:2, hint:'通关 LV2 解锁' };
      else                            m[id] = { reqLevel:0, hint:'初始' };
    } else {
      // 扩展角色统一通关 LV5 解锁
      m[id] = { reqLevel:5, hint:'通关 LV5 解锁' };
    }
  }
  return m;
})();

function isHeroUnlocked(heroId){
  const u = HERO_UNLOCK[heroId];
  if(!u) return false;
  if(u.reqLevel === 0) return true;
  // 基于当前选的关卡：判定"开始这一关时"是否解锁
  // 规则：要进入第 N 关之前，必须已通关 reqLevel 关
  //   选 LV1（进入 LV1） → 通关数=0 → 仅起始 reqLevel=0 解锁
  //   选 LV2（进入 LV2） → 通关数=1 → 张角(reqLevel=1) 解锁
  //   选 LV3（进入 LV3） → 通关数=2 → 张角+赵云 解锁
  //   选 LV6（进入 LV6） → 通关数=5 → 全部解锁
  const pendingLv = (G && G.pendingLevel) || 1;
  const clearedBefore = Math.max(0, pendingLv - 1); // 进 LV N 时已通关 N-1 关
  return clearedBefore >= u.reqLevel;
}

// 按职业归档候选英雄 id
function getHeroIdsByClass(cls){
  return Object.keys(HERO_DEFS).filter(id => HERO_DEFS[id].cls === cls);
}

// 取该职业实际上阵的角色名（用于 DPS 统计 / 升级 buff 跳字 等）
function heroNameForCls(cls){
  const heroId = (G && G.selectedHeroes || []).find(id => HERO_DEFS[id] && HERO_DEFS[id].cls === cls);
  if(heroId && HERO_DEFS[heroId]) return HERO_DEFS[heroId].name;
  const def = HERO_DEFS[DEFAULT_HEROES[cls]];
  return (def && def.name) || CLASS_NAME_CN[cls] || cls;
}

// 阵营光环：返回 { faction, count, bonus, all } —— bonus 是攻击力加成（0/0.10/0.15）
//   3 同阵营 → +10%；4 同阵营 → +15%（前者为后者的子集，输出按最高档）
function computeFactionAura(heroIds){
  if(!heroIds || heroIds.length === 0){
    return { faction:null, count:0, bonus:0 };
  }
  const stats = {};
  for(const id of heroIds){
    const def = HERO_DEFS[id];
    if(!def) continue;
    const f = def.faction || 'qun';
    stats[f] = (stats[f] || 0) + 1;
  }
  let bestFac = null, bestCnt = 0;
  for(const f in stats){
    if(stats[f] > bestCnt){ bestCnt = stats[f]; bestFac = f; }
  }
  let bonus = 0;
  if(bestCnt >= 4) bonus = 0.15;
  else if(bestCnt >= 3) bonus = 0.10;
  return { faction: bestFac, count: bestCnt, bonus, stats };
}

function getLevelConfig(lv){
  // 1-5关固定；6+关循环 LV2/LV3/LV4/LV5（密林/空旷/贪婪/风驰）四套词缀
  let cfg;
  if(lv === 10){
    cfg = {
      name: '无尽战场',
      unlocked: ALL_CLS.slice(),
      recommended: [],
      waveProfile: 'infinite',
      affixName: '无尽战场',
      affixDesc: '关卡波次无限，坚守到底！',
      affix: {},
      infinite: true
    };
  } else if(lv <= 5){
    cfg = LEVELS[lv - 1];
  } else {
    const idx = ((lv - 6) % 4) + 1; // 1,2,3,4 -> LEVELS[1/2/3/4]
    cfg = LEVELS[idx];
  }
  // 6关之后清空推荐，鼓励自由探索；密林伏击模板替换为 15 波版（standard15）
  if(lv >= 6 && lv !== 10){
    const override = { recommended: [], unlocked: ALL_CLS.slice() };
    if(cfg.waveProfile === 'standard') override.waveProfile = 'standard15';
    cfg = Object.assign({}, cfg, override);
  }
  return cfg;
}

function applySlow(target, duration, amount){
  if(!target) return;
  target.slowUntil = G.time + duration * getCcMult();
  // 关卡减速放大（如风驰雷动 ×1.5）；上限 0.9 防止完全静止
  const slowMult = (G.levelConfig && G.levelConfig.affix && G.levelConfig.affix.slowAmpMult) || 1;
  target.slowAmount = Math.min(0.9, amount * slowMult);
}

// 取该 heroId 的完整 buff 池（公共 + 角色专属）；查不到时回退到默认角色
function getHeroBuffPool(heroId){
  const def = HERO_DEFS[heroId];
  if(!def) return [];
  const common = BUFFS_BY_CLASS[def.cls] || [];
  const extra = HERO_BUFFS_EXTRA[heroId] || [];
  return common.concat(extra);
}

// 取该职业当前上阵角色对应的 buff 池
function getActiveBuffPoolByCls(cls){
  const heroId = (G && G.selectedHeroes || []).find(id => HERO_DEFS[id] && HERO_DEFS[id].cls === cls)
              || DEFAULT_HEROES[cls];
  return getHeroBuffPool(heroId);
}

// ============================================================

// ============================================================
function v2(x,y){return{x,y};}
function vadd(a,b){return v2(a.x+b.x,a.y+b.y);}
function vsub(a,b){return v2(a.x-b.x,a.y-b.y);}
function vmul(a,s){return v2(a.x*s,a.y*s);}
function vlen(a){return Math.hypot(a.x,a.y);}
function vnorm(a){const l=vlen(a);return l?v2(a.x/l,a.y/l):v2(0,0);}
function vdist(a,b){return vlen(vsub(a,b));}

// ============================================================
// 召唤成本：前3次固定 10/20/30；从第4次起每次×1.10，10取整且强制至少+10
// 第20次约360（接近期望的350）
const SCOSTS = [10, 20, 30];
// 槽位解锁阶梯：填满前 6 格之后，每开一个新格所需的连续召唤次数
//   开第 7/8/9/10/11/12 格 → 3 / 4 / 4 / 5 / 5 / 6 次
const SLOT_UNLOCK_STEPS = [3, 4, 4, 5, 5, 6];
// 金币付费解锁第 7/8/9/10/11/12 格的价格
const SLOT_BUY_COSTS    = [100, 200, 300, 500, 700, 1000];
(function(){
  let c = 40;
  SCOSTS.push(c);
  for(let i = 0; i < 30; i++){
    let next = Math.ceil((c * 1.10) / 10) * 10;
    if(next <= c) next = c + 10;
    SCOSTS.push(next);
    c = next;
  }
})();
// 动态计算召唤价：第 n 次（0-based）
function computeSummonCost(n){
  if(n < SCOSTS.length) return SCOSTS[n];
  // 超出预生成范围：在最后一档基础上继续按 ×1.10 + 取整10
  let c = SCOSTS[SCOSTS.length - 1];
  for(let i = SCOSTS.length; i <= n; i++){
    let next = Math.ceil((c * 1.10) / 10) * 10;
    if(next <= c) next = c + 10;
    c = next;
    SCOSTS.push(c);
  }
  return c;
}
// 升级成本：线性递增 100, 200, 300, 400, ...（无限）
function upgradeCost(n){
  return 100 * (n + 1);
}

//  LORD（主公）
// ============================================================
const LORD = {
  detectRange: 70,     // 触发：附近70px有敌人才释放
  skillRange:  200,    // 技能波及200px
  skillDPS:    25,     // DPS 25
  knockback:   25,     // 击退25px
  cooldown:    60,     // 冷却60秒
  pulseDuration: 0.6   // 视觉脉冲时长
};
function tryReleaseLordSkill(){
  if(!G.fortress) return;
  G.lordSkillCD = (G.lordSkillCD == null) ? 0 : G.lordSkillCD;
  if(G.lordSkillCD > 0) return;
  const fx = G.fortress.worldX, fy = G.fortress.worldY;
  // 触发条件：100px 范围有敌人
  let hasEnemy = false;
  for(const m of G.monsters){
    if(m.hp <= 0) continue;
    if(Math.hypot(m.pos.x - fx, m.pos.y - fy) <= LORD.detectRange){ hasEnemy = true; break; }
  }
  if(!hasEnemy) return;
  // 释放
  for(const m of G.monsters){
    if(m.hp <= 0) continue;
    const dx = m.pos.x - fx, dy = m.pos.y - fy;
    const d = Math.hypot(dx, dy);
    if(d > LORD.skillRange) continue;
    dealDamage(m, LORD.skillDPS, 'lord', false, ['skill','aoe','ranged']);
    // 击退：沿径向外推 50px（带边界保护）
    if(d > 0.001){
      m.pos.x += (dx / d) * LORD.knockback;
      m.pos.y += (dy / d) * LORD.knockback;
    }
  }
  // 视觉脉冲
  G.lordPulses = G.lordPulses || [];
  G.lordPulses.push({
    x: fx, y: fy,
    until: G.time + LORD.pulseDuration,
    duration: LORD.pulseDuration,
    radius: LORD.skillRange
  });
  spawnSkillPopup(fx, fy - 40, '主公·御敌', '#ffd700');
  triggerScreenFlash(0.3, '255, 215, 80', 0.45);
  triggerShake(5, 0.25);
  spawnParticleBurst(fx, fy, '#ffd700', 24);
  sfx('explode');
  G.lordSkillCD = LORD.cooldown;
}

function updateLordSkill(dt){
  if(G.lordSkillCD == null) G.lordSkillCD = 0;
  if(G.lordSkillCD > 0) G.lordSkillCD = Math.max(0, G.lordSkillCD - dt);
  tryReleaseLordSkill();
  // 更新脉冲清理
  if(G.lordPulses){
    for(let i = G.lordPulses.length - 1; i >= 0; i--){
      if(G.time >= G.lordPulses[i].until) G.lordPulses.splice(i, 1);
    }
  }
}

function drawLordPulses(ctx){
  if(!G.lordPulses) return;
  for(const p of G.lordPulses){
    const t = Math.min(1, Math.max(0, 1 - (p.until - G.time) / p.duration));
    const r = Math.max(0, p.radius * t);
    const alpha = Math.max(0, 1 - t);
    if(r <= 0.01) continue;
    ctx.save();
    // 主环
    ctx.strokeStyle = `rgba(255,215,80,${alpha * 0.95})`;
    ctx.lineWidth = 6 * (1 - t * 0.5);
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 16 * alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.stroke();
    // 内环
    ctx.strokeStyle = `rgba(255,255,200,${alpha * 0.7})`;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0, r * 0.85), 0, Math.PI * 2);
    ctx.stroke();
    // 填充淡金
    ctx.fillStyle = `rgba(255,215,80,${alpha * 0.12})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawRoundRect(ctx, x, y, w, h, r, fill, stroke, lineWidth){
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  if(fill){ ctx.fillStyle = fill; ctx.fill(); }
  if(stroke){
    ctx.strokeStyle = stroke;
    ctx.lineWidth = lineWidth || 1;
    ctx.stroke();
  }
}

function drawMiniFlag(ctx, x, y, color){
  ctx.strokeStyle = '#2a160c';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y - 24);
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x + 1, y - 24);
  ctx.lineTo(x + 19, y - 19);
  ctx.lineTo(x + 1, y - 13);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawDiaochanAuras(ctx){
  if(!G.heroes || G.heroes.length === 0) return;
  const t = G.time || 0;
  for(const h of G.heroes){
    if(h.heroId !== 'diaochan') continue;
    const isTrue = h.lv >= 5;
    const rList = [100, 130, 160, 200];
    const r = isTrue ? 300 : rList[Math.min(h.lv, 4) - 1];
    const pulse = 0.7 + 0.3 * Math.sin(t * 2);
    ctx.fillStyle = `rgba(255,90,170,${0.06 + pulse * 0.04})`;
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,120,200,${0.35 + pulse * 0.3})`;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.arc(h.worldX, h.worldY, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawLvbuFans(ctx){
  if(!G.lvbuFans || G.lvbuFans.length === 0) return;
  for(let i = G.lvbuFans.length - 1; i >= 0; i--){
    const f = G.lvbuFans[i];
    const left = f.until - G.time;
    if(left <= 0){ G.lvbuFans.splice(i, 1); continue; }
    const total = 0.3;
    const progress = 1 - left / total;
    const alpha = Math.max(0, 1 - progress);
    const half = f.arc / 2;
    // 扇形填充
    ctx.fillStyle = `rgba(255,215,0,${0.18 * alpha + 0.04})`;
    ctx.beginPath();
    ctx.moveTo(f.x, f.y);
    ctx.arc(f.x, f.y, f.radius * (0.4 + progress * 0.6), f.angle - half, f.angle + half);
    ctx.closePath();
    ctx.fill();
    // 外弧线
    ctx.strokeStyle = `rgba(255,240,120,${alpha})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8 * alpha;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.radius * (0.4 + progress * 0.6), f.angle - half, f.angle + half);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// 5秒未合成提示：找出所有同名同级可合成的英雄对，触发1次闪烁；持续不操作每5秒重复
const MERGE_HINT_INTERVAL = 5;
function findMergeableHintHeroes(){
  // 返回所有处于可合成组内的英雄；3个同名同级时3个都提示。
  const byKey = {};
  for(const h of G.heroes){
    if(h.lv >= 5) continue;
    if(h.lv === 4 && isTrueHeroFull()) continue;
    const k = h.cls + '_' + h.lv;
    (byKey[k] = byKey[k] || []).push(h);
  }
  const heroes = [];
  for(const k in byKey){
    const arr = byKey[k];
    if(arr.length >= 2) heroes.push(...arr);
  }
  return heroes;
}

// 丢弃确认弹框
function openDiscardConfirm(slotIdx){
  const h = getHeroAtSlot(slotIdx);
  if(!h) return;
  paused = true;
  G._discardSlotIdx = slotIdx;
  const def = HERO_DEFS[h.heroId];
  const lvLabel = h.lv >= 5 ? '真·' + (def && def.name || '') : 'L' + h.lv + ' ' + (def && def.name || '');
  document.getElementById('discard-confirm-msg').textContent = `即将丢弃：${lvLabel}（${CLASS_ROLE_CN[h.cls] || ''}）`;
  document.getElementById('discard-confirm').classList.remove('hidden');
}
function cancelDiscard(){
  document.getElementById('discard-confirm').classList.add('hidden');
  paused = false;
  G._discardSlotIdx = -1;
}
function confirmDiscard(){
  const idx = G._discardSlotIdx;
  document.getElementById('discard-confirm').classList.add('hidden');
  paused = false;
  G._discardSlotIdx = -1;
  if(idx == null || idx < 0) return;
  const h = getHeroAtSlot(idx);
  if(!h) return;
  // 移除该英雄
  G.heroes = G.heroes.filter(x => x !== h);
  spawnSkillPopup(h.worldX, h.worldY - 18, '丢弃', '#ff6060');
  spawnParticleBurst(h.worldX, h.worldY, '#ff6060', 14);

  renderHeroGrid();
}
window.cancelDiscard = cancelDiscard;
window.confirmDiscard = confirmDiscard;

// 丢弃槽显示判定：所有可用格子均占满 + 没有任何可合成对
function shouldShowDiscardSlot(){
  if(!G.running) return false;
  if(G.heroes && G.heroes.length === 0) return false;
  const occupied = G.heroes ? G.heroes.length : 0;
  const total = G.unlockedSlots || 6;
  if(occupied < total) return false;
  // 无任何可合成对
  if(findMergeableHintHeroes().length > 0) return false;
  return true;
}
// 真·武将上限是否已用满（用配额模型支持宝箱奖励 +1）
function isTrueHeroFull(){
  if(!G) return false;
  const used = G.trueHeroCount || 0;
  const quota = G.trueHeroQuota != null ? G.trueHeroQuota : 1;
  return used >= quota;
}

function updateDiscardSlotVisibility(){
  const el = document.getElementById('discard-slot');
  if(!el) return;
  const show = shouldShowDiscardSlot();
  el.classList.toggle('hidden', !show);
}
// 花金币解锁第 i 格（i 必须等于当前 G.unlockedSlots）；解锁后召唤计数从下个周期重新开始
function buyUnlockSlot(i){
  if(!G.running) return;
  if(i !== (G.unlockedSlots || 6)) return;
  if(G.unlockedSlots >= 12) return;
  if(!shouldShowDiscardSlot()) return;
  const buyIdx = G.unlockedSlots - 6;
  const cost = SLOT_BUY_COSTS[buyIdx];
  if(cost == null) return;
  if((G.gold || 0) < cost) return;
  G.gold -= cost;
  G.unlockedSlots++;
  // 重新计数：把 summonN 拨到下一个周期的起点（cycleStart），让锁格进度条从 0 开始
  let cycleStart = 3;
  const newIdx = G.unlockedSlots - 6;
  for(let k = 0; k < newIdx; k++) cycleStart += SLOT_UNLOCK_STEPS[k];
  G.summonN = cycleStart;
  spawnSkillPopup(CW / 2, CH * 0.5, '解锁新槽位！', '#ffd700');
  if(typeof sfx === 'function') sfx('upgrade');
  updateHUD();
  renderHeroGrid();
  updateDiscardSlotVisibility();
}
window.buyUnlockSlot = buyUnlockSlot;
function updateMergeHint(dt){
  if(!G.running || paused) return;
  if(G.lastMergeOpTime == null) G.lastMergeOpTime = G.time;
  if(G.nextMergeHintAt == null) G.nextMergeHintAt = G.lastMergeOpTime + MERGE_HINT_INTERVAL;
  if(G.time < G.nextMergeHintAt) return;
  const heroes = findMergeableHintHeroes();
  if(heroes.length === 0){
    G.nextMergeHintAt = G.time + MERGE_HINT_INTERVAL;
    return;
  }
  // 单次柔和闪烁（绑到独立字段，避免与 flashUntil 强提示混淆）
  for(const h of heroes){
    h.mergeHintUntil = G.time + 0.55;
  }
  renderHeroGrid();
  setTimeout(() => renderHeroGrid(), 600);
  G.nextMergeHintAt = G.time + MERGE_HINT_INTERVAL;
}
function bumpMergeOpTime(){
  G.lastMergeOpTime = G.time;
  G.nextMergeHintAt = G.time + MERGE_HINT_INTERVAL;
}
function updateFortress(f){
  f.worldY = FORTRESS_START_Y - FORTRESS_TRAVEL * (G.time / GAME_DURATION);

let heroID = 0;

function makeHero(lv, cls, heroId){
  // 雷云CD：法师初始为正式CD的50%；辅助光环初始CD=0(立即释放)
  let cloudCD = 0, auraCD = 0;
  if(cls === 'mage'){
    const fullCD = [15, 13, 11, 9, 4.5][Math.min(lv - 1, 4)];
    cloudCD = fullCD * 0.5;
  } else if(cls === 'support'){
    auraCD = 0;
  }
  // 若未指定 heroId，按职业默认角色填充
  if(!heroId || !HERO_DEFS[heroId] || HERO_DEFS[heroId].cls !== cls){
    heroId = DEFAULT_HEROES[cls] || heroId;
  }
  return {
    id: heroID++,
    lv, cls, heroId,
    spd: CLASS_SPEED[cls] || 90,
    worldX: 0, worldY: 0,
    target: null,
    idleTarget: null,
    collected: 0, collectedLoad: 0, maxCol: 30,
    atkCD: 0, senseDelay: 0.3,
    atkCDDuration: CLASS_ATK_CD[cls] || 1,
    slotIdx: -1,
    rageStack: 0,
    lastAttackTime: 0,
    buffStacks: 0,
    buffAtkBonus: 0,
    cloudCD,
    auraCD
  };
}
