function toggleDPSPanel(){
  if(!G.running) return;
  const panel = document.getElementById('dps-panel');
  if(panel.classList.contains('show')){
    closeDPSPanel();
  } else {
    paused = true;
    G.pauseMode = 'dps';
    document.getElementById('dps-panel-title').textContent = '实时DPS统计';
    document.getElementById('pause-actions').style.display = 'none';
    renderDPSPanel();
    panel.classList.add('show');
  }
}
function closeDPSPanel(){
  const panel = document.getElementById('dps-panel');
  panel.classList.remove('show');
  G.pauseMode = null;
  paused = false;
}

function togglePausePanel(){
  if(!G.running) return;
  const panel = document.getElementById('dps-panel');
  if(panel.classList.contains('show') && G.pauseMode === 'pause'){
    resumeFromPause();
    return;
  }
  paused = true;
  G.pauseMode = 'pause';
  document.getElementById('dps-panel-title').textContent = '游戏暂停';
  document.getElementById('pause-actions').style.display = 'flex';
  document.getElementById('endgame-actions').style.display = 'none';
  // 关卡名 + 词缀
  const cfg = G.levelConfig || {};
  const plnEl = document.getElementById('pause-level-name');
  if(plnEl){
    const name = `LV${G.level || 1} · ${cfg.name || ''}`;
    const affix = cfg.affixName ? `「${cfg.affixName}」` : '';
    plnEl.innerHTML = `${name}${affix ? ' <span style="color:#ddd">' + affix + '</span>' : ''}`;
    plnEl.style.display = 'block';
  }
  renderDPSPanel();
  panel.classList.add('show');
}
function resumeFromPause(){
  const panel = document.getElementById('dps-panel');
  panel.classList.remove('show');
  document.getElementById('pause-level-name').style.display = 'none';
  G.pauseMode = null;
  paused = false;
}
function retryFromPause(){
  const panel = document.getElementById('dps-panel');
  panel.classList.remove('show');
  document.getElementById('pause-level-name').style.display = 'none';
  G.pauseMode = null;
  paused = false;
  G.running = false;
  const lv = G.level;
  saveCurrentLevel(lv);
  openHeroSelection(lv);
}
function backToLevelsFromPause(){
  const panel = document.getElementById('dps-panel');
  panel.classList.remove('show');
  document.getElementById('pause-level-name').style.display = 'none';
  G.pauseMode = null;
  paused = false;
  G.running = false;
  openStartScreen();
}
function exitToProperPause(){
  const panel = document.getElementById('dps-panel');
  panel.classList.remove('show');
  document.getElementById('pause-level-name').style.display = 'none';
  G.pauseMode = null;
  paused = false;
  G.running = false;
  // 第一关 且 最大通关=0：直接回英雄选择；否则回关卡列表
  const maxUnlocked = getMaxUnlockedLevel();
  if(G.level === 1 && maxUnlocked === 0){
    saveCurrentLevel(1);
    openHeroSelection(1);
  } else {
    openStartScreen();
  }
}
window.exitToProperPause = exitToProperPause;
window.togglePausePanel = togglePausePanel;
window.resumeFromPause = resumeFromPause;
window.retryFromPause = retryFromPause;
window.backToLevelsFromPause = backToLevelsFromPause;
function getPauseStatsHtml(){
  const waveText = isInfiniteRun()
    ? `${G.waveIdx || 0} / ∞`
    : `${G.waveIdx || 0} / ${(G.waves || []).length || 0}`;
  const powerText = isInfiniteRun()
    ? `x${(G.currentWaveScale || 1).toFixed(2)}`
    : `x${getMonsterLevelScale().toFixed(2)}`;
  const bestText = isInfiniteRun()
    ? `${Math.max(getInfiniteBestWave(), G.waveIdx || 0)} 波`
    : `${Math.max(0, Math.round((G.fortress.hp / G.fortress.maxHp) * 100))}%`;
  return `
    <div class="pause-stats-grid">
      <div class="pause-stat"><div class="ps-label">当前波次</div><div class="ps-value">${waveText}</div></div>
      <div class="pause-stat"><div class="ps-label">金币</div><div class="ps-value">${Math.floor(G.gold || 0)}</div></div>
      <div class="pause-stat"><div class="ps-label">战场强度</div><div class="ps-value">${powerText}</div></div>
      <div class="pause-stat"><div class="ps-label">${isInfiniteRun() ? '最高坚守' : '堡垒生命'}</div><div class="ps-value">${bestText}</div></div>
    </div>
  `;
}
function renderDPSPanel(){
  const elapsed = Math.max(1, G.time);
  const stats = G.dpsStats || {};
  const allOrder = ['warrior','archer','assassin','mage','support','gather'];
  const selected = (G.selectedClasses || []);
  const order = allOrder.filter(c => selected.includes(c));
  const totalDmg = order.reduce((s, c) => s + (stats[c] || 0), 0);
  const container = document.getElementById('dps-content');
  const pauseStats = G.pauseMode === 'pause' ? getPauseStatsHtml() : '';
  if(order.length === 0){
    container.innerHTML = pauseStats + '<div style="text-align:center;color:#aaa;padding:30px;">未上阵战斗职业</div>';
    return;
  }
  let html = pauseStats;
  for(const c of order){
    const dmg = stats[c] || 0;
    const dps = Math.round(dmg / elapsed);
    const pctOfTotal = totalDmg > 0 ? dmg / totalDmg * 100 : 0;
    const color = CLASS_COLOR[c];
    html += `
      <div class="dps-row">
        <div style="flex:1">
          <div class="left" style="color:${color}">${heroNameForCls(c)} · ${CLASS_ROLE_CN[c]}</div>
          <div class="dps-bar"><div class="dps-bar-fill" style="width:${pctOfTotal.toFixed(1)}%;background:${color}"></div></div>
        </div>
        <div class="right" style="margin-left:12px">
          <div style="color:${color};font-weight:bold">${Math.round(dmg)}</div>
          <div>${pctOfTotal.toFixed(0)}%</div>
        </div>
      </div>
    `;
  }
  html += `<div class="dps-total">总伤害 ${Math.round(totalDmg)} · 用时 ${Math.floor(G.time)}s</div>`;
  container.innerHTML = html;
}

function endGame(){
  const pct = Math.round((G.fortress.hp / G.fortress.maxHp) * 100);
  const won = G.fortress.hp > 0;
  const infiniteChallenge = isInfiniteRun();
  const survivedWave = Math.max(0, G.waveIdx || 0);
  if(infiniteChallenge) saveInfiniteBestWave(survivedWave);
  const isPerfect = won && G.fortress.hp >= G.fortress.maxHp;
  sfx((won || infiniteChallenge) ? 'win' : 'lose');

  // 复用 dps-panel 作结算面板（与暂停同款全屏）
  const panel = document.getElementById('dps-panel');
  const titleEl = document.getElementById('dps-panel-title');
  const plnEl = document.getElementById('pause-level-name');
  const dpsContent = document.getElementById('dps-content');
  const pauseActions = document.getElementById('pause-actions');
  const endgameActions = document.getElementById('endgame-actions');
  const startOverlay = document.getElementById('start-overlay');

  // 隐藏 start-overlay；标记面板模式
  if(startOverlay) startOverlay.style.display = 'none';
  G.pauseMode = 'endgame';
  paused = true;

  // === 标题文案 + 颜色 ===
  let titleText = '', titleColor = '', titleShadow = '';
  if(infiniteChallenge){
    titleText = won ? '无尽战场' : '战场陨落';
    titleColor = '#ffd700'; titleShadow = '0 0 12px rgba(255,215,0,0.65)';
  } else if(won){
    titleText = isPerfect ? '★ 完美通关 ★' : '通关';
    if(isPerfect){ titleColor = '#ffd700'; titleShadow = '0 0 12px #ffaa20'; }
    else { titleColor = '#80ffaa'; titleShadow = '0 0 8px rgba(80,255,170,0.5)'; }
  } else {
    titleText = '堡垒陨落';
    titleColor = '#ff6060'; titleShadow = '0 0 8px rgba(255,80,80,0.5)';
  }
  titleEl.textContent = titleText;
  titleEl.style.color = titleColor;
  titleEl.style.textShadow = titleShadow;

  // === 关卡名（沿用暂停面板的 pause-level-name） ===
  if(plnEl){
    const cfg = G.levelConfig || {};
    const name = infiniteChallenge ? '无尽战场' : `LV${G.level || 1} · ${cfg.name || ''}`;
    const affix = (!infiniteChallenge && cfg.affixName) ? ` <span class="pln-affix">「${cfg.affixName}」</span>` : '';
    plnEl.innerHTML = name + affix;
    plnEl.style.display = 'block';
  }

  // === 关键结果 + 次要数据 + DPS 统计（写入 #dps-content）===
  let primaryHTML = '';
  if(infiniteChallenge){
    const bestWave = getInfiniteBestWave();
    const isNewBest = survivedWave > 0 && survivedWave >= bestWave;
    primaryHTML = `
      <div style="font:bold 26px Arial;color:#ffd700;text-align:center;margin:10px 0 4px;">坚守 ${survivedWave} 波</div>
      <div style="font:13px Arial;color:#aaa;text-align:center;margin-bottom:10px;">
        ${isNewBest ? '<span style="color:#ffe680">★ 新纪录</span>' : '历史最高 ' + bestWave + ' 波'}
      </div>
    `;
  } else if(won){
    primaryHTML = `
      <div style="font:bold 22px Arial;color:#fff;text-align:center;margin:10px 0;">剩余生命 ${pct}%</div>
    `;
  } else {
    primaryHTML = `
      <div style="font:bold 22px Arial;color:#fff;text-align:center;margin:10px 0;">坚守 ${survivedWave} 波</div>
    `;
  }
  // 数据 grid
  const minorHTML = `
    <div class="pause-stats-grid">
      <div class="pause-stat"><div class="ps-label">用时</div><div class="ps-value">${Math.floor(G.time)}s</div></div>
      <div class="pause-stat"><div class="ps-label">召唤次数</div><div class="ps-value">${G.summonN}</div></div>
      <div class="pause-stat"><div class="ps-label">升级次数</div><div class="ps-value">${G.upgradeN}</div></div>
      <div class="pause-stat"><div class="ps-label">${infiniteChallenge ? '历史最高' : '关卡'}</div><div class="ps-value">${infiniteChallenge ? (getInfiniteBestWave() + ' 波') : ('LV' + G.level)}</div></div>
    </div>
  `;
  // DPS
  const elapsed = Math.max(1, G.time);
  const stats = G.dpsStats || {};
  const allOrder = ['warrior','archer','assassin','mage','support','gather'];
  const selected = (G.selectedClasses || []);
  const order = allOrder.filter(c => selected.includes(c));
  const totalDmg = order.reduce((s, c) => s + (stats[c] || 0), 0);
  let dpsHTML = '';
  if(order.length > 0 && totalDmg > 0){
    let lines = '';
    for(const c of order){
      const dmg = stats[c] || 0;
      const dps = Math.round(dmg / elapsed);
      const pctOfTotal = totalDmg > 0 ? Math.round(dmg / totalDmg * 100) : 0;
      const color = CLASS_COLOR[c];
      lines += `<div style="display:flex;justify-content:space-between;color:${color};font:13px Arial;line-height:1.8;padding:0 4px;">
        <span>${heroNameForCls(c)} · ${CLASS_ROLE_CN[c]}</span>
        <span style="color:#bbb">${dps} DPS · ${pctOfTotal}%</span>
      </div>`;
    }
    dpsHTML = `
      <div style="margin-top:10px;padding:10px 12px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.25);border-radius:8px;">
        <div style="font:bold 13px Arial;color:#ffd700;margin-bottom:6px;text-align:center;">DPS 统计 · 总伤害 ${Math.round(totalDmg)}</div>
        ${lines}
      </div>
    `;
  }
  dpsContent.innerHTML = primaryHTML + minorHTML + dpsHTML;

  // === 按钮（左次右主，沿用暂停面板按钮容器风格）===
  pauseActions.style.display = 'none';
  endgameActions.style.display = 'flex';
  const primaryBtn = document.getElementById('endgame-primary');
  const secondaryBtn = document.getElementById('endgame-secondary');

  const closeAndOpen = (fn) => () => {
    panel.classList.remove('show');
    G.pauseMode = null;
    paused = false;
    if(plnEl) plnEl.style.display = 'none';
    endgameActions.style.display = 'none';
    fn();
  };

  if(infiniteChallenge){
    primaryBtn.textContent = '再次挑战';
    primaryBtn.onclick = closeAndOpen(() => {
      saveCurrentLevel(G.level);
      openHeroSelection(G.level);
    });
    secondaryBtn.textContent = '返回选关';
    secondaryBtn.onclick = closeAndOpen(() => openStartScreen());
  } else if(won){
    onLevelCleared(G.level);
    if(isPerfect) markPerfectClear(G.level);
    const maxUnlocked = getMaxUnlockedLevel();
    const nextLv = G.level + 1;
    primaryBtn.textContent = nextLv <= maxUnlocked ? `进入第 ${nextLv} 关` : '返回选关';
    primaryBtn.onclick = closeAndOpen(() => {
      saveCurrentLevel(nextLv <= maxUnlocked ? nextLv : G.level);
      openStartScreen();
    });
    secondaryBtn.textContent = '返回选关';
    secondaryBtn.onclick = closeAndOpen(() => openStartScreen());
  } else {
    primaryBtn.textContent = '再次挑战';
    primaryBtn.onclick = closeAndOpen(() => {
      saveCurrentLevel(G.level);
      openHeroSelection(G.level);
    });
    secondaryBtn.textContent = '更换关卡';
    secondaryBtn.onclick = closeAndOpen(() => openStartScreen());
  }

  panel.classList.add('show');
}

(function drawStartBG(){
  const cameraY = FORTRESS_START_Y - CH * 0.4;

  drawFortress(ctx, G.fortress);
  drawLord(ctx, G.fortress);

// Canvas点击：拾取宝箱（仅在游戏运行且未暂停时响应）
canvas.addEventListener('click', (e) => {
  if(!G.running || paused) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;
  tryPickupChestAt(cx, cy);
});
canvas.addEventListener('touchend', (e) => {
  if(!G.running || paused) return;
  if(!e.changedTouches || !e.changedTouches[0]) return;
  const t = e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (t.clientX - rect.left) * scaleX;
  const cy = (t.clientY - rect.top) * scaleY;
  if(tryPickupChestAt(cx, cy)) e.preventDefault();
}, { passive:false });
</script>
